<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Bedrock · Action queue</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!-- PWA: installable as a standalone "Bedrock" app with native notifications. -->
		<link rel="manifest" href="/manifest.webmanifest" />
		<meta name="theme-color" content="#0c0a09" />
		<link rel="icon" href="/icon-192.png" />
		<link rel="apple-touch-icon" href="/icon-192.png" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="Bedrock" />
		<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
		<style>
			* { box-sizing: border-box; }
			html, body {
				margin: 0;
				background: #0c0a09;
				color: #fafaf9;
				font: 14px/1.5 -apple-system, ui-sans-serif, system-ui, sans-serif;
				min-height: 100vh;
				-webkit-font-smoothing: antialiased;
				-moz-osx-font-smoothing: grayscale;
			}
			html { background-color: #0c0a09; }
			header {
				padding: 18px 24px;
				border-bottom: 1px solid #292524;
				display: flex;
				align-items: baseline;
				gap: 16px;
				position: sticky;
				top: 0;
				z-index: 50;
				background: #0c0a09;
			}
			header h1 {
				margin: 0;
				font-size: 16px;
				font-weight: 600;
				letter-spacing: 0.2px;
			}
			header .sub { color: #a8a29e; font-size: 12px; }
			header .status { margin-left: 16px; font-size: 12px; color: #a8a29e; }
			/* Workspace tabs in the bottom bar. Data-driven from core/workspaces.mjs. */
			.ws-tabs {
				display: inline-flex;
				align-items: center;
				gap: 4px;
			}
			.ws-tab {
				display: inline-flex;
				align-items: center;
				gap: 8px;
				height: 30px;
				background: transparent;
				border: 1px solid #292524;
				color: #a8a29e;
				border-radius: 7px;
				padding: 0 8px 0 10px;
				font: inherit;
				font-size: 12px;
				cursor: pointer;
			}
			.ws-tab:hover { background: #1c1917; color: #fafaf9; }
			.ws-tab.active { background: #292524; color: #fafaf9; }
			.ws-tab.active.prod { border-color: rgba(240,128,137,.42); }
			.ws-tab.active.greenoak { border-color: rgba(108,193,138,.42); }
			.ws-tab.active.test { border-color: rgba(168,164,216,.42); }
			.ws-tab .ws-dot {
				width: 8px; height: 8px; border-radius: 50%;
				background: #a8a29e; flex: none;
			}
			.ws-tab .ws-name { line-height: 1; letter-spacing: 0.02em; white-space: nowrap; }
			.ws-tab .ws-key,
			.mem-btn .ws-key,
			.rtab .ws-key {
				min-width: 16px;
				height: 16px;
				display: inline-grid;
				place-items: center;
				border-radius: 4px;
				background: #44403c;
				color: #d6d3d1;
				font-family: ui-monospace, Menlo, monospace;
				font-size: 10px;
				line-height: 1;
			}
			/* per-workspace accent dot (keyed on the internal label) */
			.ws-dot.prod { background: #f08089; }
			.ws-dot.test { background: #a8a4d8; }
			.ws-dot.greenoak { background: #6cc18a; }
			main {
				padding: 24px;
				max-width: 1480px;
				margin: 0 auto;
				display: grid;
				grid-template-columns: minmax(420px, 1fr) minmax(360px, 1fr);
				gap: 22px;
				align-items: start;
			}
			@media (max-width: 900px) {
				main { grid-template-columns: 1fr; }
			}
			.col-header {
				font-size: 11px;
				letter-spacing: 0.12em;
				text-transform: uppercase;
				color: #a8a29e;
				margin: 0 0 10px;
				display: flex;
				align-items: baseline;
				gap: 8px;
			}
			.col-header .count {
				color: #78716c;
				font-family: ui-monospace, Menlo, monospace;
				letter-spacing: 0;
				text-transform: none;
				font-size: 11px;
			}
			.empty {
				color: #a8a29e;
				text-align: center;
				padding: 60px 0;
				font-size: 13px;
			}
				.draft {
					background: #1c1917;
					border: 1px solid #292524;
					border-radius: 10px;
					padding: 16px 18px;
					margin-bottom: 14px;
					overflow: hidden;
				}
				.draft.next-up { padding-bottom: 0; }
			.meta {
				display: flex;
				gap: 8px;
				font-size: 11px;
				color: #a8a29e;
				margin-bottom: 10px;
				flex-wrap: wrap;
				align-items: center;
			}
			.meta .tag {
				background: #292524;
				color: #d6d3d1;
				padding: 2px 8px;
				border-radius: 4px;
				letter-spacing: 0.2px;
			}
			.meta .tag.workspace { background: #2a2538; color: #a8a4d8; }
			.meta .tag.workspace.prod { background: #3a1a1f; color: #f08089; }
			.meta .tag.workspace.greenoak { background: #14301f; color: #6cc18a; }
			.meta .tag.urgent { background: #3a1a1f; color: #f08089; }
			.meta .tag.hold { background: #2a221a; color: #d9a366; }
			.meta .tag.issue-link { cursor: pointer; }
			.meta .tag.issue-link:hover { background: #3a3531; color: #fafaf9; }
			.meta .edited {
				margin-left: auto;
				color: #d9a366;
				font-size: 11px;
			}
			.recipients {
				font-size: 11px;
				color: #a8a29e;
				margin: -4px 0 12px;
				font-family: ui-monospace, SF Mono, Menlo, monospace;
				display: flex;
				flex-direction: column;
				gap: 2px;
			}
			.recipients .handles {
				display: flex;
				flex-wrap: wrap;
				gap: 4px 8px;
				align-items: baseline;
			}
			.recipients .label { color: #a8a29e; }
			.recipients .handle { color: #d6d3d1; }
			.recipients .guid {
				color: #78716c;
				font-size: 10px;
				word-break: break-all;
			}

			.bubbles {
				display: flex;
				flex-direction: column;
				gap: 3px;
				margin: 6px 0 14px;
				align-items: flex-end;
			}
			.bubble {
				max-width: 78%;
				background: #1d6ee2;
				color: #ffffff;
				border-radius: 18px;
				padding: 9px 14px;
				font-size: 14px;
				line-height: 1.35;
				transition: background 0.12s;
				position: relative;
				min-width: 60px;
			}
			.bubble:has(textarea:focus) { background: #2a82f0; box-shadow: 0 0 0 1px #4a9cff inset; }
			.bubble textarea {
				background: transparent;
				border: none;
				color: inherit;
				font: inherit;
				width: 100%;
				resize: none;
				outline: none;
				padding: 0;
				margin: 0;
				display: block;
				overflow: hidden;
				min-height: 18px;
			}
			.bubble.edited::after {
				content: 'edited';
				position: absolute;
				top: 50%;
				right: calc(100% + 8px);
				transform: translateY(-50%);
				font-size: 10px;
				color: #d9a366;
				letter-spacing: 0.05em;
				white-space: nowrap;
			}

				.actions {
					display: flex;
					gap: 8px;
					margin-top: 4px;
				}
				.draft.next-up .actions {
					display: grid;
					grid-template-columns: 1fr 1fr;
					gap: 0;
					margin: 14px -18px 0;
					border-top: 1px solid #292524;
				}
				.draft.next-up .actions button {
					border: 0;
					border-radius: 0;
					padding: 17px 12px;
					font-size: 13px;
					letter-spacing: 0.01em;
				}
				.draft.next-up .actions button:first-child { border-bottom-left-radius: 10px; }
				.draft.next-up .actions button:last-child { border-bottom-right-radius: 10px; }
				.draft.next-up .actions button.primary {
					background: #2b7a4b;
					border-color: transparent;
					color: #effff4;
				}
				.draft.next-up .actions button.primary:hover { background: #329159; }
				.draft.next-up .actions button.danger {
					background: #4b2525;
					color: #ffd5d5;
				}
				.draft.next-up .actions button.danger:hover { background: #5c2b2b; }
				.draft.next-up.deny-open .actions button:first-child,
				.draft.next-up.deny-open .actions button:last-child { border-radius: 0; }
				.deny-reasons {
					display: none;
					margin: 0 -18px;
					padding: 10px 12px 12px;
					background: #15110f;
					border-top: 1px solid #292524;
					border-radius: 0 0 10px 10px;
					grid-template-columns: repeat(2, minmax(0, 1fr));
					gap: 8px;
				}
				.draft.next-up.deny-open .deny-reasons { display: grid; }
				.deny-reasons button {
					text-align: left;
					border-color: #3a3531;
					background: #211c19;
					color: #d6d3d1;
					padding: 8px 10px;
					font-size: 12px;
				}
				.deny-reasons button:hover {
					background: #2a2420;
					color: #fafaf9;
				}
				button {
				background: #292524;
				color: #fafaf9;
				border: 1px solid #44403c;
				padding: 7px 14px;
				border-radius: 6px;
				font: inherit;
				font-size: 13px;
				cursor: pointer;
			}
			button:hover { background: #292524; }
			button.primary { background: #1d6ee2; border-color: #1d6ee2; color: white; }
			button.primary:hover { background: #2a82f0; }
			button.danger { color: #f08089; }
			/* "Send later" toggle — neutral amber when offered, filled when queued. */
			button.later { color: #d9a366; border-color: #5a4a36; }
			button.later:hover { background: #2a221a; }
			button.later.queued { background: #2a221a; color: #e8b878; border-color: #6b5840; }
			button:disabled { opacity: 0.5; cursor: not-allowed; }

			.kpi {
				display: flex;
				gap: 18px;
				background: #1c1917;
				border: 1px solid #292524;
				border-radius: 10px;
				padding: 14px 18px;
				margin-bottom: 18px;
				font-size: 12.5px;
				flex-wrap: wrap;
			}
			.kpi .stat { display: flex; flex-direction: column; gap: 2px; }
			.kpi .stat .label { color: #a8a29e; font-size: 11px; letter-spacing: 0.05em; }
			.kpi .stat .value { color: #fafaf9; font-size: 18px; font-weight: 600; font-family: ui-monospace, Menlo, monospace; }
			.kpi .stat .value .pct { color: #74c99a; }
			.kpi .stat .sub { color: #a8a29e; font-size: 11px; }

			.history-item {
				background: #1c1917;
				border: 1px solid #292524;
				border-radius: 10px;
				padding: 14px 16px;
				margin-bottom: 10px;
			}
			.history-item .top {
				display: flex;
				gap: 8px;
				align-items: center;
				font-size: 11px;
				color: #a8a29e;
				margin-bottom: 8px;
				flex-wrap: wrap;
			}
			.action-tag {
				font-size: 11px;
				font-weight: 600;
				letter-spacing: 0.08em;
				padding: 2px 8px;
				border-radius: 4px;
				font-family: ui-monospace, Menlo, monospace;
			}
			.action-tag.send { background: rgba(60, 200, 120, 0.14); color: #74c99a; border: 1px solid rgba(60, 200, 120, 0.32); }
			.action-tag.copy { background: rgba(126, 183, 240, 0.14); color: #a8a4d8; border: 1px solid rgba(126, 183, 240, 0.32); }
			.action-tag.dismiss { background: rgba(240, 128, 137, 0.14); color: #f08089; border: 1px solid rgba(240, 128, 137, 0.32); }
			.history-item .when { color: #a8a29e; font-size: 11px; margin-left: auto; }
			.history-item .recipients {
				margin: -2px 0 8px;
			}
			.history-item .bubbles {
				display: flex;
				flex-direction: column;
				gap: 3px;
				align-items: flex-end;
			}
			.history-item .bubble {
				max-width: 78%;
				background: #1d6ee2;
				color: #ffffff;
				border-radius: 18px;
				padding: 8px 13px;
				font-size: 13.5px;
				line-height: 1.35;
				white-space: pre-wrap;
				word-wrap: break-word;
			}
			.history-item.dismiss .bubble { background: #292524; color: #d6d3d1; text-decoration: line-through; opacity: 0.7; }
			.history-item .bubble .strike {
				display: block;
				color: rgba(255, 255, 255, 0.62);
				text-decoration: line-through;
				font-size: 12.5px;
				margin-bottom: 3px;
			}
			.history-item .edited-pill {
				font-size: 10px;
				color: #d9a366;
				letter-spacing: 0.06em;
				background: rgba(217, 163, 102, 0.12);
				border: 1px solid rgba(217, 163, 102, 0.32);
				padding: 1px 6px;
				border-radius: 3px;
				font-family: ui-monospace, Menlo, monospace;
			}
			.notes {
				margin-top: 10px;
				border-top: 1px dashed #44403c;
				padding-top: 8px;
			}
			.notes .note-empty {
				color: #a8a29e;
				font-size: 11px;
				cursor: pointer;
				font-style: italic;
				user-select: none;
			}
			.notes .note-empty:hover { color: #a8a29e; }
			.notes textarea {
				width: 100%;
				background: #0c0a09;
				color: #fafaf9;
				border: 1px solid #44403c;
				border-radius: 6px;
				padding: 8px 10px;
				font: inherit;
				font-size: 12.5px;
				line-height: 1.4;
				resize: none;
				outline: none;
				overflow: hidden;
				min-height: 32px;
			}
			.notes textarea:focus { border-color: #2a82f0; }
			.notes textarea::placeholder { color: #a8a29e; font-style: italic; }
			.notes .saved {
				font-size: 10px;
				color: #74c99a;
				margin-left: 6px;
				opacity: 0;
				transition: opacity 0.15s;
			}
			.notes .saved.show { opacity: 1; }

			.chat-item {
				background: #1c1917;
				border: 1px solid #292524;
				border-radius: 10px;
				padding: 12px 14px;
				margin-bottom: 8px;
			}
			.chat-item .top {
				display: flex;
				gap: 6px;
				align-items: center;
				font-size: 11px;
				color: #a8a29e;
				margin-bottom: 6px;
				flex-wrap: wrap;
			}
			.chat-item .top .when { margin-left: auto; color: #a8a29e; }
			.chat-item .handle-row {
				display: flex;
				align-items: center;
				gap: 8px;
				font-size: 11.5px;
				margin: 4px 0 8px;
			}
			.chat-item .handle-row .handle-text {
				font-family: ui-monospace, Menlo, monospace;
				color: #d6d3d1;
			}
			.chat-item .in-bubble {
				background: #292524;
				color: #fafaf9;
				border-radius: 16px;
				padding: 8px 13px;
				font-size: 13.5px;
				line-height: 1.35;
				display: inline-block;
				max-width: 92%;
				white-space: pre-wrap;
				word-wrap: break-word;
			}
			.chat-item .agent-action {
				font-size: 10.5px;
				font-family: ui-monospace, Menlo, monospace;
				letter-spacing: 0.06em;
				padding: 2px 8px;
				border-radius: 4px;
			}
			.chat-item .agent-action.drafted {
				background: rgba(60, 200, 120, 0.14);
				color: #74c99a;
				border: 1px solid rgba(60, 200, 120, 0.32);
			}
			.chat-item .agent-action.clarify {
				background: rgba(217, 163, 102, 0.14);
				color: #d4a855;
				border: 1px solid rgba(217, 163, 102, 0.32);
			}
			.chat-item .agent-action.learned {
				background: rgba(199, 163, 255, 0.14);
				color: #c7a3ff;
				border: 1px solid rgba(199, 163, 255, 0.32);
			}
			.chat-item .agent-action.no_match,
			.chat-item .agent-action.no_action {
				background: rgba(126, 130, 140, 0.14);
				color: #a8a29e;
				border: 1px solid rgba(126, 130, 140, 0.32);
			}
			.chat-item .agent-action.failure {
				background: rgba(240, 128, 137, 0.14);
				color: #f08089;
				border: 1px solid rgba(240, 128, 137, 0.32);
			}
			.chat-item .agent-action.pending {
				background: rgba(217, 163, 102, 0.14);
				color: #d4a855;
				border: 1px solid rgba(217, 163, 102, 0.32);
			}

			.meta .tag.channel.tenant_appfolio {
				background: #2a2538;
				color: #a8a4d8;
			}
			.meta .tag.channel.vendor_appfolio {
				background: #2a2520;
				color: #d4a855;
			}

			.toast {
				position: fixed;
				bottom: 24px;
				right: 24px;
				background: #1c1917;
				border: 1px solid #44403c;
				color: #fafaf9;
				padding: 10px 16px;
				border-radius: 6px;
				font-size: 13px;
				opacity: 0;
				transform: translateY(8px);
				transition: opacity 0.15s, transform 0.15s;
				pointer-events: none;
				max-width: 360px;
				display: flex;
				align-items: center;
				gap: 16px;
			}
			.toast.show { opacity: 1; transform: translateY(0); }
			.toast.error { border-color: #5a2a30; color: #f08089; }
			/* Toasts with an action button must be clickable; plain ones stay
			   click-through so they never block the UI underneath. */
			.toast.has-action { pointer-events: auto; }
			.toast-action {
				background: none;
				border: none;
				padding: 0;
				margin: 0;
				font: inherit;
				font-weight: 600;
				font-size: 12px;
				letter-spacing: 0.04em;
				text-transform: uppercase;
				color: #5a9ff5;
				cursor: pointer;
				flex: none;
			}
			.toast-action:hover { color: #8fbcff; text-decoration: underline; }

			/* ── Tab nav + view switching ───────────────────────────────── */
			.tab-nav { display: flex; gap: 4px; margin-left: 8px; }
			.tab-nav button {
				background: transparent;
				border: none;
				color: #a8a29e;
				padding: 6px 14px;
				font-size: 12px;
				letter-spacing: 0.04em;
				border-radius: 6px;
				cursor: pointer;
				text-transform: uppercase;
				font-weight: 500;
			}
			.tab-nav button:hover { color: #d6d3d1; }
			.tab-nav button.active { background: #292524; color: #fafaf9; }

			.memory-search {
				margin-left: 10px;
				background: #1c1917;
				border: 1px solid #292524;
				color: #fafaf9;
				padding: 6px 10px;
				border-radius: 6px;
				font: inherit;
				font-size: 12px;
				width: 200px;
				display: none;
			}
			.memory-search:focus { outline: none; border-color: #1d6ee2; }

			.view { display: none; }
			.view.active { display: block; }
			main.view.active { display: grid; }

			/* ── Memory graph view ──────────────────────────────────────── */
			.memory-view {
				position: relative;
				height: calc(100vh - 73px); /* header height */
				overflow: hidden;
			}
			.memory-view svg {
				width: 100%;
				height: 100%;
				background: #0c0a09;
				display: block;
				cursor: grab;
			}
			.memory-view svg:active { cursor: grabbing; }

			/* Node styling — all info via size/opacity, near-monochrome */
			.node { cursor: pointer; }
			.node circle {
				transition: stroke 0.12s, stroke-width 0.12s;
			}
			.node.observation circle {
				fill: #78716c;
				stroke: #44403c;
				stroke-width: 1;
			}
			.node.belief circle {
				fill: #d6d3d1;
				stroke: #44403c;
				stroke-width: 1.5;
			}
			.node.belief.user-created circle {
				stroke: #d9a366;
				stroke-width: 2;
			}
			/* Entity nodes — color-coded per kind. Larger than observations so
			   they read as anchors in the graph. */
			.node.entity circle { stroke: #44403c; stroke-width: 1.5; }
			.node.entity.vendor   circle { fill: #74c99a; }
			.node.entity.property circle { fill: #d4a855; }
			.node.entity.owner    circle { fill: #a8a4d8; }
			.link.entity { stroke: #44403c; stroke-opacity: 0.55; stroke-dasharray: 4 3; }
			/* Structural property↔owner edges from legacy owner_properties.
			   Solid + brighter so they read as "load-bearing relationship,
			   not a derived belief link." */
			.link.structural { stroke: #a8a29e; stroke-opacity: 0.7; }
			.node.selected circle {
				stroke: #1d6ee2;
				stroke-width: 3;
			}
			.node.dimmed { opacity: 0.18; }
			.node.match circle {
				stroke: #d9a366;
				stroke-width: 2.5;
			}
			.node text {
				fill: #a8a29e;
				font-size: 10px;
				font-family: ui-sans-serif, system-ui, sans-serif;
				pointer-events: none;
				dominant-baseline: hanging;
			}
			.node.observation text {
				display: none;
			}
			.node.observation:hover text {
				display: block;
				font-size: 9.5px;
			}
			.link {
				stroke: #44403c;
				stroke-opacity: 0.6;
			}
			.link.dimmed { stroke-opacity: 0.08; }

			/* Detail panel slides in from the right */
			.memory-detail {
				position: absolute;
				top: 0;
				right: 0;
				width: 380px;
				height: 100%;
				background: #1c1917;
				border-left: 1px solid #292524;
				overflow-y: auto;
				padding: 24px 22px 80px;
				box-shadow: -2px 0 8px rgba(0, 0, 0, 0.3);
				z-index: 5;
			}
			.memory-detail[hidden] { display: none; }
			.memory-detail-close {
				position: absolute;
				top: 12px;
				right: 14px;
				background: transparent;
				border: none;
				color: #a8a29e;
				font-size: 22px;
				cursor: pointer;
				padding: 2px 8px;
				line-height: 1;
			}
			.memory-detail-close:hover { color: #fafaf9; }
			.memory-detail h3 {
				margin: 0 0 14px;
				font-size: 14px;
				color: #fafaf9;
			}
			.memory-detail .kv {
				font-size: 12px;
				margin: 8px 0;
				display: flex;
				gap: 10px;
				color: #d6d3d1;
			}
			.memory-detail .kv .k {
				color: #a8a29e;
				min-width: 90px;
				text-transform: uppercase;
				letter-spacing: 0.05em;
				font-size: 11px;
			}
			.memory-detail .claim {
				font-size: 14px;
				color: #fafaf9;
				line-height: 1.5;
				margin: 0 0 14px;
				padding: 12px;
				background: #1c1917;
				border-radius: 6px;
				border-left: 3px solid #d6d3d1;
			}
			.memory-detail .claim.user { border-left-color: #d9a366; }
			.memory-detail .scope-pill {
				display: inline-block;
				background: #292524;
				color: #d6d3d1;
				padding: 2px 8px;
				border-radius: 4px;
				font-size: 11px;
				margin: 2px 4px 2px 0;
				font-family: ui-monospace, Menlo, monospace;
			}
			.memory-detail .evidence-row {
				font-size: 12px;
				padding: 8px 10px;
				background: #1c1917;
				border-radius: 6px;
				margin: 6px 0;
				cursor: pointer;
				border-left: 2px solid transparent;
			}
			.memory-detail .evidence-row:hover { background: #292524; }
			.memory-detail .evidence-row.contradicts { border-left-color: #f08089; }
			.memory-detail .evidence-row.supports { border-left-color: #74c99a; }
			.memory-detail .evidence-row .weight {
				font-family: ui-monospace, Menlo, monospace;
				color: #a8a29e;
				font-size: 10px;
				float: right;
			}
			.memory-detail .actions {
				margin-top: 18px;
				display: flex;
				gap: 8px;
			}

			/* Bottom controls */
			.memory-controls {
				position: absolute;
				bottom: 16px;
				left: 16px;
				right: 16px;
				display: flex;
				align-items: center;
				gap: 12px;
				pointer-events: none;
				z-index: 4;
			}
			.memory-controls > * { pointer-events: auto; }

			/* Empty state */
			.memory-empty {
				position: absolute;
				top: 50%; left: 50%;
				transform: translate(-50%, -50%);
				color: #a8a29e;
				font-size: 14px;
				text-align: center;
				pointer-events: none;
			}
			.memory-empty .hint { color: #78716c; font-size: 12px; margin-top: 6px; }

			/* + new belief dialog */
			.belief-dialog {
				background: #1c1917;
				border: 1px solid #292524;
				border-radius: 10px;
				padding: 24px;
				color: #fafaf9;
				width: 440px;
				max-width: 90vw;
			}
			.belief-dialog::backdrop { background: rgba(0, 0, 0, 0.55); }
			.belief-dialog h3 { margin: 0 0 16px; font-size: 14px; }
			.belief-dialog .field {
				display: flex;
				flex-direction: column;
				gap: 4px;
				margin-bottom: 14px;
			}
			.belief-dialog .field > span {
				color: #a8a29e;
				font-size: 11px;
				text-transform: uppercase;
				letter-spacing: 0.05em;
			}
			.belief-dialog textarea, .belief-dialog input[type=text] {
				background: #0c0a09;
				border: 1px solid #292524;
				color: #fafaf9;
				padding: 8px 10px;
				border-radius: 6px;
				font: inherit;
				font-size: 13px;
				resize: vertical;
			}
			.belief-dialog textarea:focus, .belief-dialog input[type=text]:focus { outline: none; border-color: #1d6ee2; }
			.belief-dialog input[type=range] { width: 100%; }
			.belief-dialog #conf-out {
				font-family: ui-monospace, Menlo, monospace;
				color: #d6d3d1;
				margin-left: 6px;
			}
			.belief-dialog-actions {
				display: flex;
				gap: 8px;
				justify-content: flex-end;
				margin-top: 8px;
			}

			body.memory-mode .memory-search { display: inline-block; }

			/* ── Memory tab: list-view pane ─────────────────────────────── */
			/* Memory section is a flex column when active so the graph or list
			   pane fills the available height under the toolbar. */
			.memory-view.active {
				display: flex;
				flex-direction: column;
			}
			#memory-graph-pane {
				position: relative;
				flex: 1 1 auto;
				min-height: 0;
				width: 100%;
				height: 100%;
			}
			#memory-graph-pane svg { width: 100%; height: 100%; display: block; }
			#memory-list-pane {
				flex: 1 1 auto;
				min-height: 0;
				display: flex;
				flex-direction: column;
				padding: 0;
				width: 100%;
				max-width: none;
				margin: 0;
				overflow: hidden;
				box-sizing: border-box;
			}
			#memory-list-pane[hidden] { display: none; }
			#memory-list-controls {
				display: flex;
				gap: 10px;
				align-items: center;
				margin-bottom: 14px;
			}
			#memory-list-controls input,
			#memory-list-controls select {
				background: #1c1917;
				border: 1px solid #44403c;
				color: #d6d3d1;
				padding: 6px 10px;
				border-radius: 6px;
				font-size: 12.5px;
			}
			#memory-list-controls input { flex: 1 1 auto; }
			#memory-list-controls input:focus,
			#memory-list-controls select:focus { outline: none; border-color: #1d6ee2; }
			.memory-list-count {
				color: #a8a29e;
				font-size: 11.5px;
				font-family: ui-monospace, Menlo, monospace;
				margin-left: auto;
			}
			.belief-row {
				background: #1c1917;
				border: 1px solid #292524;
				border-left-width: 3px;
				border-radius: 8px;
				padding: 10px 14px;
				margin-bottom: 6px;
				font-size: 13px;
				display: grid;
				grid-template-columns: 1fr auto;
				gap: 4px 12px;
			}
			.belief-row.user { border-left-color: #d9a366; }
			.belief-row.agent { border-left-color: #78716c; }
			.belief-row .claim { color: #fafaf9; line-height: 1.4; }
			.belief-row .right {
				display: flex;
				flex-direction: column;
				align-items: flex-end;
				gap: 2px;
				font-size: 11px;
				color: #a8a29e;
				font-family: ui-monospace, Menlo, monospace;
				white-space: nowrap;
			}
			.belief-row .right .conf { color: #fafaf9; }
			.belief-row .right .ev { color: #74c99a; }
			.belief-row .meta {
				grid-column: 1 / -1;
				display: flex;
				flex-wrap: wrap;
				gap: 4px;
				font-size: 10.5px;
				color: #a8a29e;
				font-family: ui-monospace, Menlo, monospace;
			}
			.belief-row .pill {
				background: #1c1917;
				border: 1px solid #292524;
				padding: 1px 7px;
				border-radius: 9px;
			}
			.belief-row .pill.scope { color: #d4a855; background: #221c14; border-color: #36281c; }
			.belief-row .pill.tag   { color: #a8a4d8; background: #1c1917; border-color: #292524; }

			.memory-view-toggle { display: inline-flex; gap: 0; pointer-events: auto; }
			.memory-view-toggle button {
				background: #1c1917;
				border: 1px solid #44403c;
				color: #a8a29e;
				padding: 5px 12px;
				font-size: 11.5px;
				cursor: pointer;
			}
			.memory-view-toggle button:first-child { border-radius: 6px 0 0 6px; }
			.memory-view-toggle button:last-child  { border-radius: 0 6px 6px 0; border-left: 0; }
			.memory-view-toggle button.active { background: #292524; color: #fafaf9; }
			.memory-view-toggle button:hover { color: #d6d3d1; }

			/* When in list view, the graph filters / detail pane don't apply. */
			body.memory-list-mode #memory-graph-pane { display: none; }
			body.memory-list-mode #memory-entities-pane { display: none; }
			body.memory-list-mode #memory-list-pane { display: grid; }
			#memory-list-pane.three-col {
				grid-template-columns: 1fr 1fr 1fr;
				gap: 0;
				padding: 0;
			}
			.list-col { display: flex; flex-direction: column; min-height: 0; border-right: 1px solid #292524; }
			.list-col:last-child { border-right: none; }
			.list-col-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid #292524; background: #0c0a09; position: sticky; top: 0; z-index: 5; }
			.list-col-header h3 { margin: 0; font-size: 13px; text-transform: uppercase; letter-spacing: 0.6px; color: #a8a29e; }
			.list-col-header .count { color: #a8a29e; font-size: 11.5px; }
			.list-col-body { flex: 1 1 auto; overflow-y: auto; padding: 8px 12px 24px; }
			.list-item { padding: 8px 10px; margin-bottom: 6px; border-radius: 4px; background: #1c1917; border-left: 3px solid #44403c; cursor: pointer; transition: background 0.1s; }
			.list-item:hover { background: #292524; }
			.list-item.kind-observation { border-left-color: #74c99a; }
			.list-item.kind-belief { border-left-color: #d9a366; }
			.list-item.kind-entity-vendor { border-left-color: #5fa676; }
			.list-item.kind-entity-property { border-left-color: #d9a366; }
			.list-item.kind-entity-owner { border-left-color: #a8a29e; }
			.list-item .li-title { font-weight: 600; font-size: 12.5px; color: #fafaf9; }
			.list-item .li-meta { font-size: 11px; color: #a8a29e; margin-top: 3px; }
			.list-item .li-pill { display: inline-block; padding: 1px 6px; margin-right: 4px; border-radius: 3px; background: #44403c; color: #a8a29e; font-size: 10px; }

			/* Entities sub-view ─────────────────────────────────────────── */
			#memory-entities-pane {
				flex: 1 1 auto;
				min-height: 0;
				display: flex;
				flex-direction: column;
				padding: 14px 20px 60px;
				width: 100%;
				max-width: 1100px;
				margin: 0 auto;
				overflow-y: auto;
				box-sizing: border-box;
			}
			#memory-entities-pane[hidden] { display: none; }
			.entity-row {
				background: #1c1917;
				border: 1px solid #292524;
				border-left-width: 3px;
				border-radius: 8px;
				padding: 10px 14px;
				margin-bottom: 6px;
				font-size: 13px;
				display: grid;
				grid-template-columns: auto 1fr auto;
				gap: 4px 12px;
				cursor: pointer;
			}
			.entity-row:hover { background: #1c1917; }
			.entity-row.vendor   { border-left-color: #74c99a; }
			.entity-row.property { border-left-color: #d4a855; }
			.entity-row.owner    { border-left-color: #a8a4d8; }
			.entity-row .kind-pill {
				font-family: ui-monospace, Menlo, monospace;
				font-size: 10.5px;
				padding: 2px 8px;
				border-radius: 9px;
				background: #1c1917;
				border: 1px solid #292524;
				color: #d6d3d1;
				align-self: center;
			}
			.entity-row .name { color: #fafaf9; align-self: center; }
			.entity-row .right {
				display: flex;
				flex-direction: column;
				align-items: flex-end;
				gap: 2px;
				font-size: 11px;
				color: #a8a29e;
				font-family: ui-monospace, Menlo, monospace;
				white-space: nowrap;
			}
			.entity-row .right .ev { color: #74c99a; }
			.entity-row .right .legacy { color: #a8a29e; }
			#memory-entities-detail {
				margin-top: 18px;
				padding-top: 14px;
				border-top: 1px solid #292524;
			}
			#memory-entities-detail[hidden] { display: none; }
			#memory-entities-detail h3 {
				margin: 0 0 10px;
				font-size: 13.5px;
				color: #fafaf9;
				display: flex;
				align-items: center;
				gap: 10px;
			}
			#memory-entities-detail .close-btn {
				margin-left: auto;
				background: transparent;
				border: 1px solid #292524;
				color: #a8a29e;
				padding: 3px 9px;
				border-radius: 5px;
				font-size: 11px;
				cursor: pointer;
			}

			/* ── Sessions tab ───────────────────────────────────────────── */

			/* Activity view: interleaved agent steps + sticky detail pane */
			/* Stream keeps a fixed width: centered alone, shifts LEFT when the detail
			   opens (it does NOT shrink). Detail fills the space to its right. */
			.sx-layout { display: flex; gap: 16px; align-items: flex-start; justify-content: center; }
			.sx-layout #sessions-list { flex: 0 0 900px; min-width: 0; }
			.sx-detail {
				flex: 1 1 0; min-width: 0; display: none;
				background: #1c1917; border: 1px solid #292524; border-radius: 12px;
				padding: 14px 16px; max-height: 86vh; overflow: auto;
			}
			.sx-layout.has-detail { justify-content: flex-start; }
			.sx-layout.has-detail .sx-detail { display: block; }
			.sx-steps { display: flex; flex-direction: column; align-items: flex-end; margin: 6px 0 4px; }
			.sx-status { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; margin: 4px 0 12px; }
			.sx-st { font-size: 10.5px; }
			.sx-st.agent { color: #a8a29e; }
			.sx-st.you { color: #6bbf8a; }
			.sx-st.learn { color: #a8a4d8; }
			.sx-trow {
				font-family: ui-monospace, Menlo, monospace; font-size: 11.5px; color: #a8a29e;
				cursor: pointer; display: flex; align-items: center; justify-content: flex-end; gap: 7px;
				padding: 2px 6px; border-radius: 6px; margin: 1px 0; border: 1px solid transparent;
			}
			.sx-trow:hover { background: #1c1917; color: #e7e5e4; }
			.sx-trow.active { background: #292524; border-color: #3a3531; color: #e7e5e4; }
			.sx-trow.mem { color: #a8a4d8; }
			.sx-trow.trigger { color: #9db8ff; }
			.sx-trow.trigger.active { color: #e7e5e4; }
			.sx-urg { background: #3a1a1f; color: #f08089; border-radius: 4px; padding: 0 5px; font-size: 9.5px; font-weight: 700; letter-spacing: 0.04em; }
			.sxd-urg { background: #2a1518; border: 1px solid #5a2a30; color: #f08089; border-radius: 6px; padding: 8px 11px; font-size: 12px; }
			.sxd-text { font-size: 12.5px; color: #e7e5e4; }
			.sx-dot { width: 6px; height: 6px; border-radius: 50%; flex: 0 0 auto; }
			.sx-dot.dt { background: #9db8ff; box-shadow: 0 0 0 2px rgba(157,184,255,0.25); }
			.sx-dot.dr { background: #9db8ff; } .sx-dot.dm { background: #a8a4d8; }
			.sx-dot.dv { background: #d4a855; } .sx-dot.dd { background: #6bbf8a; } .sx-dot.ds { background: #a8a29e; }
			.sx-chev { font-size: 8px; opacity: 0.4; }
			.sxd-head { display: flex; align-items: center; gap: 8px; font-family: ui-monospace, Menlo, monospace; font-size: 13px; color: #e7e5e4; border-bottom: 1px solid #292524; padding-bottom: 10px; margin-bottom: 10px; }
			.sxd-meta { font-size: 11px; color: #a8a29e; margin-bottom: 10px; }
			.sxd-sec { margin: 10px 0; }
			.sxd-sec .lbl { font-size: 10px; color: #a8a29e; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
			.sxd-sec pre { margin: 0; padding: 9px 11px; background: #0f0d0b; border: 1px solid #292524; border-radius: 6px; font-size: 11px; color: #cfcbc6; white-space: pre-wrap; word-break: break-word; max-height: 320px; overflow: auto; }
			.sxd-link { display: inline-block; margin-top: 8px; color: #a8a4d8; text-decoration: none; border-bottom: 1px dashed rgba(168,164,216,0.45); font-size: 12px; }

			.sessions-view {
				padding: 14px 20px 60px;
				overflow-y: auto;
				max-width: 980px;
				margin: 0 auto;
			}
			/* When a tool-call detail is open the stream shifts left and the detail
			   fills the space to its right — so the view needs the full width. */
			.sessions-view:has(.sx-layout.has-detail) { max-width: 1480px; }
			.sessions-empty {
				color: #a8a29e;
				text-align: center;
				padding: 80px 20px;
				font-size: 13px;
			}
			.session-card {
				background: #1c1917;
				border: 1px solid #292524;
				border-radius: 10px;
				padding: 14px 16px;
				margin-bottom: 10px;
			}
			.session-card .head {
				display: flex;
				align-items: center;
				gap: 10px;
				font-size: 11.5px;
				color: #a8a29e;
				margin-bottom: 8px;
				flex-wrap: wrap;
			}
			.session-card .head .range { color: #d6d3d1; font-weight: 500; }
			.session-card .head .count { color: #a8a29e; }
			.session-card .head .num {
				font-family: ui-monospace, Menlo, monospace;
				font-size: 11px;
				color: #d6d3d1;
				background: #292524;
				border: 1px solid #44403c;
				padding: 1px 6px;
				border-radius: 4px;
			}
			.session-card .head .extracted {
				font-size: 10.5px;
				font-family: ui-monospace, Menlo, monospace;
				background: rgba(60, 200, 120, 0.14);
				color: #74c99a;
				border: 1px solid rgba(60, 200, 120, 0.32);
				padding: 1px 6px;
				border-radius: 4px;
			}
			.session-card .head .extracted.pending {
				background: rgba(126, 130, 140, 0.14);
				color: #a8a29e;
				border-color: rgba(126, 130, 140, 0.32);
			}
			.session-card .summary {
				color: #d6d3d1;
				font-size: 13.5px;
				line-height: 1.5;
				margin: 4px 0 10px;
			}
			.session-card .pills {
				display: flex;
				flex-wrap: wrap;
				gap: 5px;
				margin-bottom: 8px;
			}
			.session-card .pill {
				font-size: 10.5px;
				padding: 2px 8px;
				border-radius: 10px;
				background: #1c1917;
				color: #a8a29e;
				border: 1px solid #292524;
				font-family: ui-monospace, Menlo, monospace;
			}
			.session-card .pill.tag { color: #a8a4d8; background: #1c1917; border-color: #292524; }
			.session-card .pill.entity { color: #d4a855; background: #221c14; border-color: #36281c; }
			.session-card .expand-btn,
			.session-card .delete-btn {
				background: transparent;
				border: 1px solid #292524;
				color: #a8a29e;
				padding: 4px 10px;
				border-radius: 6px;
				font-size: 11.5px;
				cursor: pointer;
			}
			.session-card .expand-btn:hover { background: #292524; color: #d6d3d1; }
			.session-card .delete-btn {
				color: #a8a29e;
				border-color: #2a1f24;
			}
			.session-card .delete-btn:hover {
				background: rgba(240, 128, 137, 0.14);
				color: #f08089;
				border-color: rgba(240, 128, 137, 0.32);
			}
			.session-card .transcript {
				margin-top: 12px;
				padding-top: 14px;
				border-top: 1px solid #292524;
				display: flex;
				flex-direction: column;
				gap: 8px;
				max-height: 540px;
				overflow-y: auto;
			}
			/* Mirror the Chat thread's iMessage bubbles (same values as the
			   .chat-view .row/.bubble/.avatar rules) so sessions read identically. */
			.session-card .transcript .row {
				display: flex;
				gap: 8px;
				align-items: flex-end;
				max-width: 100%;
			}
			.session-card .transcript .row.left { justify-content: flex-start; }
			.session-card .transcript .row.right { justify-content: flex-end; }
			.session-card .transcript .row.right + .row.left,
