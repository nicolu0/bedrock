			function fmtIssueDate(iso) {
				return new Date(iso).toLocaleDateString('en-US', {
					month: 'short',
					day: 'numeric',
					timeZone: PT
				});
			}
			function fmtIssueTime(iso) {
				return new Date(iso).toLocaleTimeString('en-US', {
					hour: 'numeric',
					minute: '2-digit',
					timeZone: PT
				});
			}

			function renderIssues(items) {
				// Cheap guard: only rebuild when the row set changed, so the poll
				// doesn't churn the DOM every tick.
				const key = items.map((i) => i.id + ':' + (i.created_at || '')).join('|');
				if (key === renderedIssuesKey && issuesList.querySelector('.issue-row')) return;
				renderedIssuesKey = key;
				if (!items.length) {
					issuesList.innerHTML =
						'<div class="issues-empty">No issues for ' + escapeHtml(workspaceFilter) + '.</div>';
					return;
				}
				let html = '';
				for (const i of items) {
					html +=
						'<div class="issue-row" data-issue-id="' + escapeHtml(i.id) + '">' +
							'<div class="idt">' +
								'<span class="idate">' + escapeHtml(fmtIssueDate(i.created_at)) + '</span>' +
								'<span class="itime">' + escapeHtml(fmtIssueTime(i.created_at)) + '</span>' +
							'</div>' +
							'<div class="icol">' +
								'<div class="iname">' +
									(i.urgent
										? '<span class="iurgent">urgent</span>'
										: '<span class="inormal">normal</span>') +
									escapeHtml(i.name || '(untitled)') +
								'</div>' +
								(i.description
									? '<div class="idesc">' + escapeHtml(i.description) + '</div>'
									: '') +
							'</div>' +
							'<div class="imeta">' +
								(i.appfolio_srn
									? '<span class="isrn">#' + escapeHtml(i.appfolio_srn) + '</span>'
									: '') +
							'</div>' +
						'</div>';
				}
				issuesList.innerHTML = html;
			}

			async function refresh() {
				await loadIssues();
			}

			refresh();
			const issuesPoller = setInterval(() => {
				loadIssues();
			}, 6000);

			/* ─── Memory tab: D3 force-directed graph + CRUD ──────────────── */

			// ── IDE orchestration (replaces the old tab bar) ──────────────
			// Issues (left) and Chat (center) are always visible. The right
			// pane is a drawer: drafts | turns | sessions. Memory is a
			// full-screen overlay, not a drawer/tab.
			const DRAWER_KEY = 'bedrock.drawer';
			let drawer = localStorage.getItem(DRAWER_KEY) || 'drafts';
			if (!['drafts', 'turns', 'sessions'].includes(drawer)) drawer = 'drafts';
			let activeTab = 'chat'; // legacy alias; kept defined so stray refs never throw

			const railEl = document.getElementById('chat-drafts-rail');
			const turnsView = document.getElementById('view-turns');
			const sessionsView = document.getElementById('view-sessions');
			const rightTabsEl = document.getElementById('right-tabs');
			const rightCrumbEl = document.getElementById('right-crumb');
			let lastDrawerTab = 'drafts';
			let sessionFocusId = null; // the one session shown in the drawer (via a session → link)

			function applyDrawer() {
				railEl.hidden = drawer !== 'drafts';
				turnsView.hidden = drawer !== 'turns';
				sessionsView.hidden = drawer !== 'sessions';
				const isSession = drawer === 'sessions';
				rightTabsEl.hidden = isSession;
				rightCrumbEl.hidden = !isSession;
				if (!isSession) {
					lastDrawerTab = drawer;
					for (const b of rightTabsEl.children) b.classList.toggle('on', b.dataset.drawer === drawer);
				}
				if (drawer === 'turns') loadTurns();
				else if (drawer === 'sessions') loadSessions();
			}
			function setDrawer(name) {
				drawer = name;
				if (name !== 'sessions') { localStorage.setItem(DRAWER_KEY, name); sessionFocusId = null; }
				applyDrawer();
			}
			rightTabsEl.addEventListener('click', (e) => {
				const btn = e.target.closest('button[data-drawer]');
				if (btn) setDrawer(btn.dataset.drawer);
			});
			document.getElementById('right-back').addEventListener('click', () => setDrawer(lastDrawerTab));

			// Memory graph — full-screen overlay opened from the center bottom bar.
			const memBackEl = document.getElementById('memback');
			const memOvEl = document.getElementById('memov');
			let memOpen = false;
			function openMemory() {
				memOpen = true;
				memBackEl.classList.add('show');
				memOvEl.classList.add('show');
				loadMemoryGraph();
			}
			function closeMemory() {
				memOpen = false;
				memBackEl.classList.remove('show');
				memOvEl.classList.remove('show');
			}
			document.getElementById('open-memory').addEventListener('click', openMemory);
			memBackEl.addEventListener('click', closeMemory);
			document.getElementById('memclose').addEventListener('click', closeMemory);
			document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && memOpen) closeMemory(); });

			// Single-key shortcuts: "m" toggles the memory graph for the current
				// workspace, "[" opens the Queue drawer, "]" opens Turns. All skipped
			// while typing in a field (so they never eat a literal keystroke in a
			// draft/search box) or with a modifier held.
			document.addEventListener('keydown', (e) => {
				if (e.metaKey || e.ctrlKey || e.altKey) return;
				const el = document.activeElement;
				if (el && (el.isContentEditable || /^(INPUT|TEXTAREA|SELECT)$/.test(el.tagName))) return;
				if (e.key === 'm' || e.key === 'M') {
					e.preventDefault();
					memOpen ? closeMemory() : openMemory();
				} else if (e.key === '[') {
					e.preventDefault();
					setDrawer('drafts');
				} else if (e.key === ']') {
					e.preventDefault();
					setDrawer('turns');
				}
			});

			// KPI strip (center top) — from /kpi (prod-scoped).
			async function loadKpi() {
				// KPIs are per-workspace and always shown: zeros for a workspace with
				// no activity yet (e.g. Green Oak), real numbers as it accrues.
				try {
					const res = await fetch('/kpi?workspace=' + encodeURIComponent(workspaceFilter));
					if (!res.ok) return;
					const k = await res.json();
					const matched = k.scope === workspaceFilter;
						const windowLabel = k.window === 'today' ? 'today' : ((k.window_days ?? 30) + 'd');
					const pct = matched && k.send_without_edit_rate != null ? Math.round(k.send_without_edit_rate * 100) + '%' : '0%';
					const sent = matched ? k.sent_total : 0;
					const actions = matched ? k.recent_responses : 0;
					document.getElementById('kpi-strip').innerHTML =
							'<div class="turns-kpi">' +
							'<div class="stat"><span class="v">' + pct + '</span><span class="l">send-without-edit · ' + windowLabel + '</span></div>' +
							'<div class="stat"><span class="v">' + sent + '</span><span class="l">messages sent · ' + windowLabel + '</span></div>' +
							'<div class="stat"><span class="v">' + actions + '</span><span class="l">actions · ' + windowLabel + '</span></div>' +
							'</div>';
				} catch {}
			}
			// Initial applyTab() runs at the very END of the script — see below.
			// On reload it may activate the chat/memory/sessions tab, whose loaders
			// read const/let module state declared further down; calling it here
			// would hit those bindings in the temporal dead zone and throw.

			/* ─── Sessions tab ─────────────────────────────────────────── */

			const sessionsList = document.getElementById('sessions-list');
			let sessionsCache = []; // { id -> session row }
			let sessionsLoading = false;
			let turnByReply = {};    // normalized agent reply body -> turn (Activity interleave)
			let turnByTrigger = {};  // normalized inbound trigger text -> turn (no-reply turns)
			let turnsBySession = {}; // session_id -> [reply turns, ts asc] — fallback when the
			                         // sent text was edited away from the drafted send_text
			let newIssueByGuid = {}; // chat_guid -> [new_issue turns] — attaches the WO-summary
			                         // steps to the session's opening message (session_id is null
			                         // on new_issue turns, and the summary text is often edited)
			let turnById = {};
			let callById = {};       // "turnId:idx" -> { call, event } for the detail pane
			let usedTurns = new Set();
			const sessionDetailPane = () => document.getElementById('session-detail');

			function sessionsWorkspace() {
				return workspaceFilter;
			}

			async function loadSessions() {
				if (sessionsLoading) return;
				sessionsLoading = true;
				sessionsList.innerHTML = '<div class="sessions-empty">Loading sessions…</div>';
				try {
					const res = await fetch('/api/sessions?workspace=' + sessionsWorkspace());
					if (!res.ok) throw new Error(await res.text());
					sessionsCache = await res.json();
					// Activity view: pull turns, group by session so the agent's steps
					// can be interleaved into each session's transcript. Best-effort.
					// Match turns to the message they produced (send_text content) so steps
					// attach correctly even when the turn carries no/other session_id —
					// e.g. new_issue turns run before the chat session exists.
					turnByReply = {}; turnByTrigger = {}; turnById = {}; turnsBySession = {}; newIssueByGuid = {};
					try {
						const tr = await fetch('/api/turns?workspace=' + sessionsWorkspace());
						if (tr.ok) {
							const norm = (s) => (s || '').trim();
							for (const t of await tr.json()) {
								if (t.turn_id) turnById[t.turn_id] = t;
								const sends = (t.steps || [])
									.flatMap((s) => (s.tool_calls || []).filter((c) => c.name === 'send_text'))
									.map((c) => c.args && c.args.content).filter(Boolean);
								if (sends.length) {
									for (const c of sends) turnByReply[norm(c)] = t;
									// Reply turns also indexed by session so renderActivity can attach
									// them by position when the sent text was edited off the draft.
									if (t.session_id) (turnsBySession[t.session_id] ||= []).push(t);
									// new_issue turns run before the session exists (session_id null);
									// index by chat_guid so the opener message can claim its steps.
									else if (t.event === 'new_issue' && t.chat_guid) (newIssueByGuid[t.chat_guid] ||= []).push(t);
								}
								else { const tt = t.trigger && t.trigger.payload && t.trigger.payload.text; if (tt) turnByTrigger[norm(tt)] = t; }
							}
							for (const sid of Object.keys(turnsBySession))
								turnsBySession[sid].sort((a, b) => new Date(a.ts) - new Date(b.ts));
						}
					} catch (e) { /* turns optional */ }
					renderSessions();
				} catch (err) {
					sessionsList.innerHTML =
						'<div class="sessions-empty">Failed to load sessions: ' + escapeHtml(err.message) + '</div>';
				} finally {
					sessionsLoading = false;
				}
			}

			function fmtRange(startISO, endISO) {
				const s = new Date(startISO);
				const e = endISO ? new Date(endISO) : null;
				const opts = { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' };
				const same = e && s.toDateString() === e.toDateString();
				if (!e) return s.toLocaleString(undefined, opts) + ' — open';
				if (same) {
					const endTime = e.toLocaleString(undefined, { hour: 'numeric', minute: '2-digit' });
					return s.toLocaleString(undefined, opts) + ' – ' + endTime;
				}
				return s.toLocaleString(undefined, opts) + ' → ' + e.toLocaleString(undefined, opts);
			}

			function fmtEntities(entities) {
				if (!entities || typeof entities !== 'object') return [];
				const out = [];
				for (const [k, v] of Object.entries(entities)) {
					if (Array.isArray(v)) for (const item of v) out.push(`${k}:${item}`);
					else if (v != null) out.push(`${k}:${v}`);
				}
				return out;
			}

			function escapeHtml(s) {
				return String(s ?? '')
					.replaceAll('&', '&amp;')
					.replaceAll('<', '&lt;')
					.replaceAll('>', '&gt;')
					.replaceAll('"', '&quot;');
			}

			function renderSessions() {
				if (!sessionsCache.length) {
					sessionsList.innerHTML =
						'<div class="sessions-empty">No sessions yet for ' +
						escapeHtml(sessionsWorkspace()) +
						'. Run <code>node agent/scripts/backfill-from-chat.mjs --workspace=' +
						escapeHtml(sessionsWorkspace()) +
						' --phase=1</code> to backfill.</div>';
					return;
				}
				const total = sessionsCache.length;
				callById = {}; usedTurns = new Set(); // rebuilt as we render each session's steps
				// In the IDE the drawer shows ONE session (the clicked `session →`).
				const list = sessionFocusId ? sessionsCache.filter((s) => s.id === sessionFocusId) : sessionsCache;
				const rt = document.getElementById('right-title');
				if (sessionFocusId && list[0] && rt) rt.textContent = 'Session #' + (total - sessionsCache.indexOf(list[0]));
				const html = list
					.map((s) => {
						// Number chronologically so the oldest session is #1, newest #N.
						const num = total - sessionsCache.indexOf(s);
						const tags = (s.tags ?? [])
							.map((t) => `<span class="pill tag">${escapeHtml(t)}</span>`)
							.join('');
						const ents = fmtEntities(s.entities)
							.slice(0, 12)
							.map((e) => `<span class="pill entity">${escapeHtml(e)}</span>`)
							.join('');
						const extracted = s.observations_extracted_at
							? '<span class="extracted">obs ✓</span>'
							: '<span class="extracted pending">obs pending</span>';
						const transcript = renderActivity(s.messages ?? [], s.id, s.chat_guid);
						return `
							<div class="session-card" data-id="${s.id}">
								<div class="head">
									<span class="num">#${num}</span>
									<span class="range">${escapeHtml(fmtRange(s.started_at, s.ended_at))}</span>
									<span class="count">${s.message_count ?? 0} msgs</span>
									${extracted}
									<button class="delete-btn" data-action="delete" style="margin-left:auto" title="Delete this session and its messages">Delete</button>
								</div>
								<div class="summary">${escapeHtml(s.summary ?? '(no summary yet)')}</div>
								<div class="pills">${tags}${ents}</div>
								<div class="transcript">${transcript}</div>
							</div>
						`;
					})
					.join('');
				sessionsList.innerHTML = html || '<div class="sessions-empty">Session not found.</div>';
			}

			// Same bubble structure as renderChatThread (avatar + stack + who +
			// bubble, sender-run grouping) so a session reads like the Chat tab.
			// agent → right ("me", unlabeled); everyone else → left, labeled once
			// per run.
			function renderTranscript(msgs) {
				let html = '';
				let lastSender = null;
				for (const m of msgs) {
					const text = m.body || '';
					if (!text) continue;
					const isAgent = m.is_agent ?? m.is_from_me;
					const side = isAgent ? 'right' : 'left';
					// sender is resolved server-side (agent / PM label / raw handle).
					const sender = m.sender || (isAgent ? 'agent' : m.handle || 'unknown');
					const senderChanged = sender !== lastSender;
					const showSender = senderChanged && side === 'left';
					const avatarHtml =
						side === 'left'
							? senderChanged
								? chatAvatar(side, sender)
								: '<div class="avatar placeholder"></div>'
							: '';
					html +=
						'<div class="row ' + side + '">' +
							avatarHtml +
							'<div class="stack">' +
								(showSender ? '<div class="who">' + escapeHtml(sender) + '</div>' : '') +
								'<div class="bubble">' + escapeHtml(text) + '</div>' +
							'</div>' +
						'</div>';
					lastSender = sender;
				}
				return html;
			}

			// Activity view: interleave the session's messages with the agent's
			// turns (matched by session_id), steps before each agent reply. Each
			// step row opens its full args/result in the sticky detail pane.
			function sxDot(name) {
				if (name === 'read_memory' || name === 'read_profile') return 'dr';
				if (name === 'write_memory') return 'dm';
				if (name === 'set_vendor' || name === 'update_issue') return 'dv';
				if (name === 'draft_tenant' || name === 'draft_vendor') return 'dd';
				return 'ds';
			}
			// Steps render ABOVE the message; status renders BELOW it (matching the mock).
			function turnSteps(t) {
				const flat = [];
				for (const s of (t.steps || [])) for (const c of (s.tool_calls || [])) flat.push(c);
				// send_text is the agent bubble itself; use_skill is mechanics — skip both.
				const shown = flat.filter((c) => c.name && c.name !== 'send_text' && c.name !== 'use_skill');
				let rows = '';
				// Trigger row: what went INTO the agent (event + urgency; the detail
				// pane carries the conversation history and the full prompt it saw).
				const trigCid = t.turn_id + ':trigger';
				callById[trigCid] = { trigger: t, event: t.event };
				const urgent = t.trigger && t.trigger.payload && t.trigger.payload.issue && t.trigger.payload.issue.urgent;
				rows +=
					'<div class="sx-trow trigger" data-cid="' + escapeHtml(trigCid) + '">' +
						'<span class="sx-dot dt"></span>' + escapeHtml(t.event || 'trigger') +
						(urgent ? ' <span class="sx-urg">URGENT</span>' : '') +
						'<span class="sx-chev">▶</span>' +
					'</div>';
				for (const c of shown) {
					const cid = t.turn_id + ':' + flat.indexOf(c);
					callById[cid] = { call: c, event: t.event };
					const mem = c.name === 'write_memory' ? ' mem' : '';
					rows +=
						'<div class="sx-trow' + mem + '" data-cid="' + escapeHtml(cid) + '">' +
							'<span class="sx-dot ' + sxDot(c.name) + '"></span>' + escapeHtml(c.name) +
							'<span class="sx-chev">▶</span>' +
						'</div>';
				}
				return '<div class="sx-steps">' + rows + '</div>';
			}
			function turnStatus(kind) {
				if (kind === 'learn') {
					return '<div class="sx-status"><div class="sx-st agent">no reply drafted</div>' +
						'<div class="sx-st learn">learned</div></div>';
				}
				return '<div class="sx-status"><div class="sx-st agent">drafted by agent</div>' +
					'<div class="sx-st you">sent by you</div></div>';
			}
			function renderActivity(msgs, sessionId, chatGuid) {
				const list = (msgs || []).filter((m) => m.body);
				const norm = (s) => (s || '').trim();
				// Reply turns for this session, consumed in order as a fallback when an
				// agent bubble's text was edited off its drafted send_text (so the exact
				// turnByReply lookup misses). new_issue turns carry no session_id and stay
				// on the text-match path.
				const sessReplies = (turnsBySession[sessionId] || []).filter((t) => !usedTurns.has(t));
				const trigOf = (t) => norm(t && t.trigger && t.trigger.payload && t.trigger.payload.text);
				const firstLine = (s) => norm((s || '').split('\n')[0]);
				const sendTextOf = (t) => {
					for (const s of (t.steps || [])) for (const c of (s.tool_calls || []))
						if (c.name === 'send_text' && c.args) return c.args.content || '';
					return '';
				};
				// The opening WO-summary message ↔ its new_issue turn. ts/issue_id are
				// unreliable (turn predates the session, summary text gets edited), but the
				// first line "Unit X Address" survives edits — match on that within the guid.
				const openerTurn = (m) => (newIssueByGuid[chatGuid] || []).find(
					(t) => !usedTurns.has(t) && firstLine(sendTextOf(t)) && firstLine(sendTextOf(t)) === firstLine(m.body)
				);
				let html = '';
				let lastSender = null;
				let lastInbound = null; // norm text of the PM message immediately above the cursor
				const bubble = (m) => {
					const isAgent = m.is_agent ?? m.is_from_me;
					const side = isAgent ? 'right' : 'left';
					const sender = m.sender || (isAgent ? 'agent' : m.handle || 'unknown');
					const senderChanged = sender !== lastSender;
					const showSender = senderChanged && side === 'left';
					const avatarHtml = side === 'left'
						? (senderChanged ? chatAvatar(side, sender) : '<div class="avatar placeholder"></div>')
						: '';
					lastSender = sender;
					return '<div class="row ' + side + '">' + avatarHtml + '<div class="stack">' +
						(showSender ? '<div class="who">' + escapeHtml(sender) + '</div>' : '') +
						'<div class="bubble">' + escapeHtml(m.body) + '</div></div></div>';
				};
				for (const m of list) {
					const isAgent = m.is_agent ?? m.is_from_me;
					if (isAgent) {
						// steps that produced this reply render ABOVE it; status BELOW.
						// Exact text first (covers new_issue + unedited replies); then fall
						// back to the next unconsumed reply turn for this session — the agent
						// sends at most one reply per turn, so position is a safe match even
						// after the draft was edited.
						let reply = turnByReply[norm(m.body)];
						if (reply && usedTurns.has(reply)) reply = null;
						// turnByReply is keyed only by reply text and is global across the
						// loaded turns, so an identical agent line in ANOTHER session (e.g.
						// "got it") collides here. A reply turn carries its own session_id —
						// if it names a different session, it isn't ours; drop it and let the
						// session-scoped fallback below find the right turn. (new_issue openers
						// have null session_id and are claimed via openerTurn, so they pass.)
						if (reply && reply.session_id && reply.session_id !== sessionId) reply = null;
						// Fallback only when this bubble directly answers the PM message above
						// it AND the next pending reply turn was triggered by that same message
						// — so the new_issue opener and tapbacks can't steal a reply turn.
						if (!reply && lastInbound) {
							while (sessReplies.length && usedTurns.has(sessReplies[0])) sessReplies.shift();
							if (sessReplies.length && trigOf(sessReplies[0]) === lastInbound) reply = sessReplies.shift();
						}
						// Opener: the session's first agent bubble is the WO summary; show its
						// new_issue steps (read_memory → "checked memory", set_vendor) above it.
						if (!reply) reply = openerTurn(m);
						lastInbound = null;
						if (reply) {
							usedTurns.add(reply);
							html += turnSteps(reply);
							html += bubble(m);
							html += turnStatus('reply');
							continue;
						}
						html += bubble(m);
						continue;
					}
					html += bubble(m);
					lastInbound = norm(m.body);
					// a turn triggered by this inbound message that produced no reply (learn-only)
					const trig = turnByTrigger[norm(m.body)];
					// Same cross-session text collision guard as the reply path: a learn-only
					// turn that names a different session isn't this message's turn.
					if (trig && !usedTurns.has(trig) && (!trig.session_id || trig.session_id === sessionId)) { usedTurns.add(trig); html += turnSteps(trig); html += turnStatus('learn'); lastSender = 'agent'; lastInbound = null; }
				}
				return html;
			}
			// Detail-pane content for a trigger row: the event, urgency, the prior
			// turns the model was given, and the exact prompt it saw. Mirrors the
			// Turns tab's trigger block; turnTriggerSummary() is shared.
			function renderTriggerDetailHtml(t) {
				const trg = t.trigger || {};
				const issue = trg.payload && trg.payload.issue;
				const urgencyReason = issue && issue.urgency_reason;
				const hist = Array.isArray(trg.history) ? trg.history : [];
				let h =
					'<div class="sxd-head"><span class="sx-dot dt"></span>' + escapeHtml(t.event || 'trigger') + '</div>' +
					'<div class="sxd-meta">trigger' + (t.skill ? ' · ' + escapeHtml(t.skill) : '') + '</div>' +
					'<div class="sxd-sec"><div class="lbl">summary</div><div class="sxd-text">' + escapeHtml(turnTriggerSummary(t)) + '</div></div>';
				if (urgencyReason)
					h += '<div class="sxd-sec"><div class="lbl">' + (issue.urgent ? 'urgent' : 'not urgent') + '</div><div class="sxd-urg">' + escapeHtml(urgencyReason) + '</div></div>';
				if (hist.length)
					h += '<div class="sxd-sec"><div class="lbl">conversation history (' + hist.length + ' prior turns)</div><pre>' +
						escapeHtml(hist.map((m) => (m.role === 'assistant' ? 'agent' : 'pm') + ': ' + m.content).join('\n')) + '</pre></div>';
				if (trg.user_content)
					h += '<div class="sxd-sec"><div class="lbl">prompt the model saw</div><pre>' + escapeHtml(trg.user_content) + '</pre></div>';
				return h;
			}
			function renderSessionDetail(cid) {
				const e = callById[cid];
				const pane = sessionDetailPane();
				if (!e || !pane) return;
				if (e.trigger) { pane.innerHTML = renderTriggerDetailHtml(e.trigger); return; }
				const c = e.call;
				const obs = c.name === 'write_memory' && c.result && c.result.observation_id;
				pane.innerHTML =
					'<div class="sxd-head"><span class="sx-dot ' + sxDot(c.name) + '"></span>' + escapeHtml(c.name) + '</div>' +
					'<div class="sxd-meta">' + escapeHtml(e.event || '') + (c.ok === false ? ' · error' : '') + '</div>' +
					'<div class="sxd-sec"><div class="lbl">args in</div><pre>' + escapeHtml(JSON.stringify(c.args ?? {}, null, 2)) + '</pre></div>' +
					'<div class="sxd-sec"><div class="lbl">result out</div><pre>' + escapeHtml(JSON.stringify(c.result ?? {}, null, 2)) + '</pre></div>' +
					(obs ? '<a class="sxd-link" href="#" data-obs="' + escapeHtml(c.result.observation_id) + '">↗ open in memory graph</a>' : '');
			}
			sessionsList.addEventListener('click', (e) => {
				const row = e.target.closest('.sx-trow');
				if (!row) return;
				const ent = callById[row.dataset.cid];
				if (!ent) return;
				// Drill into a step via the shared modal (same overlay as Turns).
				if (ent.trigger) openTurnModal(renderTriggerDetailHtml(ent.trigger));
				else if (ent.call) openTurnModal(turnToolDetailHtml(ent.call));
			});

			sessionsList.addEventListener('click', async (e) => {
				const delBtn = e.target.closest('button[data-action="delete"]');
				if (!delBtn) return;
				const card = delBtn.closest('.session-card');
				const id = card?.dataset.id;
				if (!id) return;
				const summary = card.querySelector('.summary')?.textContent?.slice(0, 80) ?? '';
				if (!confirm(`Delete this session and its messages?\n\n${summary}…`)) return;
				const orig = delBtn.textContent;
				delBtn.textContent = 'Deleting…';
				delBtn.disabled = true;
				try {
					const res = await fetch('/api/sessions/' + encodeURIComponent(id), {
						method: 'DELETE'
					});
					if (!res.ok) throw new Error(await res.text());
					sessionsCache = sessionsCache.filter((s) => s.id !== id);
					card.remove();
					if (!sessionsCache.length) renderSessions();
				} catch (err) {
					delBtn.disabled = false;
					delBtn.textContent = orig;
					alert('Delete failed: ' + err.message);
				}
			});

			/* ─── Turns tab: orchestrator turn log ─────────────────────── */

			const turnsList = document.getElementById('turns-list');
			let turnsLoading = false;
			let turnsSig = null; // cheap change-detector; null (not '') so an empty turn list still renders its empty state once
			const turnsById = new Map(); // turn_id -> full turn row, for the expandable trace

			async function loadTurns({ silent = false } = {}) {
				if (turnsLoading) return;
				turnsLoading = true;
				if (!silent && !turnsList.querySelector('.turn-item')) {
					turnsList.innerHTML = '<div class="turns-empty">Loading turns…</div>';
				}
				try {
					// Per-workspace KPI feeds the change-signature; the strip itself is
					// rendered by loadKpi (center top).
					const reqs = [
						fetch('/api/turns?workspace=' + workspaceFilter + '&limit=300'),
						fetch('/kpi?workspace=' + encodeURIComponent(workspaceFilter))
					];
					const resps = await Promise.all(reqs);
					if (!resps[0].ok) throw new Error(await resps[0].text());
					const turns = await resps[0].json();
					const kpi = resps[1] ? await resps[1].json() : null;
					// Sig also tracks outcomes (so a late send/dismiss re-renders) and KPI.
					const sig =
						turns.map((t) => t.turn_id + '|' + (t.outcome ? t.outcome.action + (t.outcome.edited ? '*' : '') : '')).join(',') +
						(kpi ? '#' + kpi.sent_total + ':' + kpi.send_without_edit_rate : '');
					if (sig !== turnsSig) {
						turnsSig = sig;
						renderTurns(turns, kpi);
					}
				} catch (err) {
					if (!silent) {
						turnsList.innerHTML =
							'<div class="turns-empty">Failed to load turns: ' + escapeHtml(err.message) + '</div>';
					}
				} finally {
					turnsLoading = false;
				}
			}

			// Turn timestamps are stored UTC (ISO Z); render them in Pacific so
			// they match the wall clock we work against, regardless of host tz.
			const PT = 'America/Los_Angeles';
			function fmtTurnTime(iso) {
				if (!iso) return '—';
				return new Date(iso).toLocaleTimeString('en-US', {
					hour: '2-digit',
					minute: '2-digit',
					second: '2-digit',
					hour12: false,
					timeZone: PT
				});
			}
			function fmtTurnFull(iso) {
				if (!iso) return '';
				return new Date(iso).toLocaleString('en-US', {
					month: 'short',
					day: 'numeric',
					hour: '2-digit',
					minute: '2-digit',
					second: '2-digit',
					hour12: false,
					timeZone: PT,
					timeZoneName: 'short'
				});
			}

			// Use the PM-visible send time for sent work-order summaries. The
			// orchestrator can draft several minutes before a human sends the queue
			// item; threading by draft time makes later PM replies look attached to
			// work orders they had not seen yet.
			function turnTimelineTs(t) {
				if (
					t &&
					t.event === 'new_issue' &&
					t.outcome &&
					t.outcome.action === 'send' &&
					t.outcome.timestamp
				) return t.outcome.timestamp;
				return (t && t.ts) || '';
			}

			// The work order a turn actually resolved. new_issue carries it on the row;
			// a PM reply carries it in the tool calls it fired (dispatch, triage, and
			// close-out all pass issue_id). This — NOT wall-clock recency — is what a
			// reply should thread under. Reads from steps[].tool_calls (the top-level
			// tool_calls summary drops args); null when the turn touched no work order.
			function resolvedIssueIdForTurn(t) {
				if (t.event === 'new_issue') return t.issue_id || null;
				const flat = (Array.isArray(t.steps) && t.steps.length)
					? t.steps.flatMap((s) => s.tool_calls || [])
					: [];
				for (const c of flat) {
					if (!c || !c.args || !c.args.issue_id) continue;
					if (c.name === 'update_issue' || c.name === 'draft_tenant' || c.name === 'draft_vendor')
						return c.args.issue_id;
				}
				return null;
			}

			// Reorder the flat turn log into threads: a new_issue opens a thread for its
			// work order; the PM's later replies sit beneath the work order they RESOLVED
			// (by issue_id from the reply's tool calls), not merely the most-recent one on
			// the chat. A reply that resolved no work order falls back to the chat's
			// current thread by recency. Within a thread the new_issue is pinned first
			// and follow-ups run oldest→newest; threads are ordered by most-recent
			// activity so the freshest work order is at the top. Returns a flat array
			// with the first turn of each thread tagged _threadStart.
			function orderTurnsThreaded(turns) {
				const chrono = [...turns].sort((a, b) => new Date(turnTimelineTs(a)) - new Date(turnTimelineTs(b)));
				const threadByIssue = new Map();
				const threads = [];
				// Pass 1: open every new_issue's thread up front. The summary is drafted
				// earlier but SENT from the queue later, so a reply can be logged just
				// before its work order's recorded send time — pre-creating the thread
				// lets that reply still find its work order instead of bucketing under
				// the previous one (the kitchen-sink-under-dishwasher mis-thread).
				for (const t of chrono) {
					if (t.event !== 'new_issue') continue;
					const cur = [t];
					threads.push(cur);
					if (t.issue_id) threadByIssue.set(t.issue_id, cur);
				}
				// Pass 2: attach each follow-up turn — to its resolved work order's
				// thread when known, else to the thread of the PREVIOUS turn in this
				// chat, else a solo thread. A follow-up reason ("local plumber", "he is
				// local") carries no issue_id but continues the exchange right above it,
				// so we fall back to the last turn's thread — NOT the most-recent
				// new_issue. That keeps the answer with the work order the conversation
				// is actually on even when a newer summary was sent in the meantime.
				const lastThreadByChat = new Map();
				for (const t of chrono) {
					const chatKey = t.chat_guid || ('solo:' + (t.turn_id || threads.length));
					if (t.event === 'new_issue') {
						const own = t.issue_id && threadByIssue.get(t.issue_id);
						if (own) lastThreadByChat.set(chatKey, own);
						continue;
					}
					const rid = resolvedIssueIdForTurn(t);
					let cur = (rid && threadByIssue.get(rid)) || lastThreadByChat.get(chatKey);
					if (!cur) { cur = []; threads.push(cur); }
					lastThreadByChat.set(chatKey, cur);
					cur.push(t);
				}
				const recency = (th) => Math.max(...th.map((t) => new Date(turnTimelineTs(t)).getTime() || 0));
				for (const th of threads) {
					th.sort((a, b) => {
						if (a.event === 'new_issue' && b.event !== 'new_issue') return -1;
						if (b.event === 'new_issue' && a.event !== 'new_issue') return 1;
						return new Date(turnTimelineTs(a)) - new Date(turnTimelineTs(b));
					});
				}
				threads.sort((a, b) => recency(b) - recency(a));
				const flat = [];
				for (const th of threads) th.forEach((t, i) => { t._threadStart = i === 0; flat.push(t); });
				return flat;
			}

			function addMs(iso, ms) {
				if (!iso) return iso || '';
				const base = Date.parse(iso);
				if (!isFinite(base) || !ms) return iso;
				return new Date(base + ms).toISOString();
			}

			// One turn-log row can carry two actors: the PM/unknown sender who triggered
			// it (inbound message) and the agent's response (tools + outbound messages).
			// deriveTurn computes every field once; the timeline then renders them as
			// SEPARATE dots (sender, then agent) so the thread reads as alternating turns
			// instead of bundling the agent's reply under the sender's dot.
			function deriveTurn(t, idx) {
				const tid = t.turn_id || ('idx-' + idx);
				turnsById.set(tid, t);
				const failed = t.kind === 'failure';
				const skipped = t.kind === 'precheck_short_circuit';
				const iters = t.iterations != null ? ' · ' + t.iterations + 'it' : '';
				const dur = t.duration_ms != null ? (t.duration_ms / 1000).toFixed(1) + 's' : '—';
				const counts = [];
				if (t.outbox_count) counts.push(t.outbox_count + ' sent');
				if (t.drafts_count) counts.push(t.drafts_count + ' draft' + (t.drafts_count === 1 ? '' : 's'));
				const issue = t.trigger && t.trigger.payload && t.trigger.payload.issue;
				const refSub = issue ? ((issue.unit && issue.unit.name) || (issue.property && issue.property.name) || '') : '';
				// Inbound = the message that triggered the turn (the sender's words).
				// Outbound = every message the agent produced this turn, each {channel,text}.
				// The server attaches `t.outbound` — text replies (send_text) AND AppFolio
				// tenant/vendor dispatches (joined to their bodies by draft_id). Drafts are
				// shown exactly as sent — out of the loop. Fallback (turns logged before the
				// enrichment): text replies only, pulled from send_text args in steps.
				const stepCalls = (Array.isArray(t.steps) && t.steps.length) ? t.steps.flatMap((s) => s.tool_calls || []) : [];
				const inbound = (t.trigger && t.trigger.payload && t.trigger.payload.text) ? String(t.trigger.payload.text) : '';
				let outMsgs = [];
				if (Array.isArray(t.outbound) && t.outbound.length) {
					outMsgs = t.outbound.filter((o) => o && o.text).map((o) => ({ channel: o.channel || 'text', text: String(o.text) }));
				} else {
					for (const c of stepCalls) {
						if (c.name !== 'send_text' || !c.args) continue;
						const body = c.args.content || c.args.body;
						if (body) outMsgs.push({ channel: 'text', text: String(body) });
					}
					if (!outMsgs.length && t.outcome && Array.isArray(t.outcome.messages_final)) {
						for (const m of t.outcome.messages_final) { if (m) outMsgs.push({ channel: 'text', text: String(m) }); }
					}
				}
				// status chip (agent node): human disposition if reviewed, else 'sent'.
				let chip = '';
				if (failed) chip = '<span class="stc fail">failed</span>';
				else if (skipped) chip = '<span class="stc none">skipped</span>';
				else if (t.outcome) {
					const a = t.outcome.action;
					const lbl = a === 'send' ? 'sent' : a === 'copy' ? 'copied' : a === 'dismiss' ? 'dismissed' : a;
					chip = '<span class="stc ' + (a === 'dismiss' ? 'none' : 'good') + '">' + escapeHtml(lbl) + (t.outcome.edited ? ' · edited' : '') + '</span>';
				} else if (outMsgs.length) {
					chip = '<span class="stc good">sent</span>';
				}
				// steps = meaningful tool calls (skip send_text/use_skill), plain-English; click → modal
				const flat = stepCalls.length ? stepCalls : (t.tool_calls || []);
				const shown = flat.filter((c) => c.name && c.name !== 'send_text' && c.name !== 'use_skill');
				t._calls = shown;
				let stepsHtml = '';
				if (skipped) stepsHtml = '<div class="step muted">precheck · short-circuit</div>';
				else if (shown.length) {
					stepsHtml = shown.map((c, i) => {
						const ok = c.ok !== false;
						const label = STEP_LABEL[c.name] || c.name;
						return '<div class="step' + (ok ? '' : ' err') + (c.name === 'write_memory' ? ' mem' : '') + '" data-call="' + i + '">' +
							escapeHtml(label) + (ok ? '' : ' — failed') + '</div>';
					}).join('');
				}
				const jumpAttr =
					(t.session_id ? ' data-jump-session="' + escapeHtml(t.session_id) + '"' : '') +
					(t.issue_id ? ' data-jump-issue="' + escapeHtml(t.issue_id) + '"' : '');
				const metaTxt = dur + iters + (counts.length ? ' · ' + counts.join(' · ') : '');
				// t.ts is stamped at turn COMPLETION, so the inbound message arrived ~one
				// duration earlier: sender dot = turn start (t.ts − duration), agent dot =
				// completion (t.ts) — or, for a sent WO summary, the human send time.
				const senderTs = addMs(t.ts, -(t.duration_ms || 0));
				const agentTs = (t.event === 'new_issue') ? turnTimelineTs(t) : (t.ts || '');
				return { t, tid, failed, skipped, issue, refSub, inbound, outMsgs, chip, stepsHtml, jumpAttr, metaTxt, senderTs, agentTs };
			}

			// Sender dot: just the inbound message (PM or unknown #), on its own node.
			function renderSenderNode(v, threadStart) {
				const t = v.t;
				const cls = t.event === 'incoming_anon_message' ? 'anon' : 'user';
				const label = t.event === 'incoming_anon_message' ? 'Unknown #' : 'PM';
				return (
					'<div class="turn-item tl-item' + (threadStart ? ' tl-thread-start' : '') + '" data-turn-id="' + escapeHtml(v.tid) + '">' +
						'<div class="tl-entry">' +
							'<div class="tl-node ev-' + cls + '"></div>' +
							'<div class="tl-hd">' +
								'<span class="tl-time" title="' + escapeHtml(fmtTurnFull(v.senderTs)) + '">' + escapeHtml(fmtTurnTime(v.senderTs)) + '</span>' +
								'<span class="tl-ev ' + cls + '">' + escapeHtml(label) + '</span>' +
							'</div>' +
							(v.inbound ? '<div class="tl-in"' + v.jumpAttr + '>' + escapeHtml(v.inbound) + '</div>' : '') +
						'</div>' +
					'</div>'
				);
			}

			// Agent dot: the agent's response — outbound messages (shown as sent) plus the
			// tools it called, on its own node.
			function renderAgentNode(v, threadStart) {
				const t = v.t;
				const issue = v.issue;
				const urgent = issue && issue.urgent;
				// Keep the descriptive summary for new work orders; for replies the bubbles
				// speak for themselves, so summarize only when there's no outbound message.
				let sum = '';
				if (t.event === 'new_issue') sum = turnSummary(t);
				else if (!v.outMsgs.length) sum = v.failed ? 'Reply failed' : (v.stepsHtml ? 'Triaged — no message' : 'No reply needed');
				return (
					'<div class="turn-item tl-item' + (v.failed ? ' failure' : '') + (threadStart ? ' tl-thread-start' : '') + '" data-turn-id="' + escapeHtml(v.tid) + '">' +
						'<div class="tl-entry">' +
							'<div class="tl-node ev-new"></div>' +
							'<div class="tl-hd">' +
								'<span class="tl-time" title="' + escapeHtml(fmtTurnFull(v.agentTs)) + '">' + escapeHtml(fmtTurnTime(v.agentTs)) + '</span>' +
								'<span class="tl-ev agent">Agent</span>' +
								(urgent ? '<span class="iurgent">urgent</span>' : '') +
								v.chip +
							'</div>' +
							(sum ? '<div class="tl-sum">' + escapeHtml(sum) + '</div>' : '') +
							(issue && issue.name ? '<div class="tl-ref"' + v.jumpAttr + '>↳ ' + escapeHtml(issue.name) + (v.refSub ? ' <span class="sub">· ' + escapeHtml(v.refSub) + '</span>' : '') + '</div>' : '') +
							v.outMsgs.map((o) => {
								const tag = (o.channel && o.channel !== 'text') ? '<span class="tl-chan">' + escapeHtml(queueActionLabel(o.channel)) + '</span>' : '';
								return '<div class="tl-out"' + v.jumpAttr + '>' + tag + escapeHtml(o.text) + '</div>';
							}).join('') +
							(v.stepsHtml ? '<div class="tl-steps">' + v.stepsHtml + '</div>' : '') +
							'<div class="tl-meta">' + escapeHtml(v.metaTxt) + '</div>' +
						'</div>' +
					'</div>'
				);
			}

			function renderTurns(turns, kpi) {
				// KPI now lives in the center top strip (loadKpi) — not duplicated here.
				const kpiHtml = '';
				if (!turns.length) {
					turnsList.innerHTML =
						kpiHtml + '<div class="turns-empty">No turns logged yet for ' + escapeHtml(workspaceFilter) + '.</div>';
					return;
				}
				turnsById.clear();
				const out = [];
				orderTurnsThreaded(turns).forEach((t, idx) => {
					const v = deriveTurn(t, idx);
					const threadStart = !!(t._threadStart && idx > 0);
					// Split one turn into up to two dots: the sender (inbound) then the
					// agent (response). new_issue is agent-only (proactive); a bare inbound
					// with no agent action stays sender-only.
					const hasSender = !!v.inbound && (t.event === 'incoming_user_message' || t.event === 'incoming_anon_message');
					const agentActed = t.event === 'new_issue' || v.failed || v.skipped || v.outMsgs.length > 0 || !!v.stepsHtml;
					const roles = [];
					if (hasSender) roles.push('sender');
					if (agentActed) roles.push('agent');
					if (!roles.length) roles.push(hasSender ? 'sender' : 'agent');
					roles.forEach((role, i) => {
						const ts = threadStart && i === 0;
						out.push(role === 'sender' ? renderSenderNode(v, ts) : renderAgentNode(v, ts));
					});
				});
				turnsList.innerHTML = kpiHtml + out.join('');
			}

			// Build the expandable trace for one turn: trigger + per-iteration steps.
			function turnTriggerSummary(t) {
				const p = t.trigger && t.trigger.payload;
				if (t.event === 'new_issue' && p && p.issue) {
					const i = p.issue;
					const bits = [i.name];
					if (i.unit && i.unit.name) bits.push(i.unit.name);
					else if (i.property && i.property.name) bits.push(i.property.name);
					if (i.tenant && i.tenant.name) bits.push('tenant ' + i.tenant.name);
					if (i.urgent) bits.push('urgent');
					return bits.filter(Boolean).join(' · ');
				}
				if (t.event === 'incoming_user_message' && p && p.text) return '“' + p.text + '”';
				return t.event || 'turn';
			}

			function turnJsonBlock(label, obj) {
				let s;
				try { s = JSON.stringify(obj, null, 2); } catch { s = String(obj); }
				return '<div class="td-kv"><span class="k">' + label + '</span>' + escapeHtml(s) + '</div>';
			}

			// Absolute timestamp for the outcome line. (Was the History column's;
			// now only used here, so rendered in Pacific to match the rest of Turns.)
			function fmtAbsolute(iso) {
				const d = new Date(iso);
				const tm = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZone: PT });
				const day = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: PT });
				return `${day} ${tm}`;
			}

			function renderTurnDetail(t) {
				if (t.kind === 'precheck_short_circuit') {
					return '<div class="td-empty">Short-circuited by a pre-check before the model ran.</div>';
				}
				const steps = t.steps;
				const hasSteps = Array.isArray(steps) && steps.length;
				if (!hasSteps && !t.outcome) {
					return '<div class="td-empty">No trace captured — this turn predates trace logging.</div>';
				}
				let html = '';
				if (t.trigger) {
					const issue = t.trigger.payload && t.trigger.payload.issue;
					const urgencyReason = issue && issue.urgency_reason;
					html +=
						'<div class="td-trigger">' +
							'<div class="lbl">▸ trigger · ' + escapeHtml(t.event || '') + '</div>' +
							'<div class="body">' + escapeHtml(turnTriggerSummary(t)) + '</div>' +
							(urgencyReason
								? '<div class="td-urgency' + (issue.urgent ? ' on' : '') + '">' +
								  '<span class="ulbl">' + (issue.urgent ? 'urgent' : 'not urgent') + '</span>' +
								  escapeHtml(urgencyReason) + '</div>'
								: '') +
							(Array.isArray(t.trigger.history) && t.trigger.history.length
								? '<details class="td-det"><summary>conversation history (' +
								  t.trigger.history.length + ' prior turns)</summary><pre>' +
								  escapeHtml(t.trigger.history.map(function (m) {
									return (m.role === 'assistant' ? 'agent' : 'pm') + ': ' + m.content;
								  }).join('\n')) + '</pre></details>'
								: '') +
							(t.trigger.user_content
								? '<details class="td-det"><summary>prompt the model saw</summary><pre>' +
								  escapeHtml(t.trigger.user_content) + '</pre></details>'
								: '') +
						'</div>';
				}
				if (hasSteps) {
					for (const s of steps) {
						const calls = s.tool_calls ?? [];
						html += '<div class="td-step"><div class="td-dot">' + escapeHtml(String(s.i ?? '·')) + '</div><div class="td-sbody">';
						if (s.reasoning) html += '<div class="td-reason">“' + escapeHtml(s.reasoning) + '”</div>';
						if (s.dropped_plain_content)
							html += '<div class="td-drop">⚠ model spoke without calling a tool — output dropped</div>';
						for (const c of calls) {
							const ok = c.ok !== false;
							html +=
								'<details class="td-tcall' + (ok ? '' : ' err') + '">' +
									'<summary><span class="tname' + (ok ? '' : ' err') + '">' + escapeHtml(c.name || '?') +
									(ok ? '' : ' ✕') + '</span>' +
									(c.error ? '<span class="td-cerr">' + escapeHtml(c.error) + '</span>' : '') +
									'</summary>' +
									turnJsonBlock('args in', c.args ?? {}) +
									turnJsonBlock('result out', c.result ?? {}) +
								'</details>';
						}
						if (!s.reasoning && !calls.length && !s.dropped_plain_content)
							html += '<div class="td-reason muted">(no output this step)</div>';
						html += '</div></div>';
					}
				}
				// Human outcome (folded-in History): disposition + edit diff + notes.
				if (t.outcome) {
					const o = t.outcome;
					const a = o.action;
					const label = a === 'send' ? 'sent' : a === 'copy' ? 'copied' : a === 'dismiss' ? 'dismissed' : a;
					const acls = a === 'send' ? 'send' : a === 'dismiss' ? 'dismiss' : 'copy';
					const finals = o.messages_final || [];
					const origs = o.messages_original || [];
					let bubbles = '';
					const n = Math.max(finals.length, origs.length);
					for (let i = 0; i < n; i++) {
						const orig = origs[i] || '';
						const fin = finals[i] || '';
						bubbles +=
							orig && fin && orig !== fin
								? '<div class="td-bubble"><span class="strike">' + escapeHtml(orig) + '</span>' + escapeHtml(fin) + '</div>'
								: '<div class="td-bubble">' + escapeHtml(fin || orig) + '</div>';
					}
					html +=
						'<div class="td-outcome">' +
							'<div class="td-olbl">' +
								'<span class="oc ' + acls + '">→ ' + escapeHtml(label) + '</span>' +
								(o.edited ? '<span class="edited-pill">edited</span>' : '') +
								(o.forced_send ? '<span class="edited-pill forced">forced</span>' : '') +
								'<span class="td-owhen">' + escapeHtml(fmtAbsolute(o.timestamp)) + '</span>' +
							'</div>' +
							bubbles +
							(o.draft_id ? '<div class="notes td-notes" data-draft-id="' + escapeHtml(o.draft_id) + '"></div>' : '') +
						'</div>';
				}
				return html;
			}

			// Turn → session deep-link: jump to the Sessions tab, then scroll to
			// and flash the matching card once loadSessions() has rendered it.
			function jumpFromTurn(sid, issueId) {
				if (sid) {
					const el = document.querySelector('.chat-thread [data-session="' + (window.CSS?.escape ? CSS.escape(sid) : sid) + '"]');
					const sep = el && (el.closest('.day-sep') || el);
					if (sep) {
						sep.scrollIntoView({ behavior: 'smooth', block: 'center' });
						sep.classList.remove('tl-flash'); void sep.offsetWidth; sep.classList.add('tl-flash');
						setTimeout(() => sep.classList.remove('tl-flash'), 1700);
					}
				}
				if (issueId) {
					document.querySelectorAll('.issue-row.sel').forEach((x) => x.classList.remove('sel'));
					const ir = document.querySelector('.issue-row[data-issue-id="' + (window.CSS?.escape ? CSS.escape(issueId) : issueId) + '"]');
					if (ir) { ir.classList.add('sel'); ir.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
				}
			}
			// Plain-English labels for the timeline steps (raw tool names → readable).
			const STEP_LABEL = {
				read_memory: 'checked memory', read_profile: 'read profile', write_memory: 'saved a belief',
				set_vendor: 'set the vendor', update_issue: 'updated the work order', draft_tenant: 'drafted tenant text', draft_vendor: 'drafted vendor dispatch',
				read_thread: 'read the thread'
			};
			function turnSummary(t) {
				const ev = t.event;
				const sent = t.outcome && t.outcome.action === 'send';
				const drafted = (t.drafts_count || 0) > 0;
				const vendor = (t.tool_calls || []).some((c) => c.name === 'draft_vendor');
				if (ev === 'new_issue') {
					if (sent) return 'New work order → drafted & sent';
					if (drafted) return 'New work order → drafted ' + (vendor ? 'vendor dispatch' : 'PM text');
					if (t.kind === 'precheck_short_circuit') return 'New work order → skipped (precheck)';
					return 'New work order → triaged, no message';
				}
				if (ev === 'incoming_user_message') {
					if (sent) return 'PM replied → drafted & sent';
					if (drafted) return 'PM replied → drafted a reply';
					return 'PM replied → no action needed';
				}
				if (ev === 'incoming_anon_message') return t.kind === 'failure' ? 'Unknown number → reply failed' : 'Unknown number → handled';
				return ev || 'turn';
			}
			function turnToolDetailHtml(c) {
				return '<div class="sxd-head"><span class="sx-dot ' + sxDot(c.name) + '"></span>' + escapeHtml(c.name || '?') + (c.ok === false ? ' · error' : '') + '</div>' +
					(c.error ? '<div class="sxd-meta" style="color:#f08089">' + escapeHtml(c.error) + '</div>' : '') +
					'<div class="sxd-sec"><div class="lbl">args in</div><pre>' + escapeHtml(JSON.stringify(c.args ?? {}, null, 2)) + '</pre></div>' +
					'<div class="sxd-sec"><div class="lbl">result out</div><pre>' + escapeHtml(JSON.stringify(c.result ?? {}, null, 2)) + '</pre></div>';
			}

			// Drill-in modal (the approved mock): a centered overlay, not an inline expand.
			const turnModalBack = document.createElement('div'); turnModalBack.className = 'turn-modal-back';
			const turnModal = document.createElement('div'); turnModal.className = 'turn-modal';
			turnModal.innerHTML = '<button class="tm-close" aria-label="close">×</button><div class="tm-body"></div>';
			const zoomwrapEl = document.getElementById('zoomwrap');
			zoomwrapEl.appendChild(turnModalBack);
			zoomwrapEl.appendChild(turnModal);
			const turnModalBody = turnModal.querySelector('.tm-body');
			function openTurnModal(html) { turnModalBody.innerHTML = html; turnModalBack.classList.add('show'); turnModal.classList.add('show'); turnModalBody.scrollTop = 0; }
			function closeTurnModal() { turnModalBack.classList.remove('show'); turnModal.classList.remove('show'); }
			turnModalBack.addEventListener('click', closeTurnModal);
			turnModal.querySelector('.tm-close').addEventListener('click', closeTurnModal);
			document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && turnModal.classList.contains('show')) closeTurnModal(); });
			turnModalBody.addEventListener('click', (e) => {
				const l = e.target.closest('.sxd-link[data-obs]');
				if (l) { e.preventDefault(); closeTurnModal(); focusObservation(l.dataset.obs); }
			});

			turnsList.addEventListener('click', (e) => {
				// Reference / preview → jump to the chat session + issue (no drill-in).
				const jp = e.target.closest('[data-jump-session],[data-jump-issue]');
				if (jp) { e.stopPropagation(); jumpFromTurn(jp.dataset.jumpSession, jp.dataset.jumpIssue); return; }
				const item = e.target.closest('.turn-item');
				if (!item) return;
				const t = turnsById.get(item.dataset.turnId);
				if (!t) return;
				// A step opens that tool call's args/output; the rest of the entry opens
				// the trigger detail (event + system prompt + history + the prompt it saw).
				const step = e.target.closest('[data-call]');
				if (step) {
					const c = (t._calls || [])[Number(step.dataset.call)];
					if (c) openTurnModal(turnToolDetailHtml(c));
					return;
				}
				openTurnModal(renderTriggerDetailHtml(t));
			});

			// Live-ish refresh while the Turns tab is open. Silent so it only
			// rebuilds the DOM when a genuinely new turn lands (turnsSig guard).
			setInterval(() => {
				if (drawer === 'turns') loadTurns({ silent: true });
			}, 3000);

			/* ─── Chat tab: drafts rail + iMessage thread ─────────────── */

			const chatThreadEl = document.getElementById('chat-thread');
			const chatDraftsRailEl = document.getElementById('chat-drafts-rail');
			let chatThreadCache = null;
			let chatThreadLoading = false;
			let chatThreadPoller = null;
			let renderedChatThreadKey = '';
			let renderedChatDraftIds = '';

			function chatThreadWorkspace() {
				return workspaceFilter;
			}

			// ── Manual composer ────────────────────────────────────────────
			// Sends a hand-typed message to the active workspace's chat via the
			// same dylib path the agent uses, then refreshes the thread + KPIs.
			const composerForm = document.getElementById('chat-composer');
			const composerInput = document.getElementById('composer-input');
			const composerSend = document.getElementById('composer-send');

			function autoSizeComposer() {
				composerInput.style.height = 'auto';
				composerInput.style.height = Math.min(composerInput.scrollHeight, 160) + 'px';
			}
			composerInput.addEventListener('input', autoSizeComposer);

			let composerSending = false;
			async function sendManualMessage() {
				const body = composerInput.value.trim();
				if (!body || composerSending) return;
				composerSending = true;
				composerSend.disabled = true;
				const ws = workspaceFilter;
				try {
					const res = await fetch('/api/manual-send?workspace=' + encodeURIComponent(ws), {
						method: 'POST',
						headers: { 'content-type': 'application/json' },
						body: JSON.stringify({ workspace: ws, body })
					});
					if (!res.ok) throw new Error(await res.text());
					composerInput.value = '';
					autoSizeComposer();
					// Pull the new send into the thread + counts right away rather than
					// waiting on the 4s poll tick. Update IN PLACE: don't null the cache
					// or reset the render key, or the thread flashes the "Loading…"
					// placeholder and fully rebuilds (looks like a page refresh). The
					// draft-send path leaves both intact; the new send's guid changes the
					// render key on its own, so renderChatThread still appends the row.
					loadChatThread();
					loadKpi();
					toast('Sent.');
				} catch (err) {
					toast('Send failed: ' + err.message, 'error');
				} finally {
					composerSending = false;
					composerSend.disabled = false;
					composerInput.focus();
				}
			}

			composerForm.addEventListener('submit', (e) => {
				e.preventDefault();
				sendManualMessage();
			});
			// Enter sends, Shift+Enter inserts a newline (iMessage convention).
			composerInput.addEventListener('keydown', (e) => {
				if (e.key === 'Enter' && !e.shiftKey) {
					e.preventDefault();
					sendManualMessage();
				}
			});

			async function loadChatThread() {
				if (chatThreadLoading) return;
				chatThreadLoading = true;
				if (!chatThreadCache) {
					chatThreadEl.innerHTML = '<div class="empty">Loading conversation…</div>';
				}
				try {
					const [tRes, dRes] = await Promise.all([
						fetch('/api/chat-thread?workspace=' + chatThreadWorkspace()),
						fetch('/api/drafts')
					]);
					// Render the drafts rail FIRST and independently of the thread
					// fetch. The chat.db read behind /api/chat-thread can intermittently
					// 500 (SQLITE_BUSY while Messages writes); that must not blank the
					// rail, whose data comes from the separate /api/drafts endpoint.
					if (dRes.ok) {
						const allDrafts = await dRes.json();
						lastAllDrafts = allDrafts;
						renderChatDrafts(allDrafts);
					}
					if (!tRes.ok) throw new Error(await tRes.text());
					chatThreadCache = await tRes.json();
					renderChatThread();
				} catch (err) {
					// Only show the thread-error placeholder if we have nothing
					// painted yet; a transient poll failure shouldn't wipe a thread
					// that already loaded.
					if (!chatThreadCache) {
						chatThreadEl.innerHTML =
							'<div class="empty">Failed to load thread: ' + escapeHtml(err.message) + '</div>';
					}
				} finally {
					chatThreadLoading = false;
				}
				if (!chatThreadPoller) {
					chatThreadPoller = setInterval(() => {
						loadChatThread();
					}, 4000);
				}
			}

			const chatCardRefs = new Map();

			function renderChatDrafts(allDrafts) {
				// Mirror the Work Orders pane: same passesFilter() against the
				// active workspace toggle (prod | test), so anything visible in
				// Work Orders is also listed in the chat rail.
				const drafts = orderedQueueItems((allDrafts ?? [])
					.filter((d) => passesFilter(d.workspace_label))
					.filter((d) => !pendingDismiss.has(d.id)));
				const idsKey = drafts.map((d) => d.id).join('|');
				if (idsKey === renderedChatDraftIds && drafts.length > 0) {
					for (const d of drafts) {
						const ref = chatCardRefs.get(d.id);
						if (ref?.ageEl) ref.ageEl.textContent = fmtAge(d.created_at);
					}
					return;
				}
				renderedChatDraftIds = idsKey;
				chatCardRefs.clear();
				chatDraftsRailEl.innerHTML = '';

				if (!drafts.length) {
					const e = document.createElement('div');
					e.className = 'rail-empty';
					e.textContent = 'No pending actions.';
					chatDraftsRailEl.appendChild(e);
					return;
				}

					for (const [i, d] of drafts.entries()) {
						chatDraftsRailEl.appendChild(createDraftCard(d, chatCardRefs, { showActions: i === 0 }));
					}
				// Cards just landed; ensure their textareas size correctly even
				// if the chat tab was hidden when render() fired upstream.
				requestAnimationFrame(resizeAllDraftTextareas);
			}

			function chatSenderLabel(msg) {
				// Left side = the PM persona (per-workspace label: 'Jose' for
				// prod, 'Test User' for test). Right side ("me") is implicit
				// and never shown.
				const pmLabel = chatThreadCache?.pm_label ?? 'Jose';
				return msg.side === 'left' ? pmLabel : 'me';
			}

			function cleanChatText(s) {
				if (!s) return '';
				// Apple's tapback strings leak through chat.db as "+%Liked …" or
				// similar — strip the prefix junk so they read like iMessage.
				return s.replace(/^[+%\s]+(?=(Liked|Loved|Disliked|Laughed|Emphasized|Questioned)\b)/, '').trim();
			}

			function chatAvatar(side, label) {
				if (side === 'right') return '';
				const initial = (label || 'J').charAt(0).toUpperCase();
				return `<div class="avatar">${escapeHtml(initial)}</div>`;
			}

			function fmtDayHeader(d) {
				const now = new Date();
				const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
				const yest = new Date(today.getTime() - 86400000);
				const day = new Date(d.getFullYear(), d.getMonth(), d.getDate());
				const time = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
				if (day.getTime() === today.getTime()) return `Today ${time}`;
				if (day.getTime() === yest.getTime()) return `Yesterday ${time}`;
				const diffDays = Math.round((today - day) / 86400000);
				if (diffDays < 7) {
					const wd = d.toLocaleDateString([], { weekday: 'long' });
					return `${wd} ${time}`;
				}
				return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' + time;
			}

			// Open the Sessions tab and scroll/flash a specific session card.
			function focusSession(sid) {
				if (!sid) return;
				sessionFocusId = sid; // renderSessions renders just this one into the drawer
				setDrawer('sessions');
			}

			// "open in memory graph" from a session tool-call detail (write_memory).
			// Switch to the memory tab + graph mode, then once the graph has loaded
			// select + highlight the observation node and open its detail panel.
			function focusObservation(obsId) {
				if (!obsId) return;
				memoryView = 'graph';
				localStorage.setItem(MEMORY_VIEW_KEY, memoryView);
				openMemory(); // opens the full-screen overlay + loadMemoryGraph()
				applyMemoryView(); // force graph (not list) mode
				let tries = 0;
				const iv = setInterval(() => {
					const obs = (memoryState.observations || []).find((o) => o.id === obsId);
					// Wait for both the data AND the rendered nodes — highlight reads
					// the d3-bound DOM, which only exists after renderGraph().
					if (obs && svgEl.querySelector('.node')) {
						clearInterval(iv);
						selectedNodeId = obsId;
						highlightNeighborhood(obsId);
						showDetail(obs);
					} else if (++tries > 30) {
						clearInterval(iv);
					}
				}, 100);
			}

			// The link lives inside the (persistent) session-detail pane; its
			// innerHTML is rebuilt per click, so delegate off the stable container.
			document.getElementById('session-detail').addEventListener('click', (e) => {

				if (!link) return;

			// Session links in the thread's boundary headers.
			chatThreadEl.addEventListener('click', (e) => {

				if (!btn) return;
				e.stopPropagation();

			});

			function renderChatThread() {
				if (!chatThreadCache) return;
				const msgs = chatThreadCache.messages ?? [];
				// session_id in the key so boundaries repaint when the sessionizer
				// (re)assigns sessions, even if the message set is unchanged.
				const key = msgs.map((m) => m.guid + ':' + (m.session_id || '')).join('|');
				// Skip rebuild only if the same set of rows is already painted.
				// Empty-msgs case must not match the initial empty key, otherwise
				// the "Loading conversation…" placeholder never gets cleared.
				const hasRows = chatThreadEl.querySelector('.row, .day-sep');
				if (msgs.length > 0 && key === renderedChatThreadKey && hasRows) return;
				renderedChatThreadKey = key;

				if (!msgs.length) {
					chatThreadEl.innerHTML = '<div class="empty">No messages in this thread yet.</div>';
					return;
				}

				const frag = document.createDocumentFragment();
				let lastSessionId = null;
				let drewHeader = false;
				let lastSender = null;
				for (const m of msgs) {
					const ts = m.ts ? new Date(m.ts) : null;
					const sender = chatSenderLabel(m);
					const text = cleanChatText(m.text);
					if (!text) continue;

					// Break the thread on sessionizer boundaries (a new session_id),
					// not on the clock. Keep the same centered day+time look, and
					// hang a "session →" link off it. The very first message also
					// gets a header so the top isn't bare.
					const sid = m.session_id || null;
					const newSession = sid && sid !== lastSessionId;
					if (ts && (newSession || !drewHeader)) {
						const sep = document.createElement('div');
						sep.className = 'day-sep';
						if (sid) {
							sep.innerHTML =
								'<span class="ds-when">' + escapeHtml(fmtDayHeader(ts)) + '</span>' +
								'<button class="ds-session" data-session="' + escapeHtml(sid) + '">session →</button>';
						} else {
							sep.textContent = fmtDayHeader(ts);
						}
						frag.appendChild(sep);
						drewHeader = true;
					}
					if (sid) lastSessionId = sid;

					const senderChanged = sender !== lastSender;
					// Only label the LEFT side (jose). Right side ("me") is
					// implied — iMessage never labels your own messages.
					const showSender = senderChanged && m.side === 'left';

					const row = document.createElement('div');
					row.className = 'row ' + m.side;
					const avatarHtml =
						m.side === 'left'
							? senderChanged
								? chatAvatar(m.side, sender)
								: '<div class="avatar placeholder"></div>'
							: '';
					row.innerHTML =
						avatarHtml +
						`<div class="stack">` +
						(showSender ? `<div class="who">${escapeHtml(sender)}</div>` : '') +
						`<div class="bubble">${escapeHtml(text)}</div>` +
						(m.edited ? `<div class="edited-tag">edited</div>` : '') +
						`</div>`;
					frag.appendChild(row);
					lastSender = sender;
				}

				chatThreadEl.innerHTML = '';
				chatThreadEl.appendChild(frag);
				// Scroll the thread (its own scroll container) to the bottom.
				requestAnimationFrame(() => {
					chatThreadEl.scrollTop = chatThreadEl.scrollHeight;
				});
			}

			// Workspace for memory view (prod | test).
			function memoryWorkspace() {
				return workspaceFilter;

			const svgEl = document.getElementById('memory-graph');
			const detailEl = document.getElementById('memory-detail');

			const cancelBeliefBtn = document.getElementById('cancel-belief');
			const submitBeliefBtn = document.getElementById('submit-belief');
			const dialogTitleEl = document.getElementById('belief-dialog-title');
			const confOut = document.getElementById('conf-out');

			let memoryState = { observations: [], beliefs: [], edges: [] };
			let editingBeliefId = null; // null when creating new
			let simulation = null;
			let selectedNodeId = null;
			let hoveredNodeId = null;
			// Set of matched node ids while a search is active, else null. When
			// non-null the search dim takes priority: hover/click must not undim.
			let searchMatched = null;

			// AABB separation force. Each node carries `_bbox` (the rendered
			// bounding box of its circle + label, relative to its center).
			// On every tick we resolve overlaps along the shorter axis,
			// which keeps wide-but-short label rectangles from spacing
			// nodes apart vertically.
			function rectCollide(pad = 4) {
				let nodes;
				function force() {
					for (let i = 0; i < nodes.length; i++) {
						const a = nodes[i];
						const ab = a._bbox;
						if (!ab) continue;
						const ax1 = a.x + ab.x - pad, ax2 = ax1 + ab.w + 2 * pad;
						const ay1 = a.y + ab.y - pad, ay2 = ay1 + ab.h + 2 * pad;
						for (let j = i + 1; j < nodes.length; j++) {
							const b = nodes[j];
							const bb = b._bbox;
							if (!bb) continue;
							const bx1 = b.x + bb.x - pad, bx2 = bx1 + bb.w + 2 * pad;
							const by1 = b.y + bb.y - pad, by2 = by1 + bb.h + 2 * pad;
							if (ax2 <= bx1 || bx2 <= ax1 || ay2 <= by1 || by2 <= ay1) continue;
							const overlapX = Math.min(ax2, bx2) - Math.max(ax1, bx1);
							const overlapY = Math.min(ay2, by2) - Math.max(ay1, by1);
							if (overlapX < overlapY) {
								const shift = overlapX / 2;
								if (a.x < b.x) { a.x -= shift; b.x += shift; }
								else { a.x += shift; b.x -= shift; }
							} else {
								const shift = overlapY / 2;
								if (a.y < b.y) { a.y -= shift; b.y += shift; }
								else { a.y += shift; b.y -= shift; }
							}
						}
					}
				}
				force.initialize = (n) => { nodes = n; };
				return force;
			}

			async function loadMemoryGraph() {
				try {
					const res = await fetch(`/api/memory/graph?workspace=${memoryWorkspace()}`);
					if (!res.ok) throw new Error(await res.text());
					memoryState = await res.json();
					renderGraph();
					renderBeliefList();
				} catch (err) {
					toast(`memory load failed: ${err.message}`, 'error');
				}
			}

			/* ── Memory list view ──────────────────────────────────────── */

			const MEMORY_VIEW_KEY = 'bedrock.memoryView';
			let memoryView = localStorage.getItem(MEMORY_VIEW_KEY) || 'graph';
			const memoryListPane = document.getElementById('memory-list-pane');
			const memoryGraphPane = document.getElementById('memory-graph-pane');
			const memoryListEl = document.getElementById('memory-list');
			// Search + sort inputs removed in the 3-column list; keep null-safe refs.
			const memoryListSearch = document.getElementById('memory-list-search');
			const memoryListSort = document.getElementById('memory-list-sort');
			const memoryListCount = document.getElementById('memory-list-count');

			function applyMemoryView() {
				document.body.classList.toggle('memory-list-mode', memoryView === 'list');
				memoryListPane.hidden = memoryView !== 'list';
				memoryGraphPane.hidden = memoryView !== 'graph';
				for (const btn of document.querySelectorAll('#memory-view-toggle button')) {
					btn.classList.toggle('active', btn.dataset.view === memoryView);
				}
				if (memoryView === 'list') {
					renderBeliefList();
					renderObsList();
					loadEntities();
				}
			}
			document.getElementById('memory-view-toggle').addEventListener('click', (e) => {
				const btn = e.target.closest('button[data-view]');
				if (!btn) return;
				memoryView = btn.dataset.view;
				localStorage.setItem(MEMORY_VIEW_KEY, memoryView);
				applyMemoryView();
			});
			applyMemoryView();

			function renderBeliefList() {
				if (memoryView !== 'list') return;
				const evidenceByBelief = {};
				for (const e of memoryState.edges ?? []) {
					evidenceByBelief[e.belief_id] = (evidenceByBelief[e.belief_id] || 0) + 1;
				}
				const q = memoryListSearch ? memoryListSearch.value.trim().toLowerCase() : '';
				const sort = memoryListSort ? memoryListSort.value : 'evidence';
				let rows = (memoryState.beliefs ?? []).map((b) => ({
					...b,
					evidence: evidenceByBelief[b.id] || 0
				}));
				if (q) {
					rows = rows.filter((b) => {
						const hay = `${b.claim} ${JSON.stringify(b.scope ?? {})} ${(b.tags ?? []).join(' ')}`.toLowerCase();
						return hay.includes(q);
					});
				}
				rows.sort((a, b) => {
					if (sort === 'confidence') return b.confidence - a.confidence;
					if (sort === 'updated') return new Date(b.updated_at) - new Date(a.updated_at) > 0 ? -1 : 1;
					if (sort === 'claim') return a.claim.localeCompare(b.claim);
					// default: evidence desc, then confidence desc
					if (b.evidence !== a.evidence) return b.evidence - a.evidence;
					return b.confidence - a.confidence;
				});
				memoryListCount.textContent = `${rows.length}/${memoryState.beliefs?.length ?? 0}`;
				if (!rows.length) {
					memoryListEl.innerHTML =
						'<div class="memory-empty" style="position:static;padding:40px 0;text-align:center">No beliefs match.</div>';
					return;
				}
				memoryListEl.innerHTML = rows
					.map((b) => {
						const scopePills = Object.entries(b.scope ?? {})
							.map(([k, v]) => `<span class="pill scope">${escapeHtml(k)}=${escapeHtml(typeof v === 'object' ? JSON.stringify(v) : v)}</span>`)
							.join('');
						const tagPills = (b.tags ?? [])
							.map((t) => `<span class="pill tag">${escapeHtml(t)}</span>`)
							.join('');
						return `
							<div class="belief-row ${b.created_by}" data-id="${b.id}">
								<div class="claim">${escapeHtml(b.claim)}</div>
								<div class="right">
									<span class="conf">conf ${b.confidence.toFixed(2)}</span>
									<span class="ev">ev ${b.evidence}</span>
									<span>${escapeHtml(b.created_by)} / ${escapeHtml(b.explicitness)}</span>
								</div>
								<div class="meta">${scopePills}${tagPills}</div>
							</div>
						`;
					})
					.join('');
			}

			/* ── Entities sub-view ─────────────────────────────────────── */

			const entitiesListEl = document.getElementById('memory-entities-list');
			const entitiesDetailEl = document.getElementById('memory-entities-detail');
			const entitiesSearchEl = document.getElementById('memory-entities-search');
			const entitiesFilterEl = document.getElementById('memory-entities-filter');
			const entitiesCountEl = document.getElementById('memory-entities-count');
			let entitiesCache = [];
			let entitiesLoading = false;

			async function loadEntities() {
				if (entitiesLoading) return;
				entitiesLoading = true;
				entitiesListEl.innerHTML = '<div class="memory-empty" style="position:static;padding:40px 0;text-align:center">Loading…</div>';
				try {
					const res = await fetch('/api/entities?workspace=' + memoryWorkspace());
					if (!res.ok) throw new Error(await res.text());
					entitiesCache = await res.json();
					renderEntitiesList();
				} catch (err) {
					entitiesListEl.innerHTML = '<div class="memory-empty" style="position:static;padding:40px 0;text-align:center">Failed: ' + escapeHtml(err.message) + '</div>';
				} finally {
					entitiesLoading = false;
				}
			}

			function renderEntitiesList() {
				const q = entitiesSearchEl ? entitiesSearchEl.value.trim().toLowerCase() : '';
				const kind = entitiesFilterEl ? entitiesFilterEl.value : '';
				let rows = entitiesCache.slice();
				if (kind) rows = rows.filter((e) => e.kind === kind);
				if (q) {
					rows = rows.filter((e) => {
						return (
							(e.name || '').toLowerCase().includes(q) ||
							(e.kind || '').toLowerCase().includes(q) ||
							JSON.stringify(e.metadata ?? {}).toLowerCase().includes(q)
						);
					});
				}
				rows.sort((a, b) => {
					if (b.belief_count !== a.belief_count) return b.belief_count - a.belief_count;
					if (a.kind !== b.kind) return a.kind.localeCompare(b.kind);
					return a.name.localeCompare(b.name);
				});
				entitiesCountEl.textContent = `${rows.length}/${entitiesCache.length}`;
				if (!rows.length) {
					entitiesListEl.innerHTML = '<div class="memory-empty" style="position:static;padding:40px 0;text-align:center">No entities match.</div>';
					return;
				}
				entitiesListEl.innerHTML = rows
					.map((e) => {
						const legacy = e.ref_table ? `<span class="legacy">→ ${escapeHtml(e.ref_table)}</span>` : '';
						return `
							<div class="entity-row ${e.kind}" data-id="${e.id}">
								<span class="kind-pill">${escapeHtml(e.kind)}</span>
								<span class="name">${escapeHtml(e.name)}</span>
								<div class="right">
									<span class="ev">${e.belief_count} belief${e.belief_count === 1 ? '' : 's'}</span>
									${legacy}
								</div>
							</div>
						`;
					})
					.join('');
			}

			if (entitiesSearchEl) entitiesSearchEl.addEventListener('input', renderEntitiesList);
			if (entitiesFilterEl) entitiesFilterEl.addEventListener('change', renderEntitiesList);

			// Entity row click in list mode → reuse the graph's detail panel

			// New: observation list (left column in list mode)
			const memoryObsListEl = document.getElementById('memory-obs-list');
			const memoryObsCount = document.getElementById('memory-obs-count');
			function renderObsList() {
				const all = memoryState.observations ?? [];
				memoryObsCount.textContent = all.length;
				memoryObsListEl.innerHTML = all
					.map((o) => `

			}
			memoryObsListEl.addEventListener('click', (e) => {
				const row = e.target.closest('.list-item');
				if (!row) return;
				const id = row.dataset.id;
				const obs = (memoryState.observations || []).find((x) => x.id === id);

			// Belief row click in list mode → also open the graph detail panel.
			memoryListEl.addEventListener('click', (e) => {
				const row = e.target.closest('.belief-row, .list-item');
				if (!row) return;
