			function renderGraph() {
				const svg = d3.select(svgEl);
				svg.selectAll('*').remove();

				const obs = memoryState.observations;
				const bel = memoryState.beliefs;
				const ents = memoryState.entities ?? [];

				if (!obs.length && !bel.length && !ents.length) {
					const empty = document.createElement('div');
					empty.className = 'memory-empty';
					empty.innerHTML =
						'<div>No memory yet for this workspace.</div>' +
						'<div class="hint">Wait for the agent to observe something.</div>';
					if (svgEl.parentNode.querySelector('.memory-empty')) {
						svgEl.parentNode.querySelector('.memory-empty').remove();
					}
					svgEl.parentNode.appendChild(empty);
					return;
				} else {
					const ex = svgEl.parentNode.querySelector('.memory-empty');
					if (ex) ex.remove();
				}

				const rect = svgEl.getBoundingClientRect();
				const w = rect.width;
				const h = rect.height;

				// Seed positions near the center so nodes don't visibly drift in
				// from (0,0) — D3's default phyllotaxis spawn point.
				const nodes = [
					...obs.map((o) => ({ ...o, _kind: 'observation' })),
					...bel.map((b) => ({ ...b, _kind: 'belief' })),
					...ents.map((e) => ({ ...e, _kind: 'entity' }))
				];
				const visibleIds = new Set(nodes.map((n) => n.id));
				const evidenceLinks = memoryState.edges
					.filter((e) => visibleIds.has(e.belief_id) && visibleIds.has(e.observation_id))
					.map((e) => ({
						source: e.observation_id,
						target: e.belief_id,
						weight: e.weight,
						_type: 'evidence'
					}));
				const entityLinks = (memoryState.entity_edges ?? [])
					.filter((e) => visibleIds.has(e.belief_id) && visibleIds.has(e.entity_id))
					.map((e) => ({
						source: e.entity_id,
						target: e.belief_id,
						weight: 0.6,
						_type: 'entity'
					}));
				const structuralLinks = (memoryState.structural_edges ?? [])
					.filter((e) => visibleIds.has(e.property_entity_id) && visibleIds.has(e.owner_entity_id))
					.map((e) => ({
						source: e.property_entity_id,
						target: e.owner_entity_id,
						weight: 0.8,
						_type: 'structural'
					}));
				const obsEntityLinks = (memoryState.observation_entity_edges ?? [])
					.filter((e) => visibleIds.has(e.observation_id) && visibleIds.has(e.entity_id))
					// Negative weights = entity was REJECTED in this obs; no visible link
					// or gravity pull. The data is preserved (the obs detail panel shows
					// the entity as a rejected chip).
					.filter((e) => (e.weight ?? 1.0) > 0)
					.map((e) => ({
						source: e.observation_id,
						target: e.entity_id,
						weight: e.weight ?? 1.0,
						_type: 'obs-entity'
					}));
				const links = [...evidenceLinks, ...entityLinks, ...structuralLinks, ...obsEntityLinks];

				// Icon symbols (bootstrap-icons) reused per entity node.
				// 16x16 viewBox; `<use>` per node sets width/height to scale.
				const defs = svg.append('defs');
				defs
					.append('symbol')
					.attr('id', 'icon-property')
					.attr('viewBox', '0 0 16 16')
					.append('path')
					.attr(
						'd',
						'M6.5 14.5v-3.505c0-.245.25-.495.5-.495h2c.25 0 .5.25.5.5v3.5a.5.5 0 0 0 .5.5h4a.5.5 0 0 0 .5-.5v-7a.5.5 0 0 0-.146-.354L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293L8.354 1.146a.5.5 0 0 0-.708 0l-6 6A.5.5 0 0 0 1.5 7.5v7a.5.5 0 0 0 .5.5h4a.5.5 0 0 0 .5-.5'
					);
				defs
					.append('symbol')
					.attr('id', 'icon-vendor')
					.attr('viewBox', '0 0 16 16')
					.append('g')
					.html(
						'<path d="M16 4.5a4.5 4.5 0 0 1-1.703 3.526L13 5l2.959-1.11q.04.3.041.61"/><path d="M11.5 9c.653 0 1.273-.139 1.833-.39L12 5.5 11 3l3.826-1.53A4.5 4.5 0 0 0 7.29 6.092l-6.116 5.096a2.583 2.583 0 1 0 3.638 3.638L9.908 8.71A4.5 4.5 0 0 0 11.5 9m-1.292-4.361-.596.893.809-.27a.25.25 0 0 1 .287.377l-.596.893.809-.27.158.475-1.5.5a.25.25 0 0 1-.287-.376l.596-.893-.809.27a.25.25 0 0 1-.287-.377l.596-.893-.809.27-.158-.475 1.5-.5a.25.25 0 0 1 .287.376M3 14a1 1 0 1 1 0-2 1 1 0 0 1 0 2"/>'
					);
				defs
					.append('symbol')
					.attr('id', 'icon-owner')
					.attr('viewBox', '0 0 16 16')
					.append('path')
					.attr(
						'd',
						'M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6'
					);

				const g = svg.append('g').attr('class', 'graph-root');

				// Zoom + pan (capture the behavior so we can drive it programmatically
				// to set the initial centered view).
				const zoomBehavior = d3.zoom()
					.scaleExtent([0.2, 4])
					.on('zoom', (ev) => g.attr('transform', ev.transform));
				svg.call(zoomBehavior);

				const link = g
					.append('g')
					.selectAll('line')
					.data(links)
					.join('line')
					.attr('class', (d) => {
						if (d._type === 'entity') return 'link entity';
						if (d._type === 'structural') return 'link structural';
						return 'link';
					})
					.attr('stroke-width', (d) => {
						if (d._type === 'entity') return 1;
						if (d._type === 'structural') return 1.5;
						return Math.max(0.5, Math.abs(d.weight) * 1.5);
					})
					.attr('stroke', (d) => {
						if (d._type === 'entity' || d._type === 'structural') return null; // CSS controls
						return d.weight < 0 ? '#5a2a30' : '#44403c';
					});

				const node = g
					.append('g')
					.selectAll('g')
					.data(nodes, (d) => d.id)
					.join('g')
					.attr('class', (d) => {
						if (d._kind === 'entity') return `node entity ${d.kind}`;
						const userTag = d._kind === 'belief' && d.created_by === 'user' ? ' user-created' : '';
						return `node ${d._kind}${userTag}`;
					})
					.on('click', (ev, d) => {
						ev.stopPropagation();
						selectedNodeId = d.id;
						// While a search is active its dim wins — don't undim the
						// non-matches, just open the detail panel.
						if (!searchMatched) highlightNeighborhood(d.id);
						showDetail(d);
					})
					.on('mouseenter', (ev, d) => {
						// Obsidian-style: hover dims everything except the node + its
						// connected neighborhood. Does NOT change selectedNodeId.
						// Suppressed while a search is active so matches stay dimmed.
						if (searchMatched) return;
						hoveredNodeId = d.id;
						highlightNeighborhood(d.id);
					})
					.on('mouseleave', (ev, d) => {
						if (searchMatched) return;
						hoveredNodeId = null;
						// Restore selection highlight if a node is selected, else clear.
						if (selectedNodeId) highlightNeighborhood(selectedNodeId);
						else clearHighlight();
					})
					.on('dblclick', (ev, d) => {
						// Double-click releases a pinned node back to the layout.
						ev.stopPropagation();
						d.fx = null;
						d.fy = null;
						simulation.alpha(0.3).restart();
					})
					.call(
						d3
							.drag()
							.on('start', (ev, d) => {
								// Bare minimum heat so ticks fire during the drag.
								// Cool back to 0 on release. Higher alphaTarget here
								// (e.g. 0.3) causes charge to push other nodes away
								// while the user holds — the original bug.
								if (!ev.active) simulation.alphaTarget(0.05).restart();
								d.fx = d.x;
								d.fy = d.y;
							})
							.on('drag', (ev, d) => {
								d.fx = ev.x;
								d.fy = ev.y;
							})
							.on('end', (ev, d) => {
								// Cool the simulation, but KEEP the node pinned where
								// the user dropped it. Double-click to release.
								if (!ev.active) simulation.alphaTarget(0);
							})
					);

				function nodeRadius(d) {
					if (d._kind === 'belief') {
						// Belief size = evidence depth × confidence.
						// A single-obs belief should be only a touch larger than an obs node.
						const ev = d.evidence_count ?? 1;
						const conf = d.confidence ?? 0.5;
						return Math.min(22, 5 + Math.sqrt(ev) * 2.5 * (0.5 + conf));
					}
					if (d._kind === 'entity') {
						const total = (d.belief_count ?? 0) + (d.observation_count ?? 0);
						return Math.min(26, 8 + total * 1.5);
					}
					return 3.5;
				}

				node
					.append('circle')
					.attr('r', nodeRadius)
					.attr('fill-opacity', (d) =>
						d._kind === 'observation' ? 0.3 + 0.7 * (d.salience ?? 0.5) : 1
					);

				// Icons: only entity nodes get them. Sized to ~70% of diameter.
				node
					.filter((d) => d._kind === 'entity')
					.append('use')
					.attr('href', (d) => `#icon-${d.kind}`)
					.attr('width', (d) => nodeRadius(d) * 1.2)
					.attr('height', (d) => nodeRadius(d) * 1.2)
					.attr('x', (d) => -nodeRadius(d) * 0.6)
					.attr('y', (d) => -nodeRadius(d) * 0.6)
					.attr('fill', '#0c0a09')
					.attr('pointer-events', 'none');

				node
					.append('text')
					.attr('x', 0)
					.attr('y', (d) => nodeRadius(d) + 4)
					.attr('text-anchor', 'middle')
					.text((d) => {
						let txt;
						if (d._kind === 'belief') txt = d.claim;
						else if (d._kind === 'entity') txt = d.name; // kind is encoded in color
						else txt = d.title || d.summary;
						return (txt ?? '').length > 36 ? txt.slice(0, 33) + '…' : txt;
					});

				// Measure each node's full bounding box (circle + label) so the
				// collision force can separate by actual rectangle, not by an
				// inscribed circle — labels are wide but short, so circular
				// collision over-spaces vertically stacked nodes.
				node.each(function (d) {
					try {
						const b = this.getBBox();
						d._bbox = { x: b.x, y: b.y, w: b.width, h: b.height };
					} catch {
						d._bbox = { x: 0, y: 0, w: 0, h: 0 };
					}
				});

				svg.on('click', () => {
					selectedNodeId = null;
					// Clicking empty space deselects, but a search dim must persist
					// while the search box has text — re-apply it instead of clearing.
					if (searchMatched) applySearchDim();
					else clearHighlight();
					hideDetail();
				});

				const radialOuter = Math.min(w, h) * 0.45;
				simulation = d3
					.forceSimulation(nodes)
					.force(
						'link',
						d3
							.forceLink(links)
							.id((d) => d.id)
							.distance((l) => {
								if (l._type === 'obs-entity') return 55;
								if (l._type === 'structural') return 60;
								return 100 + 60 * (1 - Math.abs(l.weight));
							})
							.strength((l) => {
								if (l._type === 'obs-entity') return 0.45;
								if (l._type === 'structural') return 0.55;
								return Math.abs(l.weight) * 0.6;
							})
					)
					// Stronger entity repulsion so the ~70-entity cluster spreads out
					// readably. Observations get mild repulsion so they don't pile on
					// top of each other near their parent entity.
					.force(
						'charge',
						d3.forceManyBody().strength((d) => (d._kind === 'observation' ? -40 : -600)).distanceMax(700)
					)
					.force('x', d3.forceX(w / 2).strength(0.03))
					.force('y', d3.forceY(h / 2).strength(0.03))
					// Radial: only observations get pushed outward. Entities free-float
					// within the cluster — their layout comes from charge + structural
					// + obs-entity links.
					.force(
						'radial',
						d3
							.forceRadial(radialOuter, w / 2, h / 2)
							.strength((d) => (d._kind === 'observation' ? 0.05 : 0))
					)
					.force(
						'collide',
						d3.forceCollide().radius((d) => {
							if (d._kind === 'belief') return 42;
							if (d._kind === 'entity') return nodeRadius(d) + 50;
							return 14;
						})
					)
					.on('tick', () => {
						link
							.attr('x1', (d) => d.source.x)
							.attr('y1', (d) => d.source.y)
							.attr('x2', (d) => d.target.x)
							.attr('y2', (d) => d.target.y);
						node.attr('transform', (d) => `translate(${d.x},${d.y})`);
					});

				// Pre-settle: tick the simulation synchronously so nodes start near
				// their final positions (no top-left-corner bounce-in). Then cool the
				// simulation so subsequent interaction (drag, filter change) only
				// nudges things slightly.
				simulation.stop();
				for (let i = 0; i < 300; i++) simulation.tick();
				link
					.attr('x1', (d) => d.source.x)
					.attr('y1', (d) => d.source.y)
					.attr('x2', (d) => d.target.x)
					.attr('y2', (d) => d.target.y);
				node.attr('transform', (d) => `translate(${d.x},${d.y})`);
				simulation.alpha(0.05).restart();

				// Center the view on the entity cluster at a readable scale (1.05×).
				const cx = w / 2;
				const cy = h / 2;
				const endScale = 1.05;
				const endTransform = d3.zoomIdentity.translate(cx * (1 - endScale), cy * (1 - endScale)).scale(endScale);
				svg.call(zoomBehavior.transform, endTransform);

				// If a search is active when the graph re-renders (e.g. after a
				// belief create/delete reload), re-apply its dim to the new DOM.
				applySearchDim();
			}

			function highlightNeighborhood(id) {
				const neighbors = new Set([id]);
				for (const e of memoryState.edges) {
					if (e.belief_id === id) neighbors.add(e.observation_id);
					if (e.observation_id === id) neighbors.add(e.belief_id);
				}
				for (const e of memoryState.entity_edges ?? []) {
					if (e.belief_id === id) neighbors.add(e.entity_id);
					if (e.entity_id === id) neighbors.add(e.belief_id);
				}
				for (const e of memoryState.structural_edges ?? []) {
					if (e.property_entity_id === id) neighbors.add(e.owner_entity_id);
					if (e.owner_entity_id === id) neighbors.add(e.property_entity_id);
				}
				// Scope selectors to the graph SVG so we don't accidentally pick up
				// HTML elements with the same class name (e.g. .scope-pill.link in
				// the detail panel, which would throw when read as a d3 datum).
				const gsvg = d3.select(svgEl);
				gsvg.selectAll('.node').classed('dimmed', (d) => !neighbors.has(d.id));
				gsvg.selectAll('.node').classed('selected', (d) => d.id === id);
				gsvg.selectAll('.link').classed(
					'dimmed',
					(l) => l && l.source && !(neighbors.has(l.source.id) && neighbors.has(l.target.id))
				);
			}

			function clearHighlight() {
				const gsvg = d3.select(svgEl);
				gsvg.selectAll('.node').classed('dimmed', false).classed('selected', false).classed('match', false);
				gsvg.selectAll('.link').classed('dimmed', false);
			}

			function showDetail(d) {
				// Defensive: clear any inline display style that could keep the
				// panel invisible after a previous hideDetail.
				detailEl.style.display = '';
				detailEl.hidden = false;
				if (d._kind === 'belief') renderBeliefDetail(d);
				else if (d._kind === 'entity') renderEntityDetail(d);
				else renderObservationDetail(d);
			}

			function renderEntityDetail(e) {
				const linkedBeliefs = (memoryState.entity_edges ?? [])
					.filter((edge) => edge.entity_id === e.id)
					.map((edge) => memoryState.beliefs.find((b) => b.id === edge.belief_id))
					.filter(Boolean);

				// Structural relations derived from legacy owner_properties:
				// property → its owner(s); owner → its property/properties.
				const relatedEntities = [];
				const structural = memoryState.structural_edges ?? [];
				if (e.kind === 'property') {
					for (const se of structural) {
						if (se.property_entity_id === e.id) {
							const o = memoryState.entities.find((x) => x.id === se.owner_entity_id);
							if (o) relatedEntities.push(o);
						}
					}
				} else if (e.kind === 'owner') {
					for (const se of structural) {
						if (se.owner_entity_id === e.id) {
							const p = memoryState.entities.find((x) => x.id === se.property_entity_id);
							if (p) relatedEntities.push(p);
						}
					}
				}
				const relatedHeading =
					e.kind === 'property' ? 'Owner' : e.kind === 'owner' ? 'Properties' : null;

				detailBodyEl.innerHTML = `
					<h3>Entity</h3>
					<div class="claim">${escapeHtml(e.kind)}: ${escapeHtml(e.name)}</div>
					<div class="kv"><span class="k">kind</span><span>${escapeHtml(e.kind)}</span></div>
					<div class="kv"><span class="k">legacy ref</span><span>${e.ref_table ? `${escapeHtml(e.ref_table)} / ${(e.ref_id || '').slice(0, 8)}` : '<span style="color:#a8a29e">none (informal)</span>'}</span></div>
					<div class="kv"><span class="k">created</span><span>${e.created_at ? fmtAge(e.created_at) : '—'}</span></div>
					${
						relatedHeading
							? `<h3 style="margin-top:18px">${relatedHeading} (${relatedEntities.length})</h3>
								${
									relatedEntities.length
										? relatedEntities
												.map(
													(r) => `<div class="evidence-row entity-link" data-ent-id="${r.id}">
											<span class="weight" style="color:#a8a29e">${escapeHtml(r.kind)}</span>
											${escapeHtml(r.name)}
										</div>`
												)
												.join('')
										: '<div style="color:#a8a29e;font-size:12px">' +
											(e.kind === 'property'
												? 'No owner found (informal property or missing owner_properties row).'
												: 'No properties found for this owner.') +
											'</div>'
								}`
							: ''
					}
					<h3 style="margin-top:18px">Beliefs (${linkedBeliefs.length})</h3>
					${
						linkedBeliefs.length
							? linkedBeliefs
									.map(
										(b) => `<div class="evidence-row" data-bel-id="${b.id}">
								<span class="weight">${(b.confidence ?? 0).toFixed(2)}</span>
								${escapeHtml(b.claim)}
							</div>`
									)
									.join('')
							: '<div style="color:#a8a29e;font-size:12px">No beliefs reference this entity yet.</div>'
					}
				`;

				// Wire click-through on related-entity rows.
				detailBodyEl.querySelectorAll('.entity-link').forEach((row) => {
					row.addEventListener('click', () => {
						const entId = row.dataset.entId;
						const ent = memoryState.entities.find((x) => x.id === entId);
						if (ent) {
							selectedNodeId = entId;
							highlightNeighborhood(entId);
							renderEntityDetail(ent);
						}
					});
				});
			}
			function hideDetail() {
				detailEl.hidden = true;
			}
			detailCloseEl.addEventListener('click', (e) => {
				e.stopPropagation();
				e.stopImmediatePropagation();
				selectedNodeId = null;
				clearHighlight();
				hideDetail();
			});

			function scopePills(scope) {
				if (!scope) return '<span style="color:#a8a29e">unscoped</span>';
				// New shape: array of {kind, name} (observations, post-PR2).
				if (Array.isArray(scope)) {
					if (scope.length === 0) return '<span style="color:#a8a29e">unscoped</span>';
					return scope
						.map(
							(e) =>
								`<span class="scope-pill">${escapeHtml(e.kind ?? '')}: ${escapeHtml(e.name ?? '')}</span>`
						)
						.join('');
				}
				// Legacy shape: object {key: value} (beliefs scope).
				if (!Object.keys(scope).length) return '<span style="color:#a8a29e">unscoped</span>';
				return Object.entries(scope)
					.map(
						([k, v]) =>
							`<span class="scope-pill">${escapeHtml(k)}=${escapeHtml(typeof v === 'object' ? JSON.stringify(v) : String(v))}</span>`
					)
					.join('');
			}

			function renderBeliefDetail(b) {
				const evidence = memoryState.edges
					.filter((e) => e.belief_id === b.id)
					.map((e) => {
						const o = memoryState.observations.find((x) => x.id === e.observation_id);
						return { ...e, observation: o };
					})
					.filter((e) => e.observation);
				detailBodyEl.innerHTML = `
					<h3>Belief</h3>
					<div class="claim ${b.created_by === 'user' ? 'user' : ''}">${escapeHtml(b.claim)}</div>
					<div class="kv"><span class="k">scope</span><span>${scopePills(b.scope)}</span></div>
					<div class="kv"><span class="k">confidence</span><span>${(b.confidence ?? 0).toFixed(2)}</span></div>
					<div class="kv"><span class="k">explicitness</span><span>${escapeHtml(b.explicitness ?? '')}</span></div>
					<div class="kv"><span class="k">created by</span><span>${escapeHtml(b.created_by ?? '')}</span></div>
					<div class="kv"><span class="k">tags</span><span>${(b.tags ?? []).map((t) => `<span class="scope-pill">${escapeHtml(t)}</span>`).join('') || '<span style="color:#a8a29e">none</span>'}</span></div>
					<div class="kv"><span class="k">updated</span><span>${b.updated_at ? fmtAge(b.updated_at) : '—'}</span></div>
					<h3 style="margin-top:18px">Evidence (${evidence.length})</h3>
					${
						evidence.length
							? evidence
									.map(
										(e) => `
								<div class="evidence-row ${e.weight < 0 ? 'contradicts' : 'supports'}" data-obs-id="${e.observation.id}">
									<span class="weight">${e.weight.toFixed(2)}</span>
									${escapeHtml(e.observation.summary)}
								</div>`
									)
									.join('')
							: '<div style="color:#a8a29e;font-size:12px">No evidence yet.</div>'
					}
					<div class="actions">
						<button id="edit-belief-btn">Edit</button>
						<button class="danger" id="delete-belief-btn">Delete</button>
					</div>
				`;
				detailBodyEl.querySelectorAll('.evidence-row').forEach((row) => {
					row.addEventListener('click', () => {
						const obsId = row.dataset.obsId;
						const obs = memoryState.observations.find((o) => o.id === obsId);
						if (obs) {
							selectedNodeId = obsId;
							highlightNeighborhood(obsId);
							renderObservationDetail(obs);
						}
					});
				});
				document.getElementById('edit-belief-btn').onclick = () => openBeliefDialog(b);
				document.getElementById('delete-belief-btn').onclick = () => deleteBelief(b);
			}

			function renderObservationDetail(o) {
				const beliefs = memoryState.edges
					.filter((e) => e.observation_id === o.id)
					.map((e) => {
						const b = memoryState.beliefs.find((x) => x.id === e.belief_id);
						return { ...e, belief: b };
					})
					.filter((e) => e.belief);
				// Resolve linked entities from the observation_entity_edges join so
				// the panel shows canonical entity names + can navigate on click.
				const linkedEntities = (memoryState.observation_entity_edges ?? [])
					.filter((e) => e.observation_id === o.id)
					.map((edge) => {
						const ent = memoryState.entities.find((x) => x.id === edge.entity_id);
						return ent ? { ...ent, weight: edge.weight ?? 1.0 } : null;
					})
					.filter(Boolean);
				const entityChips = linkedEntities.length
					? linkedEntities
							.map((e) => {
								const isNeg = e.weight < 0;
								const style = isNeg
									? 'cursor:pointer;opacity:0.55;text-decoration:line-through'
									: 'cursor:pointer';
								const weightLabel = e.weight === 1 ? '' : ` <span style="opacity:0.6">(${e.weight.toFixed(1)})</span>`;
								return `<span class="scope-pill link" data-entity-id="${e.id}" style="${style}">${escapeHtml(e.kind)}: ${escapeHtml(e.name)}${weightLabel}</span>`;
							})
							.join(' ')
					: '<span style="color:#a8a29e">unscoped</span>';
				detailBodyEl.innerHTML = `
					<h3>Observation</h3>
					<div class="claim">${escapeHtml(o.summary)}</div>
					<div class="kv"><span class="k">ts</span><span>${o.ts ? fmtAge(o.ts) : '—'}</span></div>
					<div class="kv"><span class="k">salience</span><span>${(o.salience ?? 0).toFixed(2)}</span></div>
					<div class="kv"><span class="k">entities</span><span>${entityChips}</span></div>
					<div class="kv"><span class="k">tags</span><span>${(o.tags ?? []).map((t) => `<span class="scope-pill">${escapeHtml(t)}</span>`).join('') || '<span style="color:#a8a29e">none</span>'}</span></div>
					${o.raw_text ? `<div class="kv"><span class="k">raw text</span><span style="font-style:italic">"${escapeHtml(o.raw_text)}"</span></div>` : ''}
					<h3 style="margin-top:18px">Connected beliefs (${beliefs.length})</h3>
					${
						beliefs.length
							? beliefs
									.map(
										(e) => `
								<div class="evidence-row ${e.weight < 0 ? 'contradicts' : 'supports'}" data-bel-id="${e.belief.id}">
									<span class="weight">${e.weight.toFixed(2)}</span>
									${escapeHtml(e.belief.claim)}
								</div>`
									)
									.join('')
							: '<div style="color:#a8a29e;font-size:12px">Not yet connected to any belief.</div>'
					}
				`;
				// Wire click-through on entity chips in the entities row.
				detailBodyEl.querySelectorAll('.scope-pill.link[data-entity-id]').forEach((chip) => {
					chip.addEventListener('click', (e) => {
						e.stopPropagation();
						const entId = chip.dataset.entityId;
						const ent = memoryState.entities.find((x) => x.id === entId);
						if (ent) {
							selectedNodeId = entId;
							highlightNeighborhood(entId);
							renderEntityDetail(ent);
						}
					});
				});
				detailBodyEl.querySelectorAll('.evidence-row').forEach((row) => {
					row.addEventListener('click', () => {
						const belId = row.dataset.belId;
						const b = memoryState.beliefs.find((x) => x.id === belId);
						if (b) {
							selectedNodeId = belId;
							highlightNeighborhood(belId);
							renderBeliefDetail(b);
						}
					});
				});
			}

			// ─ New / Edit belief dialog ────────────────────────────────────
			function openBeliefDialog(existing) {
				editingBeliefId = existing?.id ?? null;
				dialogTitleEl.textContent = editingBeliefId ? 'Edit belief' : 'New belief';
				submitBeliefBtn.textContent = editingBeliefId ? 'Save' : 'Create';
				formEl.elements.claim.value = existing?.claim ?? '';
				formEl.elements.scope.value = existing
					? Object.entries(existing.scope ?? {})
							.map(([k, v]) => `${k}=${typeof v === 'object' ? JSON.stringify(v) : v}`)
							.join('\n')
					: '';
				const conf = typeof existing?.confidence === 'number' ? existing.confidence : 0.85;
				formEl.elements.confidence.value = conf;
				confOut.textContent = conf.toFixed(2);
				formEl.elements.tags.value = (existing?.tags ?? []).join(', ');
				dialogEl.showModal();
			}
			if (newBeliefBtn) newBeliefBtn.addEventListener('click', () => openBeliefDialog(null));
			cancelBeliefBtn.addEventListener('click', () => dialogEl.close());
			formEl.elements.confidence.addEventListener('input', (e) => {
				confOut.textContent = Number(e.target.value).toFixed(2);
			});

			function parseScope(raw) {
				const scope = {};
				for (const line of raw.split('\n')) {
					const i = line.indexOf('=');
					if (i <= 0) continue;
					const k = line.slice(0, i).trim();
					const v = line.slice(i + 1).trim();
					if (k) scope[k] = v;
				}
				return scope;
			}

			formEl.addEventListener('submit', async (e) => {
				e.preventDefault();
				const fd = new FormData(formEl);
				const payload = {
					claim: fd.get('claim'),
					scope: parseScope(fd.get('scope') ?? ''),
					confidence: Number(fd.get('confidence')),
					explicitness: 'stated',
					tags: String(fd.get('tags') ?? '')
						.split(',')
						.map((t) => t.trim())
						.filter(Boolean)
				};
				try {
					const url = editingBeliefId
						? `/api/memory/beliefs/${editingBeliefId}`
						: `/api/memory/beliefs?workspace=${memoryWorkspace()}`;
					const res = await fetch(url, {
						method: editingBeliefId ? 'PATCH' : 'POST',
						headers: { 'content-type': 'application/json' },
						body: JSON.stringify(payload)
					});
					if (!res.ok) throw new Error(await res.text());
					dialogEl.close();
					toast(editingBeliefId ? 'belief updated' : 'belief created');
					await loadMemoryGraph();
				} catch (err) {
					toast(`save failed: ${err.message}`, 'error');
				}
			});

			async function deleteBelief(b) {
				if (!confirm(`Delete belief?\n\n"${b.claim}"\n\nIts evidence rows are removed too; the underlying observations are kept.`)) return;
				try {
					const res = await fetch(`/api/memory/beliefs/${b.id}`, { method: 'DELETE' });
					if (!res.ok) throw new Error(await res.text());
					toast('belief deleted');
					hideDetail();
					await loadMemoryGraph();
				} catch (err) {
					toast(`delete failed: ${err.message}`, 'error');
				}
			}

			// ─ Filter toggles + search ─────────────────────────────────────

			let searchTimer = null;
			searchEl.addEventListener('input', () => {
				clearTimeout(searchTimer);
				searchTimer = setTimeout(runSearch, 200);
			});
			function filterListItems(q) {
				const needle = q.toLowerCase();
				const containers = [
					document.getElementById('memory-obs-list'),
					document.getElementById('memory-list'),
					document.getElementById('memory-entities-list')
				];
				for (const c of containers) {
					if (!c) continue;
					for (const item of c.querySelectorAll('.list-item, .belief-row, .entity-row')) {
						const text = item.textContent.toLowerCase();
						item.style.display = !needle || text.includes(needle) ? '' : 'none';
					}
				}
			}

			// Apply the current search dim to the graph: matches get `.match`,
			// everything else is dimmed. Reads `searchMatched`; no-op if null.
			// Kept separate from runSearch so a graph re-render can re-apply it.
			function applySearchDim() {
				if (!searchMatched) return;
				const gsvg = d3.select(svgEl);
				gsvg.selectAll('.node')
					.classed('match', (d) => searchMatched.has(d.id))
					.classed('dimmed', (d) => searchMatched.size > 0 && !searchMatched.has(d.id));
				gsvg.selectAll('.link').classed(
					'dimmed',
					(l) => l && l.source && searchMatched.size > 0 && !(searchMatched.has(l.source.id) || searchMatched.has(l.target.id))
				);
			}

			async function runSearch() {
				const q = searchEl.value.trim();
				// Always filter list items so the search works in list mode too.
				filterListItems(q);
				if (!q) {
					searchMatched = null;
					clearHighlight();
					// Search cleared — restore any active selection's highlight.
					if (selectedNodeId) highlightNeighborhood(selectedNodeId);
					return;
				}
				try {
					const res = await fetch(
						`/api/memory/search?workspace=${memoryWorkspace()}&q=${encodeURIComponent(q)}`
					);
					if (!res.ok) throw new Error(await res.text());
					const hits = await res.json();
					searchMatched = new Set([...(hits.observations ?? []), ...(hits.beliefs ?? [])]);
					applySearchDim();
				} catch (err) {
					toast(`search failed: ${err.message}`, 'error');
				}
			}

			// Initial loads now that every loader + module state is initialized.
			// Issues (left) and Chat (center) are always on; the drawer defaults to
			// drafts; memory is lazy (opens on demand). Must stay at the bottom.
			loadIssues();
			loadChatThread();
			loadKpi();
			applyDrawer();
		</script>
		<script>
			// ── New-work-order notifications + alarm (PWA) ─────────────────────
			// Anytime a new work order lands, fire a native macOS notification and
			// play an alarm chime. A new WO reliably produces a new draft in
			// /api/drafts (issue-poller: issues_v2 → new_issue → draft), and that
			// endpoint is workspace-agnostic, so we poll it on our own (independent
			// of the chat-tab poller) and diff draft ids. Works once notifications
			// are granted and while the app/window is running.
			(function () {
				if ('serviceWorker' in navigator) {
					navigator.serviceWorker.register('/sw.js').catch(() => {});
				}
				if ('Notification' in window && Notification.permission === 'default') {
					Notification.requestPermission().catch(() => {});
				}

				// Audio must be unlocked by a user gesture (autoplay policy); grab the
				// first click/keypress to create + resume the context.
				let audioCtx = null;
				function ensureAudio() {
					try {
						if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
						if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
					} catch (e) {}
					return audioCtx;
				}
				['click', 'keydown'].forEach((ev) =>
					window.addEventListener(ev, ensureAudio, { once: true })
				);

				// Urgent alarm: alternating two-tone square-wave beeps (~1.5s).
				function playAlarm() {
					const ctx = ensureAudio();
					if (!ctx) return;
					const t0 = ctx.currentTime;
					const tones = [880, 1175, 880, 1175, 880, 1175]; // A5 / D6 alternating
					const beep = 0.18,
						gap = 0.07;
					tones.forEach((freq, i) => {
						const t = t0 + i * (beep + gap);
						const osc = ctx.createOscillator();
						const gain = ctx.createGain();
						osc.type = 'square';
						osc.frequency.setValueAtTime(freq, t);
						gain.gain.setValueAtTime(0.0001, t);
						gain.gain.exponentialRampToValueAtTime(0.22, t + 0.01);
						gain.gain.exponentialRampToValueAtTime(0.0001, t + beep);
						osc.connect(gain).connect(ctx.destination);
						osc.start(t);
						osc.stop(t + beep);
					});
				}

				function notify(d) {
					const ws = d.workspace_label ? ' · ' + d.workspace_label : '';
					const msgs = Array.isArray(d.messages) ? d.messages : [{ body: d.body }];
					const body = (msgs[0]?.body || 'A new work order is ready to review.').trim();
					if ('Notification' in window && Notification.permission === 'granted') {
						try {
							const n = new Notification('New work order' + ws, {
								body,
								tag: 'wo-' + d.id,
								renotify: true,
								requireInteraction: true,
								icon: '/icon-192.png',
								badge: '/icon-192.png'
							});
							n.onclick = () => {
								window.focus();
								n.close();
							};
						} catch (e) {}
					}
					playAlarm();
				}

				function openNewWorkOrderDraft(d) {
					if (typeof closeMemory === 'function') closeMemory();
					if (typeof setDrawer === 'function') setDrawer('drafts');
					if (d.issue_id && typeof focusIssue === 'function') {
						focusIssue(d.issue_id, d.workspace_label);
					} else if (d.workspace_label && typeof selectWorkspace === 'function') {
						selectWorkspace(d.workspace_label);
					}
				}

				let known = null; // Set of draft ids; null until the first poll baselines
				async function poll() {
					try {
						const r = await fetch('/api/drafts');
						if (!r.ok) return;
						const drafts = await r.json();
						const ids = new Set(drafts.map((d) => d.id));
						if (known === null) {
							known = ids; // baseline: don't alarm for WOs already present at launch
							return;
						}
						const fresh = drafts.filter((d) => !known.has(d.id));
						for (const d of fresh) notify(d);
						if (fresh.length) openNewWorkOrderDraft(fresh[fresh.length - 1]);
						known = ids;
					} catch (e) {}
				}

				poll();
				setInterval(poll, 2000);
			})();

			// ── Follow incoming PM messages to their workspace (PWA) ───────────
			// Same intent as the new-work-order poller above, but driven off any
			// incoming text from a property manager in a mapped group chat — not
			// just new drafts. The server brings the window forward (`open -a`);
			// this navigates the app to the message's workspace so the reply the
			// PM is waiting on is on screen. /api/chat-log is workspace-agnostic
			// and holds one row per incoming PM message (is_from_me:false), so we
			// poll it independently and diff message_guids. No alarm — PM messages
			// are frequent; this stays quiet and just navigates.
			(function () {
				let known = null; // Set of message_guids; null until the first poll baselines
				async function poll() {
					try {
						const r = await fetch('/api/chat-log?limit=100');
						if (!r.ok) return;
						const msgs = await r.json();
						const incoming = (Array.isArray(msgs) ? msgs : []).filter(
							(m) => m && m.is_from_me === false && m.message_guid
						);
						const ids = new Set(incoming.map((m) => m.message_guid));
						if (known === null) {
							known = ids; // baseline: don't navigate for messages already present at launch
							return;
						}
						const fresh = incoming.filter((m) => !known.has(m.message_guid));
						known = ids;
						if (!fresh.length) return;
						// Follow the most recent fresh message to its workspace.
						const latest = fresh.reduce((a, b) =>
							new Date(b.received_at || 0) > new Date(a.received_at || 0) ? b : a
						);
						if (latest.workspace_label && typeof selectWorkspace === 'function') {
							selectWorkspace(latest.workspace_label); // no-op if already there
						}
						try {
							window.focus();
						} catch (e) {}
					} catch (e) {}
				}

				poll();
				setInterval(poll, 2000);
			})();
		</script>
	</body>
</html>
