				padding: 8px 13px;
				border-radius: 18px;
				font-size: 14px;
				line-height: 1.35;
				word-wrap: break-word;
				overflow-wrap: anywhere;
				white-space: pre-wrap;
				max-width: 100%;
			}
			.chat-view .row.left .bubble {
				background: #292524;
				color: #fafaf9;
				border-bottom-left-radius: 4px;
			}
			.chat-view .row.right .bubble {
				background: #1d6ee2;
				color: #ffffff;
				border-bottom-right-radius: 4px;
			}
			/* "edited" tag on outbound messages the operator changed before
			   sending. Rendered under the bubble, right-aligned, like iMessage's
			   own "Edited" label. align-items:flex-end on the right stack pins it
			   under the bubble's right edge. */
			.chat-view .row.right .stack .edited-tag {
				font-size: 10px;
				color: #d9a366;
				letter-spacing: 0.05em;
				padding: 1px 4px 0;
			}
			.chat-view .empty {
				color: #a8a29e;
				text-align: center;
				padding: 80px 20px;
				font-size: 13px;
			}

			/* ============================================================ */
			/* IDE layout (Issues | Chat | Drawer) — overrides the tab shell */
			/* ============================================================ */
			#zoomwrap { display: flex; flex-direction: column; transform: scale(1.28); transform-origin: top left; width: calc(100% / 1.28); height: calc(100vh / 1.28); }
			.ide { flex: 1 1 auto; min-height: 0; display: flex; }
			.pane-issues { flex: 0 0 440px; width: 440px; border-right: 1px solid #292524; display: flex; flex-direction: column; min-height: 0; background: #0c0a09; }
			.pane-chat { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; min-height: 0; background: #0c0a09; }
			.pane-right { flex: 0 0 520px; width: 520px; border-left: 1px solid #292524; display: flex; flex-direction: column; min-height: 0; background: #0c0a09; }

			.pane-head { flex: 0 0 auto; display: flex; align-items: center; gap: 9px; height: 40px; padding: 0 14px; border-bottom: 1px solid #292524; }
			.pane-head .htitle { display: flex; align-items: center; gap: 8px; line-height: 1; }
			.pane-head .htitle .ttl { font-size: 13px; font-weight: 600; color: #f5f5f4; line-height: 1; }
			.pane-head .htitle .ct { font-size: 11px; color: #78716c; font-family: ui-monospace, Menlo, monospace; line-height: 1; }
			.pane-head .back { display: flex; align-items: center; gap: 5px; background: transparent; border: 0; color: #a8a29e; cursor: pointer; font: inherit; font-size: 12px; padding: 4px 7px; border-radius: 6px; }
			.pane-head .back:hover { background: #1c1917; color: #fafaf9; }

			.rtabs { display: flex; gap: 3px; }
			.rtabs[hidden], .rcrumb[hidden] { display: none; }
			.rtab { display: inline-flex; align-items: center; gap: 6px; background: transparent; border: 0; color: #a8a29e; padding: 5px 11px; border-radius: 6px; font: inherit; font-size: 12.5px; cursor: pointer; text-transform: none; letter-spacing: 0; }
			.rtab:hover { background: #1c1917; color: #fafaf9; }
			.rtab.on { background: #292524; color: #fafaf9; }
			.rcrumb { display: flex; align-items: center; gap: 8px; }
			.rcrumb .ttl { font-size: 13px; font-weight: 600; color: #f5f5f4; }

			/* left: issues list fills the pane (neutralize the old centered view) */
			.ide-scroll { flex: 1 1 auto; min-height: 0; overflow-y: auto; }
			.ide .issues-view { max-width: none; margin: 0; padding: 10px 12px 50px; overflow: visible; height: auto; }
			.ide .issue-row { grid-template-columns: 64px 1fr; cursor: pointer; }
			.ide .issue-row .imeta { display: none; }
			.ide .issue-row.sel { border-color: #3a4a63; background: #161a22; }

			/* center: KPI strip + thread + bottom bar */
			.kpi-wrap { flex: 0 0 auto; padding: 12px 16px 0; }
			.kpi-wrap .turns-kpi { margin-bottom: 0; }
			.chat-scroll { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; }
			.ide-chat { height: auto; display: flex; flex-direction: column; flex: 1 1 auto; min-height: 0; overflow: hidden; }
			.ide-chat .chat-thread { height: auto; flex: 1 1 auto; min-height: 0; overflow-y: auto; max-width: 720px; width: 100%; margin: 0 auto; padding: 18px 18px 24px; }
			/* manual composer: sits between the thread and the bottom bar */
			.chat-composer { flex: 0 0 auto; display: flex; align-items: flex-end; gap: 8px; padding: 10px 16px; max-width: 720px; width: 100%; margin: 0 auto; box-sizing: border-box; }
			.chat-composer textarea { flex: 1 1 auto; resize: none; background: #1c1917; border: 1px solid #33302d; border-radius: 10px; color: #fafaf9; font: inherit; font-size: 14px; line-height: 1.4; padding: 9px 12px; max-height: 160px; overflow-y: auto; }
			.chat-composer textarea:focus { outline: none; border-color: #2a82f0; }
			.chat-composer textarea::placeholder { color: #78716c; }
			.chat-composer button { flex: 0 0 auto; background: #2a82f0; border: 0; color: #fff; font: inherit; font-size: 13px; font-weight: 600; border-radius: 9px; padding: 9px 16px; cursor: pointer; }
			.chat-composer button:hover { background: #1d6ee2; }
			.chat-composer button:disabled { opacity: .5; cursor: default; }
			.chat-bottom { flex: 0 0 auto; display: flex; align-items: center; gap: 10px; height: 48px; padding: 0 16px; border-top: 1px solid #292524; }
			.chat-bottom .ws-tabs { margin-left: 0; }
			.chat-bottom .mem-btn { margin-left: auto; display: flex; align-items: center; gap: 7px; background: #1c1917; border: 1px solid #292524; color: #a8a29e; border-radius: 7px; padding: 5px 11px; font: inherit; font-size: 12px; cursor: pointer; }
			.chat-bottom .mem-btn:hover { background: #292524; color: #fafaf9; }

			/* right drawer: drafts / turns / session swap */
			.right-body { flex: 1 1 auto; min-height: 0; overflow-y: auto; }
			.ide-rail { flex: none; border-right: 0; background: transparent; height: auto; padding: 14px 14px 60px; }
			.ide .turns-view, .ide .sessions-view { max-width: none; margin: 0; padding: 10px 12px 50px; overflow: visible; height: auto; }
			.right-body > [hidden] { display: none; }

			/* memory graph: full-screen overlay (not a tab) */
			.memback { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 320; display: none; }
			.memback.show { display: block; }
			.memov { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 330; background: #0c0a09; display: none; flex-direction: column; overflow: hidden; }
			.memov.show { display: flex; }
			.memov .mhd { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #292524; }
			.memov .mhd .t { font-size: 14px; font-weight: 650; color: #f5f5f4; }
			.memov .mhd .memory-search { display: inline-block; margin-left: 4px; }
			.memov .mclose { margin-left: auto; background: transparent; border: 0; color: #a8a29e; font-size: 22px; cursor: pointer; padding: 2px 8px; line-height: 1; }
			.memov .mclose:hover { color: #fafaf9; }
			.memov .mbody { flex: 1; min-height: 0; position: relative; overflow: hidden; }
			.memov #memory-graph-pane { position: absolute; inset: 0; }
			.memov #memory-list-pane { position: absolute; inset: 0; }

			/* Turns → timeline entries (drawer) */
			.stc { font-size: 10.5px; font-weight: 600; border-radius: 5px; padding: 1px 7px; border: 1px solid transparent; white-space: nowrap; }
			.stc.good { color: #74c99a; background: rgba(116,201,154,.12); border-color: rgba(116,201,154,.3); }
			.stc.none { color: #a8a29e; background: rgba(138,139,144,.12); border-color: rgba(138,139,144,.28); }
			.stc.fail { color: #f08089; background: rgba(240,128,137,.12); border-color: rgba(240,128,137,.3); }
			.turns-view .tl-entry { position: relative; padding: 4px 8px 22px 30px; cursor: pointer; }
			/* continuous vertical spine running through the dots (no horizontal separators) */
			.turns-view .tl-entry::before { content: ''; position: absolute; left: 7px; top: 4px; bottom: -10px; width: 1px; background: #33302d; }
			.turns-view .tl-item:last-child .tl-entry::before { display: none; }
			.turns-view .tl-node { position: absolute; left: 1px; top: 4px; width: 13px; height: 13px; border-radius: 50%; background: #0c0a09; border: 2px solid #78716c; }
			.turns-view .tl-node.ev-new { border-color: #9db8ff; }
			.turns-view .tl-node.ev-user { border-color: #c7a3ff; }
			.turns-view .tl-node.ev-anon { border-color: #d9a366; }
			.turns-view .tl-item.failure .tl-node { border-color: #f08089; }
			.turns-view .tl-hd { display: flex; align-items: center; gap: 8px; }
			.turns-view .tl-time { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: #78716c; }
			.turns-view .tl-ev { font-size: 12.5px; }
			.turns-view .tl-ev.new { color: #9db8ff; }
			.turns-view .tl-ev.agent { color: #9db8ff; }
			.turns-view .tl-ev.user { color: #c7a3ff; }
			.turns-view .tl-ev.anon { color: #d9a366; }
			.turns-view .tl-hd .stc { margin-left: auto; }
			.turns-view .tl-ref { font-size: 13px; color: #f5f5f4; margin: 6px 0 0; cursor: pointer; }
			.turns-view .tl-ref:hover { color: #9db8ff; }
			.turns-view .tl-ref .sub { color: #78716c; font-weight: 400; }
			.turns-view .tl-prev { font-size: 12px; color: #a8a29e; font-style: italic; border-left: 2px solid #33302d; padding: 1px 0 1px 9px; margin: 6px 0 0; cursor: pointer; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
			.turns-view .tl-prev:hover { color: #d6d3d1; border-left-color: #1d6ee2; }
			/* inbound = the PM/sender's own message, on its own dot (received bubble) */
			.turns-view .tl-in { font-size: 13px; color: #d6d3d1; border-left: 2px solid #44403c; padding: 1px 0 1px 9px; margin: 6px 0 0; cursor: pointer; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
			.turns-view .tl-in:hover { color: #fafaf9; }
			/* outbound = what the agent sent/drafted this turn — brighter, blue rail, ↗ marker */
			.turns-view .tl-out { font-size: 12px; color: #cdd9f5; border-left: 2px solid #1d6ee2; padding: 1px 0 1px 9px; margin: 6px 0 0; cursor: pointer; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
			.turns-view .tl-out::before { content: '↗ '; color: #1d6ee2; font-weight: 600; }
			.turns-view .tl-out:hover { color: #eef3ff; }
			/* channel tag on an outbound bubble — marks AppFolio tenant/vendor dispatches */
			.turns-view .tl-chan { display: inline-block; font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.05em; color: #9db8ff; background: rgba(29, 110, 226, 0.16); border: 1px solid rgba(29, 110, 226, 0.4); border-radius: 4px; padding: 0 4px; margin-right: 6px; vertical-align: 1px; font-weight: 600; }
			.turns-view .tl-steps { display: flex; flex-direction: column; gap: 3px; margin: 8px 0 0; }
			.turns-view .tl-steps .step { font-family: ui-monospace, Menlo, monospace; font-size: 11.5px; color: #a8a29e; display: flex; align-items: center; gap: 8px; }
			.turns-view .tl-steps .step::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: #44403c; flex: 0 0 auto; }
			.turns-view .tl-steps .step.err { color: #f08089; }
			.turns-view .tl-steps .step.err::before { background: #f08089; }
			.turns-view .tl-steps .step.mem { color: #c7a3ff; }
			.turns-view .tl-steps .step.mem::before { background: #c7a3ff; }
			.turns-view .tl-meta { font-family: ui-monospace, Menlo, monospace; font-size: 10.5px; color: #78716c; margin: 8px 0 0; }
			.turns-view .turn-detail { margin: 0 8px 10px 26px; }
			/* Turns are grouped into threads (one work order + its follow-ups). The first
			   item of each thread gets a gap + divider, and the spine from the item above
			   is cut so threads read as distinct blocks. */
			.turns-view .tl-item.tl-thread-start { margin-top: 18px; padding-top: 16px; border-top: 1px solid #1c1917; }
			.turns-view .tl-item:has(+ .tl-item.tl-thread-start) .tl-entry::before { display: none; }
			.chat-thread .day-sep.tl-flash { border-radius: 8px; animation: tlFlash 1.7s ease-out; }
			@keyframes tlFlash { 0% { background: rgba(110,168,254,.2); box-shadow: 0 0 0 7px rgba(110,168,254,.16); } 100% { background: transparent; box-shadow: 0 0 0 0 transparent; } }
			.turns-view .tl-hd, .turns-view .tl-sum { cursor: pointer; }
			.turns-view .tl-sum { font-size: 13.5px; color: #f5f5f4; margin: 6px 0 0; }
			.turns-view .tl-ref { font-size: 12.5px; color: #9db8ff; margin: 5px 0 0; cursor: pointer; display: block; }
			.turns-view .tl-ref:hover { text-decoration: underline; }
			.turns-view .tl-ref .sub { color: #78716c; }
			.turns-view .tl-steps .step { cursor: pointer; }
			.turns-view .tl-steps .step:hover { color: #e7e5e4; }
			.turns-view .tl-steps .step.muted { color: #78716c; cursor: default; }
			/* turns drill-in modal */
			.turn-modal-back { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 340; display: none; }
			.turn-modal-back.show { display: block; }
			.turn-modal { position: fixed; top: 6vh; left: 50%; transform: translateX(-50%); width: min(680px, 92vw); max-height: 86vh; z-index: 350; background: #0c0a09; border: 1px solid #44403c; border-radius: 14px; box-shadow: 0 24px 70px rgba(0,0,0,.55); display: none; flex-direction: column; overflow: hidden; }
			.turn-modal.show { display: flex; }
			.turn-modal .tm-close { position: absolute; top: 9px; right: 12px; background: transparent; border: 0; color: #a8a29e; font-size: 22px; cursor: pointer; line-height: 1; padding: 2px 8px; z-index: 2; }
			.turn-modal .tm-close:hover { color: #fafaf9; }
			.turn-modal .tm-body { overflow-y: auto; padding: 16px 18px 18px; }
			.turn-modal .tm-body .sxd-head { margin-top: 0; padding-right: 26px; }
			.turn-modal .tm-body .sxd-sec:last-child { margin-bottom: 0; }
			/* single session in the drawer (session → link): one column, no side pane */
			.ide .sessions-view { max-width: none; margin: 0; padding: 14px 14px 50px; overflow: visible; }
			.ide .sessions-view .sx-layout { display: block; }
			.ide .sessions-view #sessions-list { flex: none; width: 100%; }
			.ide .sessions-view #session-detail { display: none; }
			.ide .sessions-view .session-card { border: 0; background: transparent; padding: 0; margin: 0; }
			/* In the single-session drawer the transcript should flow full-length and let
			   .right-body be the only scroller — the 540px inner cap (meant for the
			   multi-card list) was leaving dead space below a short-looking scroll box. */
			.ide .sessions-view .session-card .transcript { max-height: none; overflow: visible; }
		</style>
	</head>
	<body>
		<div id="zoomwrap">
			<div class="ide">
				<!-- LEFT: issues -->
				<div class="pane-issues">
					<div class="pane-head"><div class="htitle"><span class="ttl">Issues</span><span class="ct" id="issues-count"></span></div></div>
					<div class="ide-scroll">
						<section id="view-issues" class="issues-view"><div id="issues-list"></div></section>
					</div>
				</div>
				<!-- CENTER: KPI + chat thread + bottom bar -->
				<div class="pane-chat">
					<div class="kpi-wrap" id="kpi-strip"></div>
					<div class="chat-scroll">
						<section id="view-chat" class="chat-view ide-chat"><div id="chat-thread" class="chat-thread"></div></section>
					</div>
					<!-- Manual composer: type a message to send straight to the active
					     workspace's chat when the agent didn't draft one. Logged as a
					     manual send so it's tracked in KPIs + the daily digest. -->
					<form class="chat-composer" id="chat-composer">
						<textarea id="composer-input" rows="1" placeholder="Send a message manually…" aria-label="Send a message manually"></textarea>
						<button type="submit" id="composer-send" title="Send (↵) — Shift+↵ for newline">Send</button>
					</form>
					<div class="chat-bottom">
						<div class="ws-tabs" id="ws-tabs" role="tablist" aria-label="Workspace"></div>
						<button class="mem-btn" id="open-memory">⟜ Memory graph<span class="ws-key">m</span></button>
					</div>
					</div>
					<!-- RIGHT: drawer (queue / turns / session) -->
				<div class="pane-right">
					<div class="pane-head" id="right-head">
							<div class="rtabs" id="right-tabs">
								<button class="rtab on" data-drawer="drafts">Queue<span class="ws-key">[</span></button>
							<button class="rtab" data-drawer="turns">Turns<span class="ws-key">]</span></button>
						</div>
						<div class="rcrumb" id="right-crumb" hidden><button class="back" id="right-back">‹ back</button><span class="ttl" id="right-title">Session</span></div>
					</div>
					<div class="right-body" id="right-body">
						<aside id="chat-drafts-rail" class="chat-drafts-rail ide-rail"></aside>
						<section id="view-turns" class="turns-view" hidden><div id="turns-list"></div></section>
						<section id="view-sessions" class="sessions-view" hidden>
							<div class="sx-layout">
								<div id="sessions-list"></div>
								<div id="session-detail" class="sx-detail"></div>
							</div>
						</section>
					</div>
				</div>
			</div>

			<!-- Memory graph: full-screen overlay -->
			<div class="memback" id="memback"></div>
			<div class="memov" id="memov">
				<div class="mhd">
					<span class="t">Memory graph</span>
					<div class="memory-view-toggle" id="memory-view-toggle">
						<button data-view="graph" class="active">Graph</button>
						<button data-view="list">List</button>
					</div>
					<input id="memory-search" class="memory-search" type="search" placeholder="search memory…" />
					<button class="mclose" id="memclose" aria-label="close">×</button>
				</div>
				<div class="mbody">
					<div id="memory-graph-pane">
						<svg id="memory-graph"></svg>
						<aside id="memory-detail" class="memory-detail" hidden>
							<button class="memory-detail-close" id="memory-detail-close" aria-label="close">×</button>
							<div id="memory-detail-body"></div>
						</aside>
					</div>
					<div id="memory-list-pane" class="three-col" hidden>
						<div class="list-col">
							<div class="list-col-header"><h3>Observations</h3><span class="count" id="memory-obs-count"></span></div>
							<div class="list-col-body" id="memory-obs-list"></div>
						</div>
						<div class="list-col">
							<div class="list-col-header"><h3>Beliefs</h3><span class="count" id="memory-list-count"></span></div>
							<div class="list-col-body" id="memory-list"></div>
						</div>
						<div class="list-col">
							<div class="list-col-header"><h3>Entities</h3><span class="count" id="memory-entities-count"></span></div>
							<div class="list-col-body" id="memory-entities-list"></div>
						</div>
					</div>
					<div id="memory-entities-detail" hidden style="display:none"></div>
				</div>
			</div>
		</div>

		<dialog id="new-belief-dialog" class="belief-dialog">
			<form id="new-belief-form" method="dialog">
				<h3 id="belief-dialog-title">New belief</h3>
				<label class="field">
					<span>Claim</span>
					<textarea name="claim" rows="3" required placeholder="What rule do we want to capture?"></textarea>
				</label>
				<label class="field">
					<span>Scope (one key=value per line — e.g. trade=plumbing)</span>
					<textarea name="scope" rows="3" placeholder="trade=plumbing&#10;portfolio=Harrison Properties"></textarea>
				</label>
				<label class="field">
					<span>Confidence <output id="conf-out">0.85</output></span>
					<input type="range" name="confidence" min="0" max="1" step="0.01" value="0.85" />
				</label>
				<label class="field">
					<span>Tags (comma-separated)</span>
					<input type="text" name="tags" placeholder="vendor-preference, default" />
				</label>
				<div class="belief-dialog-actions">
					<button type="button" id="cancel-belief">Cancel</button>
					<button type="submit" class="primary" id="submit-belief">Create</button>
				</div>
			</form>
		</dialog>

		<div class="toast" id="toast"></div>

		<script>
			// Workspace filter — global, persists across reloads. Filters drafts,
			// history, and chat by workspace_label client-side. The list is
			// injected server-side from core/workspaces.mjs (LAPM · Green Oak · Test).
			let WORKSPACES_LIST = "__WORKSPACES_LIST__";
			// Fallback if served by a server build that doesn't inject the list
			// (e.g. the old process before a restart) — keeps the panel working.
			// LAPM's internal label is still 'prod'; only the display name is 'LAPM'.
			if (!Array.isArray(WORKSPACES_LIST)) {
				WORKSPACES_LIST = [
					{ id: '', label: 'prod', display: 'LAPM' },
					{ id: '', label: 'greenoak', display: 'Green Oak' },
					{ id: '', label: 'test', display: 'Test' }
				];
			}
			const WS_KEY = 'bedrock.workspaceFilter';
			const WS_LABELS = WORKSPACES_LIST.map((w) => w.label);
			const DEFAULT_WS = WS_LABELS.includes('prod') ? 'prod' : WS_LABELS[0] || 'prod';
			let workspaceFilter = localStorage.getItem(WS_KEY) || DEFAULT_WS;
			// Coerce the legacy 'all' value and any label that's no longer a known
			// workspace back to the default.
			if (workspaceFilter === 'all') workspaceFilter = DEFAULT_WS;
			if (!WS_LABELS.includes(workspaceFilter)) workspaceFilter = DEFAULT_WS;

			const wsTabs = document.getElementById('ws-tabs');

			// Build the workspace tabs from the injected workspace list.
			wsTabs.innerHTML = WORKSPACES_LIST.map(
				(w, i) =>
					`<button type="button" role="tab" class="ws-tab ${w.label}" data-ws="${w.label}" aria-selected="false">` +
					`<span class="ws-dot ${w.label}"></span>` +
					`<span class="ws-name">${escapeHtml(w.display)}</span>` +
					`<span class="ws-key">${i + 1}</span>` +
					`</button>`
			).join('');

			function renderWsTabs() {
				for (const btn of wsTabs.querySelectorAll('button[data-ws]')) {
					btn.classList.toggle('active', btn.dataset.ws === workspaceFilter);
					btn.setAttribute('aria-selected', btn.dataset.ws === workspaceFilter ? 'true' : 'false');
				}
			}

			function selectWorkspace(label) {
				if (!label || label === workspaceFilter) return;
				workspaceFilter = label;
				localStorage.setItem(WS_KEY, workspaceFilter);
				renderWsTabs();
				// Bust the id-set guards so render actually rebuilds.
				renderedDraftIds = '';
				renderedChatIds = '';
				renderedIssuesKey = null;
				refresh();
				if (drawer === 'sessions') loadSessions();
				turnsSig = null;
				if (drawer === 'turns') loadTurns();
				// Chat thread has its own cache + 4s poller and isn't covered by
				// refresh(); bust the render guard and reload now so the switch
				// is instant instead of waiting on the next poll tick.
				renderedChatThreadKey = '';
				renderedChatDraftIds = '';
				chatThreadCache = null;
				loadChatThread();
				loadKpi();
				if (memOpen) loadMemoryGraph();
			}

			wsTabs.addEventListener('click', (e) => {
				const btn = e.target.closest('button[data-ws]');
				if (!btn) return;
				selectWorkspace(btn.dataset.ws);
			});

			function workspaceShortcutIndex(e) {
				if (e.type === 'beforeinput') {
					if (e.inputType === 'insertText' && /^[1-9]$/.test(e.data || '')) {
						return Number(e.data) - 1;
					}
					return -1;
				}
				if (e.ctrlKey || e.altKey || e.shiftKey) return -1;
				if (/^[1-9]$/.test(e.key)) return Number(e.key) - 1;
				if (/^Digit[1-9]$/.test(e.code)) return Number(e.code.slice(5)) - 1;
				if (/^Numpad[1-9]$/.test(e.code)) return Number(e.code.slice(6)) - 1;
				return -1;
			}

			let lastWorkspaceShortcut = '';
			let lastWorkspaceShortcutAt = 0;
			function handleWorkspaceShortcut(e) {
				// Never hijack keystrokes destined for a text field — typing a digit
				// in the composer or a draft textarea must insert the digit, not
				// switch workspace (the beforeinput path would otherwise eat it).
				const t = e.target;
				if (t && (t.isContentEditable || /^(INPUT|TEXTAREA|SELECT)$/.test(t.tagName))) return;
				const idx = workspaceShortcutIndex(e);
				if (idx < 0) return;
				const keyId = `${idx}:${e.metaKey ? 'm' : ''}`;
				const now = Date.now();
				if (keyId === lastWorkspaceShortcut && now - lastWorkspaceShortcutAt < 120) return;
				lastWorkspaceShortcut = keyId;
				lastWorkspaceShortcutAt = now;
				const ws = WORKSPACES_LIST[idx];
				if (!ws) return;
				e.preventDefault();
				e.stopPropagation();
				window.__bedrockLastWorkspaceShortcut = {
					type: e.type,
					key: e.key,
					code: e.code,
					data: e.data,
					workspace: ws.label,
					at: new Date().toISOString()
				};
				selectWorkspace(ws.label);
			}

			window.addEventListener('keydown', handleWorkspaceShortcut, true);
			window.addEventListener('keypress', handleWorkspaceShortcut, true);
			window.addEventListener('keyup', handleWorkspaceShortcut, true);
			window.addEventListener('beforeinput', handleWorkspaceShortcut, true);
			renderWsTabs();

			function passesFilter(label) {
				return label === workspaceFilter;
			}

			const draftsList = document.getElementById('drafts-list');
			const chatList = document.getElementById('chat-list');
			const draftsCount = document.getElementById('drafts-count');
			const chatCount = document.getElementById('chat-count');
			const toastEl = document.getElementById('toast');

			// draftId -> { age: HTMLElement, createdAt: string } so we can refresh
			// the "Xm ago" text without re-rendering the textareas (which would
			// stomp on edits the user is currently making).
			const cardRefs = new Map();
			let renderedDraftIds = '';
			let renderedChatIds = '';
			const chatRefs = new Map();
			// Pending save timer per draft id, for debounced auto-save on input.
			const saveTimers = new Map();
			const SAVE_DEBOUNCE_MS = 500;

			let toastTimer = null;
			function hideToast() {
				clearTimeout(toastTimer);
				toastEl.classList.remove('show');
			}
			// toast(msg) — plain. toast(msg, kind) — info|error styling.
			// toast(msg, kind, { label, onClick, duration }) — adds a trailing
			// action button (e.g. "Undo"); the toast then stays for `duration`ms
			// and is clickable. Clicking the action hides the toast first.
			function toast(msg, kind = 'info', action = null) {
				toastEl.classList.toggle('error', kind === 'error');
				toastEl.classList.toggle('has-action', !!action);
				toastEl.textContent = '';
				const label = document.createElement('span');
				label.textContent = msg;
				toastEl.appendChild(label);
				if (action) {
					const btn = document.createElement('button');
					btn.type = 'button';
					btn.className = 'toast-action';
					btn.textContent = action.label;
					btn.addEventListener('click', () => {
						hideToast();
						action.onClick && action.onClick();
					});
					toastEl.appendChild(btn);
				}
				toastEl.classList.add('show');
				clearTimeout(toastTimer);
				toastTimer = setTimeout(
					() => toastEl.classList.remove('show'),
					action && action.duration ? action.duration : 2400
				);
			}

			// Optimistic-deny bookkeeping (Gmail-style undo). A denied action
			// is hidden from the rail immediately and the server call is DEFERRED
			// for UNDO_WINDOW_MS; "Undo" just cancels the pending commit, so we
			// never have to resurrect a server-deleted draft.
			const UNDO_WINDOW_MS = 5000;
			const pendingDismiss = new Map(); // id -> { messages, timer }
			let lastAllDrafts = []; // last /api/drafts payload, for instant queue re-render

			function escapeHtml(s) {
				return String(s).replace(/[&<>"']/g, (c) => ({
					'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
				})[c]);
			}

			function fmtAge(iso) {
				const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
				if (s < 60) return s + 's ago';
				if (s < 3600) return Math.floor(s / 60) + 'm ago';
				return Math.floor(s / 3600) + 'h ago';
			}

			function shortIssue(id) {
				if (!id) return '—';
				return id.length > 12 ? id.slice(0, 8) : id;
			}

			function queueActionLabel(channel) {
				if (channel === 'groupchat') return 'chat';
				if (channel === 'tenant_appfolio') return 'appfolio tenant';
				if (channel === 'vendor_appfolio') return 'appfolio vendor';
				return channel ?? 'action';
			}

			function orderedQueueItems(items) {
				return [...items].sort((a, b) => {
					const at = new Date(a.created_at ?? 0).getTime();
					const bt = new Date(b.created_at ?? 0).getTime();
					return at - bt;
				});
			}

				function isPreviewQueueItem(d) {
					return !!d.preview_only;
				}

				const DENY_REASONS = [
					['wrong_action', 'Wrong action'],
					['wrong_work_order', 'Wrong work order'],
					['wrong_vendor', 'Wrong vendor'],
					['wrong_recipient', 'Wrong recipient'],
					['missing_context', 'Missing context'],
					['should_be_silent', 'Should be silent'],
					['duplicate', 'Duplicate'],
					['unsafe_or_not_allowed', 'Unsafe / not allowed']
				];

			function autoSize(ta) {
				ta.style.height = 'auto';
				ta.style.height = ta.scrollHeight + 'px';
			}

				// Builds one queue card. The rail renders every draft, but only the
				// next-up action gets Accept/Deny controls.
				function createDraftCard(d, refsMap, { showActions = true } = {}) {
				const messages = Array.isArray(d.messages) ? d.messages : [{ body: d.body ?? '' }];
				const origs = (Array.isArray(d.original_messages) ? d.original_messages : messages).map(
					(m) => m.body
				);

					const card = document.createElement('div');
					card.className = 'draft';
					card.classList.toggle('next-up', showActions);
					card.dataset.id = d.id;

				const wsLabel = d.workspace_label ?? 'unknown';
				const wsClass = 'workspace' + (wsLabel ? ' ' + wsLabel : '');

				const meta = document.createElement('div');
				meta.className = 'meta';
				meta.innerHTML =
					`<span class="tag ${wsClass}">${escapeHtml(wsLabel)}</span>` +
					`<span class="tag channel ${escapeHtml(d.channel ?? '')}">${escapeHtml(queueActionLabel(d.channel))}</span>` +
					(d.issue_id
						? `<span class="tag issue-link" data-issue="${escapeHtml(d.issue_id)}" data-ws="${escapeHtml(wsLabel)}" title="open issue ${escapeHtml(d.issue_id)}">issue ${escapeHtml(shortIssue(d.issue_id))} ↗</span>`
						: `<span class="tag">issue —</span>`) +
					`<span class="age">${fmtAge(d.created_at)}</span>` +
					(d.hold_until
						? `<span class="tag hold">${d.approved_at ? 'queued' : 'hold'}</span>`
						: '');
				card.appendChild(meta);
				const ageEl = meta.querySelector('.age');
				if (refsMap) refsMap.set(d.id, { ageEl });
				const issueLink = meta.querySelector('.issue-link');
				if (issueLink)
					issueLink.onclick = () => focusIssue(issueLink.dataset.issue, issueLink.dataset.ws);

				const recipients = d.to_participants?.length ? d.to_participants : d.to ? [d.to] : [];
				const recip = document.createElement('div');
				recip.className = 'recipients';
				recip.innerHTML =
					`<div class="handles"><span class="label">to</span>` +
					recipients.map((r) => `<span class="handle">${escapeHtml(r)}</span>`).join('') +
					`</div>`;
				card.appendChild(recip);

				const bubbles = document.createElement('div');
				bubbles.className = 'bubbles';
				const tas = [];
				messages.forEach((m, i) => {
					const b = document.createElement('div');
					b.className = 'bubble';
					const ta = document.createElement('textarea');
					ta.value = m.body;
					ta.rows = 1;
					if (ta.value !== origs[i]) b.classList.add('edited');
					ta.addEventListener('input', () => {
						autoSize(ta);
						b.classList.toggle('edited', ta.value !== origs[i]);
						scheduleSave(d.id, tas);
					});
					ta.addEventListener('blur', () => flushSave(d.id, tas));
					b.appendChild(ta);
					bubbles.appendChild(b);
					tas.push(ta);
					// Defer sizing until in DOM. If the card is in a hidden tab
					// scrollHeight = 0 and the textarea collapses to one line;
					// resizeAllDraftTextareas() reruns on tab activation.
					requestAnimationFrame(() => autoSize(ta));
				});
				card.appendChild(bubbles);

					if (!showActions) return card;

					const actions = document.createElement('div');
					actions.className = 'actions';

				// Only groupchat drafts get a Send button (live dylib send). For
				// tenant_appfolio / vendor_appfolio drafts there's no automated
				// channel yet.
				const canSend = d.channel === 'groupchat';

				// "Send later" — only on drafts that arrived off-hours (hold_until
				// still in the future). Toggles a queued state; once the hold time
				// passes (work hours) the button drops away, leaving Send · Dismiss.
				const heldFuture = !!d.hold_until && new Date(d.hold_until).getTime() > Date.now();
				if (canSend && heldFuture) {
					const queued = !!d.approved_at;
					const laterBtn = document.createElement('button');
					laterBtn.className = queued ? 'later queued' : 'later';
					laterBtn.textContent = queued
						? `Queued · ${holdLabel(d.hold_until)}`
						: `Send at ${holdLabel(d.hold_until)}`;
					laterBtn.title = queued
						? 'Queued — click to cancel and keep as a draft'
						: 'Queue to auto-send at the next work hour';
					laterBtn.onclick = () => toggleSchedule(d.id, laterBtn, d.hold_until);
					actions.appendChild(laterBtn);
				}

					if (canSend) {
						const sendBtn = document.createElement('button');
						sendBtn.className = 'primary';
						sendBtn.textContent = 'Accept';
						sendBtn.onclick = isPreviewQueueItem(d)
							? () => toast('Preview only — not sent')
							: () => act(d.id, 'send', tas, origs, sendBtn);
						actions.appendChild(sendBtn);
					}

				// AppFolio drafts: one click starts the existing runner in the
				// background and lets the runner execute each step. Routing is by channel:
				// vendor_appfolio runs the vendor-dispatch flow (assign vendor +
				// vendor text); tenant_appfolio runs the tenant text flow.
				if (d.channel === 'vendor_appfolio') {
						const vbtn = document.createElement('button');
						vbtn.className = 'primary';
						vbtn.textContent = 'Accept';
						if (isPreviewQueueItem(d)) {
							vbtn.title = 'Preview only: this seeded example will not run AppFolio';
						} else if (!hasAppfolioRunner(d)) {
							vbtn.disabled = true;
							vbtn.title = 'Preview only: this workspace has no AppFolio runner';
						}
						vbtn.onclick = isPreviewQueueItem(d)
							? () => toast('Preview only — AppFolio not run')
							: () => runAppfolioVendorDraft(d, tas.map((t) => t.value).join('\n'), vbtn);
						actions.appendChild(vbtn);
					} else if ((d.channel ?? '').endsWith('_appfolio')) {
						const afBtn = document.createElement('button');
						afBtn.className = 'primary';
						afBtn.textContent = 'Accept';
						if (isPreviewQueueItem(d)) {
							afBtn.title = 'Preview only: this seeded example will not run AppFolio';
						} else if (!hasAppfolioRunner(d)) {
							afBtn.disabled = true;
							afBtn.title = 'Preview only: this workspace has no AppFolio runner';
						}
						afBtn.onclick = isPreviewQueueItem(d)
							? () => toast('Preview only — AppFolio not run')
							: () => runAppfolioTenantDraft(d, tas.map((t) => t.value).join('\n'), afBtn);
						actions.appendChild(afBtn);
					}

					const dismissBtn = document.createElement('button');
					dismissBtn.className = 'danger';
					dismissBtn.textContent = 'Deny';
					dismissBtn.onclick = () => card.classList.toggle('deny-open');
					actions.appendChild(dismissBtn);
					card.appendChild(actions);

					const reasons = document.createElement('div');
					reasons.className = 'deny-reasons';
					for (const [value, label] of DENY_REASONS) {
						const reasonBtn = document.createElement('button');
						reasonBtn.type = 'button';
						reasonBtn.textContent = label;
						reasonBtn.onclick = () => dismissWithUndo(d.id, tas, value);
						reasons.appendChild(reasonBtn);
					}
					card.appendChild(reasons);

					return card;
				}

			// Re-run autoSize on every textarea inside both draft panes. Cheap
			// and idempotent. Called after tab activation so hidden→visible
			// textareas pick up their real scrollHeight.
			function resizeAllDraftTextareas() {
				const tas = document.querySelectorAll(
					'#drafts-list .draft textarea, #chat-drafts-rail .draft textarea'
				);
				for (const ta of tas) autoSize(ta);
			}

			function render(drafts) {
				drafts = orderedQueueItems(drafts.filter((d) => !pendingDismiss.has(d.id)));
				const idsKey = drafts.map((d) => d.id).join('|');
				if (idsKey === renderedDraftIds && drafts.length > 0) {
					for (const d of drafts) {
						const ref = cardRefs.get(d.id);
						if (ref?.ageEl) ref.ageEl.textContent = fmtAge(d.created_at);
					}
					return;
				}
				renderedDraftIds = idsKey;
				cardRefs.clear();
				draftsList.innerHTML = '';
				if (!drafts.length) {
					const e = document.createElement('div');
					e.className = 'empty';
					e.textContent = 'no pending actions';
					draftsList.appendChild(e);
					return;
				}
					for (const [i, d] of drafts.entries()) {
						draftsList.appendChild(createDraftCard(d, cardRefs, { showActions: i === 0 }));
				}
			}

			async function saveDraft(id, tas) {
				const messages = tas.map((t) => ({ body: t.value }));
				try {
					const res = await fetch(`/api/drafts/${id}`, {
						method: 'PATCH',
						headers: { 'content-type': 'application/json' },
						body: JSON.stringify({ messages })
					});
					if (!res.ok) throw new Error(await res.text());
				} catch (err) {
					toast(`save failed: ${err.message}`, 'error');
				}
			}

			function scheduleSave(id, tas) {
				clearTimeout(saveTimers.get(id));
				const t = setTimeout(() => {
					saveTimers.delete(id);
					saveDraft(id, tas);
				}, SAVE_DEBOUNCE_MS);
				saveTimers.set(id, t);
			}

			function flushSave(id, tas) {
				if (!saveTimers.has(id)) return;
				clearTimeout(saveTimers.get(id));
				saveTimers.delete(id);
				saveDraft(id, tas);
			}

			async function act(id, action, tas, origs, btn) {
				btn.disabled = true;
				// Flush any pending edits so the server has the final body
				// before we tell it to send/copy/dismiss.
				flushSave(id, tas);
				const messages = tas.map((t) => ({ body: t.value }));
				try {
					const res = await fetch(`/api/drafts/${id}/${action}`, {
						method: 'POST',
						headers: { 'content-type': 'application/json' },
						body: JSON.stringify({ messages })
					});
					if (!res.ok) {
						const err = await res.text();
						toast(`${action} failed: ${err}`, 'error');
						btn.disabled = false;
						return;
					}
					toast(action === 'send' ? 'sent' : action === 'copy' ? 'copied' : 'dismissed');
					await refresh();
				} catch (err) {
					toast(`${action} failed: ${err.message}`, 'error');
					btn.disabled = false;
				}
			}

			// Re-render the queue rail from the last fetched payload without
			// waiting for the 4s poll — used to make an optimistic deny/undo
			// show up instantly. pendingDismiss ids are filtered out downstream.
			function rerenderDraftsNow() {
				renderChatDrafts(lastAllDrafts);
			}

			// Deny optimistically: hide the card now, show an "Undo" toast, and
			// only POST the dismiss endpoint once the undo window lapses.
				function dismissWithUndo(id, tas, denialReason = null) {
				// Flush any pending edits so the dismiss logs the final body and an
				// undo restores the latest text on the next poll.
				flushSave(id, tas);
				const messages = tas.map((t) => ({ body: t.value }));
				const prev = pendingDismiss.get(id);
				if (prev) clearTimeout(prev.timer);
				const timer = setTimeout(() => commitDismiss(id), UNDO_WINDOW_MS);
					pendingDismiss.set(id, { messages, denialReason, timer });
				rerenderDraftsNow();
				toast('Action denied', 'info', {
					label: 'Undo',
					duration: UNDO_WINDOW_MS,
					onClick: () => undoDismiss(id)
				});
			}

			function undoDismiss(id) {
				const p = pendingDismiss.get(id);
				if (!p) return;
				clearTimeout(p.timer);
				pendingDismiss.delete(id);
				rerenderDraftsNow();
			}

			async function commitDismiss(id) {
				const p = pendingDismiss.get(id);
				if (!p) return; // undone before the window closed
				try {
					const res = await fetch(`/api/drafts/${id}/dismiss`, {
							method: 'POST',
							headers: { 'content-type': 'application/json' },
							body: JSON.stringify({ messages: p.messages, denial_reason: p.denialReason })
						});
					if (!res.ok) throw new Error(await res.text());
					// Server dropped it; next poll won't return it. Clear the local
					// guard so the Map doesn't grow unbounded.
					pendingDismiss.delete(id);
				} catch (err) {
					// Restore the card on failure so the dismiss isn't silently lost.
					pendingDismiss.delete(id);
					rerenderDraftsNow();
					toast(`dismiss failed: ${err.message}`, 'error');
				}
			}

			// Format a hold_until ISO into a short "7 AM tomorrow" / "7 AM Monday"
			// label for the Send-later button.
			function holdLabel(iso) {
				const d = new Date(iso);
				const now = new Date();
				const hr = d.getHours();
				const ampm = hr < 12 ? 'AM' : 'PM';
				const h12 = ((hr + 11) % 12) + 1;
				const mins = d.getMinutes() ? ':' + String(d.getMinutes()).padStart(2, '0') : '';
				const time = `${h12}${mins} ${ampm}`;
				const day0 = (x) => new Date(x.getFullYear(), x.getMonth(), x.getDate());
				const diff = Math.round((day0(d) - day0(now)) / 86400000);
				const day =
					diff <= 0 ? 'today' : diff === 1 ? 'tomorrow' : d.toLocaleDateString([], { weekday: 'long' });
				return `${time} ${day}`;
			}

			// Toggle the "Send later" queue on a held draft. Updates the button in
			// place (no full re-render — keeps any in-progress textarea edits).
			async function toggleSchedule(id, btn, holdIso) {
				btn.disabled = true;
				try {
					const res = await fetch(`/api/drafts/${id}/schedule`, {
						method: 'POST',
						headers: { 'content-type': 'application/json' },
						body: '{}'
					});
					if (!res.ok) {
						toast(`schedule failed: ${await res.text()}`, 'error');
						btn.disabled = false;
						return;
					}
					const { approved_at } = await res.json();
					const queued = !!approved_at;
					btn.className = queued ? 'later queued' : 'later';
					btn.textContent = queued
						? `Queued · ${holdLabel(holdIso)}`
						: `Send at ${holdLabel(holdIso)}`;
					btn.title = queued
						? 'Queued — click to cancel and keep as a draft'
						: 'Queue to auto-send at the next work hour';
					const tag = btn.closest('.draft')?.querySelector('.tag.hold');
					if (tag) tag.textContent = queued ? 'queued' : 'hold';
					toast(queued ? 'queued' : 'unscheduled');
					btn.disabled = false;
				} catch (err) {
					toast(`schedule failed: ${err.message}`, 'error');
					btn.disabled = false;
				}
			}

			// ─── AppFolio send (runs the runner service in the background) ──────
			// Accepting an AppFolio draft drives the runner service (agent/appfolio/
			// runner.mjs) through its JSON endpoints (CORS is open) — no visible
			// panel; the runner resolves the WO from the draft's issue_id, auto-runs
			// the flow, and the final Send/Save is LIVE. Each AppFolio workspace has
			// its OWN runner process on its own port (injected from core/workspaces.mjs),
			// so a send can never hit another account's runner. The draft id rides
			// along so the runner can refuse a duplicate Send for the same draft.
			let RUNNER_PORTS = "__RUNNER_PORTS__";
			if (typeof RUNNER_PORTS !== 'object' || RUNNER_PORTS === null) RUNNER_PORTS = {};
			function runnerBaseFor(workspace_id) {
				const port = workspace_id ? RUNNER_PORTS[workspace_id] : 9773;
				if (!port) return null;
				return 'http://127.0.0.1:' + port;
			}

			function hasAppfolioRunner(d) {
				return !!runnerBaseFor(d.workspace_id);
			}

			function appfolioTenantStartUrl(d, body) {
				const to = d.channel === 'vendor_appfolio' ? 'Vendor' : 'Tenant';
				const params = { flow: 'text', to, message: body, auto: '1', draft_id: d.id };
				if (d.workspace_id) params.workspace = d.workspace_id;
				if (d.appfolio_srn) params.srn = String(d.appfolio_srn);
				else params.issue_id = d.issue_id ?? '';
				const base = runnerBaseFor(d.workspace_id);
				if (!base) return null;
				return `${base}/?${new URLSearchParams(params)}`;
			}

			function appfolioVendorStartUrl(d, body) {
				const vendor = d.vendor ?? d.to ?? (d.to_participants && d.to_participants[0]) ?? '';
				const params = { flow: 'vendor', vendor, message: body ?? '', auto: '1', draft_id: d.id };
				if (d.workspace_id) params.workspace = d.workspace_id;
				if (d.appfolio_srn) params.srn = String(d.appfolio_srn);
				else params.issue_id = d.issue_id ?? '';
				const base = runnerBaseFor(d.workspace_id);
				if (!base) return null;
				return `${base}/?${new URLSearchParams(params)}`;
			}

			function runAppfolioTenantDraft(d, body, btn) {
				runAppfolioDraftInBackground(d, body, btn, appfolioTenantStartUrl(d, body));
			}

			function runAppfolioVendorDraft(d, body, btn) {
				runAppfolioDraftInBackground(d, body, btn, appfolioVendorStartUrl(d, body));
			}

			async function runAppfolioDraftInBackground(d, body, btn, startUrl) {
				if (!startUrl) {
					toast('No AppFolio runner for this workspace', 'error');
					return;
				}
				btn.disabled = true;
				const originalText = btn.textContent;
				btn.textContent = 'Running via AppFolio…';
				const base = runnerBaseFor(d.workspace_id);
				if (!base) {
					toast('No AppFolio runner for this workspace', 'error');
					btn.disabled = false;
					btn.textContent = originalText;
					return;
				}
				// Send-once guard: claim the draft server-side BEFORE firing the runner.
				// A refused claim means it's already sending or sent — bail without
				// triggering another real AppFolio send (this is what stops dup sends).
				const claim = await fetch('/api/drafts/' + d.id + '/appfolio-claim', { method: 'POST' });
				if (!claim.ok) {
					const reason = (await claim.json().catch(() => ({}))).reason;
					toast(reason === 'sent' ? 'Already sent' : 'Already sending — not re-sending', 'error');
					btn.disabled = true; // keep it locked; it must not fire again
					return;
				}
				let result = null;
				try {
					// Reset any stale completed/error run so this click owns the runner.
					await fetch(`${base}/reject`, { method: 'POST' }).catch(() => {});
					await fetch(startUrl);
					result = await driveAppfolioRunner(base);
					if (result.status !== 'done') throw new Error(result.error || result.status || 'runner stopped');
					const res = await fetch('/api/drafts/' + d.id + '/appfolio-done', {
						method: 'POST',
						headers: { 'content-type': 'application/json' },
						body: JSON.stringify({ messages: [{ body }] })
					});
					if (!res.ok) throw new Error(await res.text());
					toast('sent via AppFolio');
					await refresh();
				} catch (err) {
					// Reopen for retry ONLY when the send genuinely did not happen (runner
					// never reached 'done'). If it DID send but post-send bookkeeping
					// failed, leave the draft locked so it can never re-send — the text
					// already went out; clearing it is a manual call.
					const sent = result?.status === 'done';
					if (!sent) {
						await fetch('/api/drafts/' + d.id + '/appfolio-release', { method: 'POST' }).catch(() => {});
						btn.disabled = false;
						btn.textContent = originalText;
						toast(`AppFolio send failed: ${err.message}`, 'error');
					} else {
						btn.disabled = true;
						toast(`Sent in AppFolio, but couldn't close the draft — clear it manually. (${err.message})`, 'error');
					}
				}
			}

			async function driveAppfolioRunner(base) {
				const deadline = Date.now() + 5 * 60 * 1000;
				const startBy = Date.now() + 20 * 1000; // run must leave the pre-start state within 20s
				let last = null;
				let started = false;
				while (Date.now() < deadline) {
					const res = await fetch(`${base}/state`);
					if (!res.ok) throw new Error(`runner state ${res.status}`);
					const s = await res.json();
					last = s;
					// 'idle'/'starting' are PRE-run states: startRun is fired fire-and-forget
					// and only flips status after an async issue→workspace lookup, so the
					// first poll can race ahead of it. Treating that leading 'idle' as
					// terminal made the UI report "send failed: idle" while the run kept
					// going and actually sent — a false negative that invited re-clicks and
					// duplicate sends. Wait until the run has actually started.
					if (!['idle', 'starting'].includes(s.status)) started = true;
					if (s.status === 'done' || s.status === 'error') return s;
					if (started && s.status === 'idle') return s; // an active run got reset/cancelled
					if (!started && Date.now() > startBy) {
						return { status: 'error', error: 'runner never started (still idle)' };
					}
					await new Promise((r) => setTimeout(r, 1000));
				}
				return { status: 'error', error: last?.error || 'runner timed out' };
			}

			function renderNotes(wrap, r) {
				wrap.innerHTML = '';
				const existing = (r.notes ?? '').trim();
				if (!existing) {
					const empty = document.createElement('div');
					empty.className = 'note-empty';
					empty.textContent = '+ add note';
					empty.onclick = () => openNoteEditor(wrap, r, '');
					wrap.appendChild(empty);
					return;
				}
				openNoteEditor(wrap, r, existing);
			}

			function openNoteEditor(wrap, r, initial) {
				wrap.innerHTML = '';
				const ta = document.createElement('textarea');
				ta.value = initial;
				ta.placeholder = 'why did you edit / dismiss / send? (saved on blur)';
				ta.rows = 1;
				wrap.appendChild(ta);
				const saved = document.createElement('span');
				saved.className = 'saved';
				saved.textContent = 'saved';
				wrap.appendChild(saved);

				const autosize = () => {
					ta.style.height = 'auto';
					ta.style.height = ta.scrollHeight + 'px';
				};
				ta.addEventListener('input', autosize);
				requestAnimationFrame(autosize);

				let lastSent = initial;
				ta.addEventListener('blur', async () => {
					const val = ta.value.trim();
					if (val === lastSent.trim()) return;
					try {
						const res = await fetch(`/api/history/${r.draft_id}`, {
							method: 'PATCH',
							headers: { 'content-type': 'application/json' },
							body: JSON.stringify({ notes: val })
						});
						if (!res.ok) throw new Error(await res.text());
						r.notes = val;
						lastSent = val;
						saved.classList.add('show');
						setTimeout(() => saved.classList.remove('show'), 1400);
					} catch (err) {
						toast(`note save failed: ${err.message}`, 'error');
					}
				});

				ta.focus();
				if (initial) {
					ta.setSelectionRange(initial.length, initial.length);
				}
			}

			function agentActionLabel(m) {
				const action = m.agent_action;
				if (!action) return 'no action'; // pre-F2 captures / agent never ran
				if (action === 'drafted') {
					const n = m.agent_drafts_count ?? 0;
					return n ? `✓ drafted (${n})` : '✓ drafted';
				}
				if (action === 'clarify') return '? clarifying Q drafted';
				if (action === 'learned') return '⇒ learned';
				if (action === 'no_match') return 'no match';
				if (action === 'failure') {
					return m.agent_error ? `✗ failure: ${m.agent_error}` : '✗ failure';
				}
				return action;
			}

			function renderChat(items) {
				// Key includes agent_action so the cache invalidates when the chat
				// poller patches the row after running the chat skill.
				const idsKey = items.map((m) => `${m.message_guid}:${m.agent_action ?? ''}`).join('|');
				if (idsKey === renderedChatIds && items.length > 0) {
					for (const m of items) {
						const ref = chatRefs.get(m.message_guid);
						if (ref?.whenEl) ref.whenEl.textContent = fmtAge(m.received_at);
					}
					return;
				}
				renderedChatIds = idsKey;
				chatRefs.clear();
				chatList.innerHTML = '';

				if (!items.length) {
					const e = document.createElement('div');
					e.className = 'empty';
					e.textContent = 'no inbound messages yet';
					chatList.appendChild(e);
					return;
				}

				for (const m of items) {
					const card = document.createElement('div');
					card.className = 'chat-item';

					const wsLabel = m.workspace_label ?? 'unknown';
					const wsClass = 'tag workspace' + (wsLabel ? ' ' + wsLabel : '');

					const label = agentActionLabel(m);
					// When agent_action is missing (pre-F2 row or agent never ran),
					// label = 'no action'. Style it with the no_action class.
					const actionClass = m.agent_action || 'no_action';
					const actionChip = label

						: '';

					const top = document.createElement('div');
					top.className = 'top';
					top.innerHTML =

					const handleRow = document.createElement('div');
					handleRow.className = 'handle-row';
					handleRow.innerHTML =
						`<span class="${wsClass}">${escapeHtml(wsLabel)}</span>` +
						`<span class="handle-text">${escapeHtml(m.handle ?? '')}</span>`;
					card.appendChild(handleRow);

					const b = document.createElement('div');
					b.className = 'in-bubble';
					b.textContent = m.text ?? '';
					card.appendChild(b);

					chatList.appendChild(card);
					chatRefs.set(m.message_guid, { whenEl: top.querySelector('.when') });

			// The Issues tab is the default landing view. refresh() reloads it;
			// it's wired to the workspace toggle, Clear Test, and draft actions
			// (a send flips an issue drafted→sent) so the list stays current.
			const issuesList = document.getElementById('issues-list');
			let issuesLoading = false;
			let renderedIssuesKey = null;
			// Set when a draft's issue chip is clicked; applied after the next
			// issues render to scroll the row into view and flash it.
			let pendingFocusIssueId = null;

			async function loadIssues() {
				if (issuesLoading) return;
				issuesLoading = true;
				if (!issuesList.querySelector('.issue-row'))
					issuesList.innerHTML = '<div class="issues-empty">Loading issues…</div>';
				try {
					const res = await fetch('/api/issues?workspace=' + workspaceFilter);
					if (!res.ok) throw new Error(await res.text());
					renderIssues(await res.json());

				} catch (err) {
					if (!issuesList.querySelector('.issue-row'))
						issuesList.innerHTML =
							'<div class="issues-empty">Failed to load issues: ' + escapeHtml(err.message) + '</div>';
				} finally {
					issuesLoading = false;
				}
			}

			// Jump from a draft (or anywhere) to its issue: switch workspace if the
			// issue lives in the other one, open the Issues tab, then scroll to +
			// flash the row once the list has rendered.
			function focusIssue(issueId, wsLabel) {
				if (!issueId) return;
				pendingFocusIssueId = issueId;
				if (wsLabel && wsLabel !== 'unknown' && wsLabel !== workspaceFilter) {
					selectWorkspace(wsLabel);
					return;
				}
				loadIssues(); // issues pane is always visible; loadIssues applies the pending focus
			}

			function applyPendingIssueFocus() {
				if (!pendingFocusIssueId) return;
				const row = issuesList.querySelector(
					'.issue-row[data-issue-id="' + pendingFocusIssueId + '"]'
				);
				pendingFocusIssueId = null;
				if (!row) return;
				row.scrollIntoView({ behavior: 'smooth', block: 'center' });
				row.classList.remove('focused');
				void row.offsetWidth; // reflow so the flash animation restarts
				row.classList.add('focused');
