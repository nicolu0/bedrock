<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Bedrock · Work-order drafts</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
		<style>
			* { box-sizing: border-box; }
			html, body {
				margin: 0;
				background: #0e0f12;
				color: #e6e6e6;
				font: 14px/1.5 -apple-system, ui-sans-serif, system-ui, sans-serif;
			}
			header {
				padding: 18px 24px;
				border-bottom: 1px solid #1f2329;
				display: flex;
				align-items: baseline;
				gap: 16px;
			}
			header h1 {
				margin: 0;
				font-size: 16px;
				font-weight: 600;
				letter-spacing: 0.2px;
			}
			header .sub { color: #6c727b; font-size: 12px; }
			header .status { margin-left: 16px; font-size: 12px; color: #6c727b; }
			.ws-toggle {
				margin-left: auto;
				display: flex;
				gap: 2px;
				background: #14161b;
				border: 1px solid #1f2329;
				border-radius: 6px;
				padding: 2px;
			}
			.ws-toggle button {
				background: transparent;
				border: none;
				color: #8a9099;
				padding: 4px 12px;
				font-size: 11.5px;
				letter-spacing: 0.04em;
				border-radius: 4px;
				cursor: pointer;
				text-transform: uppercase;
				font-weight: 500;
			}
			.ws-toggle button:hover { color: #c0c5cc; }
			.ws-toggle button.active { background: #2a2f37; color: #e6e6e6; }
			.ws-toggle button.active.prod { background: #3a1a1f; color: #f08089; }
			.ws-toggle button.active.test { background: #1a2a3a; color: #7eb7f0; }

			.clear-test-btn {
				margin-left: 10px;
				background: transparent;
				border: 1px solid #3a2025;
				color: #c48088;
				padding: 6px 12px;
				font-size: 11.5px;
				letter-spacing: 0.04em;
				text-transform: uppercase;
				border-radius: 6px;
				font-weight: 500;
				cursor: pointer;
			}
			.clear-test-btn:hover { background: #2a1518; color: #f08089; border-color: #5a2a30; }
			.clear-test-btn:disabled { opacity: 0.5; cursor: wait; }
			main {
				padding: 24px;
				max-width: 1480px;
				margin: 0 auto;
				display: grid;
				grid-template-columns: minmax(380px, 1.1fr) minmax(340px, 1fr) minmax(300px, 0.85fr);
				gap: 22px;
				align-items: start;
			}
			@media (max-width: 1200px) {
				main { grid-template-columns: minmax(420px, 1.1fr) minmax(360px, 1fr); }
				#chat-col { grid-column: 1 / -1; }
			}
			@media (max-width: 900px) {
				main { grid-template-columns: 1fr; }
				#chat-col { grid-column: auto; }
			}
			.col-header {
				font-size: 11px;
				letter-spacing: 0.12em;
				text-transform: uppercase;
				color: #6c727b;
				margin: 0 0 10px;
				display: flex;
				align-items: baseline;
				gap: 8px;
			}
			.col-header .count {
				color: #4a5058;
				font-family: ui-monospace, Menlo, monospace;
				letter-spacing: 0;
				text-transform: none;
				font-size: 11px;
			}
			.empty {
				color: #6c727b;
				text-align: center;
				padding: 60px 0;
				font-size: 13px;
			}
			.draft {
				background: #14161b;
				border: 1px solid #1f2329;
				border-radius: 10px;
				padding: 16px 18px;
				margin-bottom: 14px;
			}
			.meta {
				display: flex;
				gap: 8px;
				font-size: 11px;
				color: #8a9099;
				margin-bottom: 10px;
				flex-wrap: wrap;
				align-items: center;
			}
			.meta .tag {
				background: #1f2329;
				color: #c0c5cc;
				padding: 2px 8px;
				border-radius: 4px;
				letter-spacing: 0.2px;
			}
			.meta .tag.workspace { background: #1a2a3a; color: #7eb7f0; }
			.meta .tag.workspace.prod { background: #3a1a1f; color: #f08089; }
			.meta .tag.urgent { background: #3a1a1f; color: #f08089; }
			.meta .tag.hold { background: #2a221a; color: #d9a366; }
			.meta .edited {
				margin-left: auto;
				color: #d9a366;
				font-size: 11px;
			}
			.recipients {
				font-size: 11px;
				color: #8a9099;
				margin: -4px 0 12px;
				font-family: ui-monospace, SF Mono, Menlo, monospace;
				display: flex;
				flex-direction: column;
				gap: 2px;
			}
			.recipients .handles {
				display: flex;
				flex-wrap: wrap;
				gap: 4px 8px;
				align-items: baseline;
			}
			.recipients .label { color: #6c727b; }
			.recipients .handle { color: #c0c5cc; }
			.recipients .guid {
				color: #4a5058;
				font-size: 10px;
				word-break: break-all;
			}

			.bubbles {
				display: flex;
				flex-direction: column;
				gap: 3px;
				margin: 6px 0 14px;
				align-items: flex-end;
			}
			.bubble {
				max-width: 78%;
				background: #1d6ee2;
				color: #ffffff;
				border-radius: 18px;
				padding: 9px 14px;
				font-size: 14px;
				line-height: 1.35;
				transition: background 0.12s;
				position: relative;
				min-width: 60px;
			}
			.bubble:has(textarea:focus) { background: #2a82f0; box-shadow: 0 0 0 1px #4a9cff inset; }
			.bubble textarea {
				background: transparent;
				border: none;
				color: inherit;
				font: inherit;
				width: 100%;
				resize: none;
				outline: none;
				padding: 0;
				margin: 0;
				display: block;
				overflow: hidden;
				min-height: 18px;
			}
			.bubble.edited::after {
				content: 'edited';
				position: absolute;
				top: 50%;
				right: calc(100% + 8px);
				transform: translateY(-50%);
				font-size: 10px;
				color: #d9a366;
				letter-spacing: 0.05em;
				white-space: nowrap;
			}

			.actions {
				display: flex;
				gap: 8px;
				margin-top: 4px;
			}
			button {
				background: #1f2329;
				color: #e6e6e6;
				border: 1px solid #2a2f37;
				padding: 7px 14px;
				border-radius: 6px;
				font: inherit;
				font-size: 13px;
				cursor: pointer;
			}
			button:hover { background: #262b32; }
			button.primary { background: #2d6cdf; border-color: #2d6cdf; color: white; }
			button.primary:hover { background: #3b78ea; }
			button.danger { color: #f08089; }
			button:disabled { opacity: 0.5; cursor: not-allowed; }

			.kpi {
				display: flex;
				gap: 18px;
				background: #14161b;
				border: 1px solid #1f2329;
				border-radius: 10px;
				padding: 14px 18px;
				margin-bottom: 18px;
				font-size: 12.5px;
				flex-wrap: wrap;
			}
			.kpi .stat { display: flex; flex-direction: column; gap: 2px; }
			.kpi .stat .label { color: #6c727b; font-size: 11px; letter-spacing: 0.05em; }
			.kpi .stat .value { color: #e6e6e6; font-size: 18px; font-weight: 600; font-family: ui-monospace, Menlo, monospace; }
			.kpi .stat .value .pct { color: #74c99a; }
			.kpi .stat .sub { color: #6c727b; font-size: 11px; }

			.history-item {
				background: #14161b;
				border: 1px solid #1f2329;
				border-radius: 10px;
				padding: 14px 16px;
				margin-bottom: 10px;
			}
			.history-item .top {
				display: flex;
				gap: 8px;
				align-items: center;
				font-size: 11px;
				color: #8a9099;
				margin-bottom: 8px;
				flex-wrap: wrap;
			}
			.action-tag {
				font-size: 11px;
				font-weight: 600;
				letter-spacing: 0.08em;
				padding: 2px 8px;
				border-radius: 4px;
				font-family: ui-monospace, Menlo, monospace;
			}
			.action-tag.send { background: rgba(60, 200, 120, 0.14); color: #74c99a; border: 1px solid rgba(60, 200, 120, 0.32); }
			.action-tag.copy { background: rgba(126, 183, 240, 0.14); color: #7eb7f0; border: 1px solid rgba(126, 183, 240, 0.32); }
			.action-tag.dismiss { background: rgba(240, 128, 137, 0.14); color: #f08089; border: 1px solid rgba(240, 128, 137, 0.32); }
			.history-item .when { color: #6c727b; font-size: 11px; margin-left: auto; }
			.history-item .recipients {
				margin: -2px 0 8px;
			}
			.history-item .bubbles {
				display: flex;
				flex-direction: column;
				gap: 3px;
				align-items: flex-end;
			}
			.history-item .bubble {
				max-width: 78%;
				background: #1d6ee2;
				color: #ffffff;
				border-radius: 18px;
				padding: 8px 13px;
				font-size: 13.5px;
				line-height: 1.35;
				white-space: pre-wrap;
				word-wrap: break-word;
			}
			.history-item.dismiss .bubble { background: #2a2d33; color: #c0c5cc; text-decoration: line-through; opacity: 0.7; }
			.history-item .bubble .strike {
				display: block;
				color: rgba(255, 255, 255, 0.62);
				text-decoration: line-through;
				font-size: 12.5px;
				margin-bottom: 3px;
			}
			.history-item .edited-pill {
				font-size: 10px;
				color: #d9a366;
				letter-spacing: 0.06em;
				background: rgba(217, 163, 102, 0.12);
				border: 1px solid rgba(217, 163, 102, 0.32);
				padding: 1px 6px;
				border-radius: 3px;
				font-family: ui-monospace, Menlo, monospace;
			}
			.notes {
				margin-top: 10px;
				border-top: 1px dashed #2a2f37;
				padding-top: 8px;
			}
			.notes .note-empty {
				color: #5a6068;
				font-size: 11px;
				cursor: pointer;
				font-style: italic;
				user-select: none;
			}
			.notes .note-empty:hover { color: #8a9099; }
			.notes textarea {
				width: 100%;
				background: #0e0f12;
				color: #e6e6e6;
				border: 1px solid #2a2f37;
				border-radius: 6px;
				padding: 8px 10px;
				font: inherit;
				font-size: 12.5px;
				line-height: 1.4;
				resize: none;
				outline: none;
				overflow: hidden;
				min-height: 32px;
			}
			.notes textarea:focus { border-color: #4a8de0; }
			.notes textarea::placeholder { color: #5a6068; font-style: italic; }
			.notes .saved {
				font-size: 10px;
				color: #74c99a;
				margin-left: 6px;
				opacity: 0;
				transition: opacity 0.15s;
			}
			.notes .saved.show { opacity: 1; }

			.chat-item {
				background: #14161b;
				border: 1px solid #1f2329;
				border-radius: 10px;
				padding: 12px 14px;
				margin-bottom: 8px;
			}
			.chat-item .top {
				display: flex;
				gap: 6px;
				align-items: center;
				font-size: 11px;
				color: #8a9099;
				margin-bottom: 6px;
				flex-wrap: wrap;
			}
			.chat-item .top .when { margin-left: auto; color: #6c727b; }
			.chat-item .handle-row {
				display: flex;
				align-items: center;
				gap: 8px;
				font-size: 11.5px;
				margin: 4px 0 8px;
			}
			.chat-item .handle-row .handle-text {
				font-family: ui-monospace, Menlo, monospace;
				color: #c0c5cc;
			}
			.chat-item .in-bubble {
				background: #1f2329;
				color: #e6e6e6;
				border-radius: 16px;
				padding: 8px 13px;
				font-size: 13.5px;
				line-height: 1.35;
				display: inline-block;
				max-width: 92%;
				white-space: pre-wrap;
				word-wrap: break-word;
			}
			.chat-item .agent-action {
				font-size: 10.5px;
				font-family: ui-monospace, Menlo, monospace;
				letter-spacing: 0.06em;
				padding: 2px 8px;
				border-radius: 4px;
			}
			.chat-item .agent-action.drafted {
				background: rgba(60, 200, 120, 0.14);
				color: #74c99a;
				border: 1px solid rgba(60, 200, 120, 0.32);
			}
			.chat-item .agent-action.no_match,
			.chat-item .agent-action.no_action {
				background: rgba(126, 130, 140, 0.14);
				color: #8a9099;
				border: 1px solid rgba(126, 130, 140, 0.32);
			}
			.chat-item .agent-action.failure {
				background: rgba(240, 128, 137, 0.14);
				color: #f08089;
				border: 1px solid rgba(240, 128, 137, 0.32);
			}
			.chat-item .agent-action.pending {
				background: rgba(217, 163, 102, 0.14);
				color: #d4a855;
				border: 1px solid rgba(217, 163, 102, 0.32);
			}

			.meta .tag.channel.tenant_appfolio {
				background: #2a2538;
				color: #a8a4d8;
			}
			.meta .tag.channel.vendor_appfolio {
				background: #2a2520;
				color: #d4a855;
			}

			.toast {
				position: fixed;
				bottom: 24px;
				right: 24px;
				background: #14161b;
				border: 1px solid #2a2f37;
				color: #e6e6e6;
				padding: 10px 16px;
				border-radius: 6px;
				font-size: 13px;
				opacity: 0;
				transform: translateY(8px);
				transition: opacity 0.15s, transform 0.15s;
				pointer-events: none;
				max-width: 360px;
			}
			.toast.show { opacity: 1; transform: translateY(0); }
			.toast.error { border-color: #5a2a30; color: #f08089; }

			/* ── Tab nav + view switching ───────────────────────────────── */
			.tab-nav { display: flex; gap: 4px; margin-left: 8px; }
			.tab-nav button {
				background: transparent;
				border: none;
				color: #8a9099;
				padding: 6px 14px;
				font-size: 12px;
				letter-spacing: 0.04em;
				border-radius: 6px;
				cursor: pointer;
				text-transform: uppercase;
				font-weight: 500;
			}
			.tab-nav button:hover { color: #c0c5cc; }
			.tab-nav button.active { background: #1f2329; color: #e6e6e6; }

			.memory-search {
				margin-left: 10px;
				background: #14161b;
				border: 1px solid #1f2329;
				color: #e6e6e6;
				padding: 6px 10px;
				border-radius: 6px;
				font: inherit;
				font-size: 12px;
				width: 200px;
				display: none;
			}
			.memory-search:focus { outline: none; border-color: #2d6cdf; }

			.view { display: none; }
			.view.active { display: block; }
			main.view.active { display: grid; }

			/* ── Memory graph view ──────────────────────────────────────── */
			.memory-view {
				position: relative;
				height: calc(100vh - 73px); /* header height */
				overflow: hidden;
			}
			.memory-view svg {
				width: 100%;
				height: 100%;
				background: #0e0f12;
				display: block;
				cursor: grab;
			}
			.memory-view svg:active { cursor: grabbing; }

			/* Node styling — all info via size/opacity, near-monochrome */
			.node { cursor: pointer; }
			.node circle {
				transition: stroke 0.12s, stroke-width 0.12s;
			}
			.node.observation circle {
				fill: #5a6470;
				stroke: #2a2f37;
				stroke-width: 1;
			}
			.node.belief circle {
				fill: #c0c5cc;
				stroke: #2a2f37;
				stroke-width: 1.5;
			}
			.node.belief.user-created circle {
				stroke: #d9a366;
				stroke-width: 2;
			}
			/* Entity nodes — color-coded per kind. Larger than observations so
			   they read as anchors in the graph. */
			.node.entity circle { stroke: #2a2f37; stroke-width: 1.5; }
			.node.entity.vendor   circle { fill: #74c99a; }
			.node.entity.property circle { fill: #d4a855; }
			.node.entity.owner    circle { fill: #7eb7f0; }
			.link.entity { stroke: #3a4554; stroke-opacity: 0.55; stroke-dasharray: 4 3; }
			/* Structural property↔owner edges from legacy owner_properties.
			   Solid + brighter so they read as "load-bearing relationship,
			   not a derived belief link." */
			.link.structural { stroke: #6b7a8f; stroke-opacity: 0.7; }
			.node.selected circle {
				stroke: #2d6cdf;
				stroke-width: 3;
			}
			.node.dimmed { opacity: 0.18; }
			.node.match circle {
				stroke: #d9a366;
				stroke-width: 2.5;
			}
			.node text {
				fill: #8a9099;
				font-size: 10px;
				font-family: ui-sans-serif, system-ui, sans-serif;
				pointer-events: none;
				dominant-baseline: hanging;
			}
			.node.observation text {
				display: none;
			}
			.node.observation:hover text {
				display: block;
				font-size: 9.5px;
			}
			.link {
				stroke: #2a2f37;
				stroke-opacity: 0.6;
			}
			.link.dimmed { stroke-opacity: 0.08; }

			/* Detail panel slides in from the right */
			.memory-detail {
				position: absolute;
				top: 0;
				right: 0;
				width: 380px;
				height: 100%;
				background: #14161b;
				border-left: 1px solid #1f2329;
				overflow-y: auto;
				padding: 24px 22px 80px;
				box-shadow: -2px 0 8px rgba(0, 0, 0, 0.3);
				z-index: 5;
			}
			.memory-detail[hidden] { display: none; }
			.memory-detail-close {
				position: absolute;
				top: 12px;
				right: 14px;
				background: transparent;
				border: none;
				color: #6c727b;
				font-size: 22px;
				cursor: pointer;
				padding: 2px 8px;
				line-height: 1;
			}
			.memory-detail-close:hover { color: #e6e6e6; }
			.memory-detail h3 {
				margin: 0 0 14px;
				font-size: 14px;
				color: #e6e6e6;
			}
			.memory-detail .kv {
				font-size: 12px;
				margin: 8px 0;
				display: flex;
				gap: 10px;
				color: #c0c5cc;
			}
			.memory-detail .kv .k {
				color: #6c727b;
				min-width: 90px;
				text-transform: uppercase;
				letter-spacing: 0.05em;
				font-size: 11px;
			}
			.memory-detail .claim {
				font-size: 14px;
				color: #e6e6e6;
				line-height: 1.5;
				margin: 0 0 14px;
				padding: 12px;
				background: #1a1d22;
				border-radius: 6px;
				border-left: 3px solid #c0c5cc;
			}
			.memory-detail .claim.user { border-left-color: #d9a366; }
			.memory-detail .scope-pill {
				display: inline-block;
				background: #1f2329;
				color: #c0c5cc;
				padding: 2px 8px;
				border-radius: 4px;
				font-size: 11px;
				margin: 2px 4px 2px 0;
				font-family: ui-monospace, Menlo, monospace;
			}
			.memory-detail .evidence-row {
				font-size: 12px;
				padding: 8px 10px;
				background: #1a1d22;
				border-radius: 6px;
				margin: 6px 0;
				cursor: pointer;
				border-left: 2px solid transparent;
			}
			.memory-detail .evidence-row:hover { background: #1f2329; }
			.memory-detail .evidence-row.contradicts { border-left-color: #f08089; }
			.memory-detail .evidence-row.supports { border-left-color: #74c99a; }
			.memory-detail .evidence-row .weight {
				font-family: ui-monospace, Menlo, monospace;
				color: #6c727b;
				font-size: 10px;
				float: right;
			}
			.memory-detail .actions {
				margin-top: 18px;
				display: flex;
				gap: 8px;
			}

			/* Bottom controls */
			.memory-controls {
				position: absolute;
				bottom: 16px;
				left: 16px;
				right: 16px;
				display: flex;
				align-items: center;
				gap: 12px;
				pointer-events: none;
				z-index: 4;
			}
			.memory-controls > * { pointer-events: auto; }
			.memory-filters {
				margin-left: auto;
				display: flex;
				gap: 14px;
				background: #14161b;
				border: 1px solid #1f2329;
				border-radius: 6px;
				padding: 6px 12px;
				font-size: 12px;
				color: #c0c5cc;
			}
			.memory-filters label { cursor: pointer; user-select: none; display: flex; gap: 6px; align-items: center; }

			/* Empty state */
			.memory-empty {
				position: absolute;
				top: 50%; left: 50%;
				transform: translate(-50%, -50%);
				color: #6c727b;
				font-size: 14px;
				text-align: center;
				pointer-events: none;
			}
			.memory-empty .hint { color: #4a5058; font-size: 12px; margin-top: 6px; }

			/* + new belief dialog */
			.belief-dialog {
				background: #14161b;
				border: 1px solid #1f2329;
				border-radius: 10px;
				padding: 24px;
				color: #e6e6e6;
				width: 440px;
				max-width: 90vw;
			}

				display: flex;
				flex-direction: column;
				gap: 4px;
				margin-bottom: 14px;
			}
			.belief-dialog .field > span {
				color: #6c727b;
				font-size: 11px;
				text-transform: uppercase;
				letter-spacing: 0.05em;
			}
			.belief-dialog textarea, .belief-dialog input[type=text] {
				background: #0e0f12;

				color: #e6e6e6;

				border-radius: 6px;
				font: inherit;
				font-size: 13px;

			.belief-dialog input[type=range] { width: 100%; }
			.belief-dialog #conf-out {
				font-family: ui-monospace, Menlo, monospace;
				color: #c0c5cc;
				margin-left: 6px;
			}
			.belief-dialog-actions {
				display: flex;
				gap: 8px;
				justify-content: flex-end;
				margin-top: 8px;
			}

			/* Memory tab hides the Clear Test button — it's a Work Orders action */
			body.memory-mode #clear-test-btn { display: none; }
			body.memory-mode .memory-search { display: inline-block; }

			/* ── Memory tab: list-view pane ─────────────────────────────── */
			/* Memory section is a flex column when active so the graph or list
			   pane fills the available height under the toolbar. */
			.memory-view.active {
				display: flex;
				flex-direction: column;
			}
			#memory-graph-pane {
				position: relative;
				flex: 1 1 auto;
				min-height: 0;
				width: 100%;
				height: 100%;
			}
			#memory-graph-pane svg { width: 100%; height: 100%; display: block; }
			#memory-list-pane {
				flex: 1 1 auto;
				min-height: 0;
				display: flex;
				flex-direction: column;
				padding: 0;
				width: 100%;
				max-width: none;
				margin: 0;
				overflow: hidden;
				box-sizing: border-box;
			}
			#memory-list-pane[hidden] { display: none; }
			#memory-list-controls {
				display: flex;
				gap: 10px;
				align-items: center;
				margin-bottom: 14px;
			}
			#memory-list-controls input,
			#memory-list-controls select {
				background: #14161b;
				border: 1px solid #2a2f37;
				color: #c0c5cc;
				padding: 6px 10px;
				border-radius: 6px;
				font-size: 12.5px;
			}
			#memory-list-controls input { flex: 1 1 auto; }
			#memory-list-controls input:focus,
			#memory-list-controls select:focus { outline: none; border-color: #2d6cdf; }
			.memory-list-count {
				color: #6c727b;
				font-size: 11.5px;
				font-family: ui-monospace, Menlo, monospace;
				margin-left: auto;
			}
			.belief-row {
				background: #14161b;
				border: 1px solid #1f2329;
				border-left-width: 3px;
				border-radius: 8px;
				padding: 10px 14px;
				margin-bottom: 6px;
				font-size: 13px;
				display: grid;
				grid-template-columns: 1fr auto;
				gap: 4px 12px;
			}
			.belief-row.user { border-left-color: #d9a366; }
			.belief-row.agent { border-left-color: #4a5560; }
			.belief-row .claim { color: #e6e6e6; line-height: 1.4; }
			.belief-row .right {
				display: flex;
				flex-direction: column;
				align-items: flex-end;
				gap: 2px;
				font-size: 11px;
				color: #8a9099;
				font-family: ui-monospace, Menlo, monospace;
				white-space: nowrap;
			}
			.belief-row .right .conf { color: #cfe2ff; }
			.belief-row .right .ev { color: #74c99a; }
			.belief-row .meta {
				grid-column: 1 / -1;
				display: flex;
				flex-wrap: wrap;
				gap: 4px;
				font-size: 10.5px;
				color: #6c727b;
				font-family: ui-monospace, Menlo, monospace;
			}
			.belief-row .pill {
				background: #1a1f26;
				border: 1px solid #232a33;
				padding: 1px 7px;
				border-radius: 9px;
			}
			.belief-row .pill.scope { color: #d4a855; background: #221c14; border-color: #36281c; }
			.belief-row .pill.tag   { color: #7eb7f0; background: #15212d; border-color: #1d2d40; }

			.memory-view-toggle { display: inline-flex; gap: 0; pointer-events: auto; }
			.memory-view-toggle button {
				background: #14161b;
				border: 1px solid #2a2f37;
				color: #8a9099;
				padding: 5px 12px;
				font-size: 11.5px;
				cursor: pointer;
			}
			.memory-view-toggle button:first-child { border-radius: 6px 0 0 6px; }
			.memory-view-toggle button:last-child  { border-radius: 0 6px 6px 0; border-left: 0; }
			.memory-view-toggle button.active { background: #1f2329; color: #e6e6e6; }
			.memory-view-toggle button:hover { color: #c0c5cc; }

			/* When in list view, the graph filters / detail pane don't apply. */
			body.memory-list-mode #memory-graph-pane { display: none; }
			body.memory-list-mode #memory-entities-pane { display: none; }
			body.memory-list-mode .memory-filters { display: none; }
			body.memory-list-mode #memory-list-pane { display: grid; }
			#memory-list-pane.three-col {
				grid-template-columns: 1fr 1fr 1fr;
				gap: 0;
				padding: 0;
			}
			.list-col { display: flex; flex-direction: column; min-height: 0; border-right: 1px solid #1f2329; }
			.list-col:last-child { border-right: none; }
			.list-col-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid #1f2329; background: #0d0f12; position: sticky; top: 0; z-index: 5; }
			.list-col-header h3 { margin: 0; font-size: 13px; text-transform: uppercase; letter-spacing: 0.6px; color: #c0c4cc; }
			.list-col-header .count { color: #8a9099; font-size: 11.5px; }
			.list-col-body { flex: 1 1 auto; overflow-y: auto; padding: 8px 12px 24px; }
			.list-item { padding: 8px 10px; margin-bottom: 6px; border-radius: 4px; background: #1a1d23; border-left: 3px solid #2a2f37; cursor: pointer; transition: background 0.1s; }
			.list-item:hover { background: #21262d; }
			.list-item.kind-observation { border-left-color: #74c99a; }
			.list-item.kind-belief { border-left-color: #d9a366; }
			.list-item.kind-entity-vendor { border-left-color: #5fa676; }
			.list-item.kind-entity-property { border-left-color: #d9a366; }
			.list-item.kind-entity-owner { border-left-color: #7aaae0; }
			.list-item .li-title { font-weight: 600; font-size: 12.5px; color: #e6e6e6; }
			.list-item .li-meta { font-size: 11px; color: #8a9099; margin-top: 3px; }
			.list-item .li-pill { display: inline-block; padding: 1px 6px; margin-right: 4px; border-radius: 3px; background: #2a2f37; color: #c0c4cc; font-size: 10px; }

			/* Entities sub-view ─────────────────────────────────────────── */
			#memory-entities-pane {
				flex: 1 1 auto;
				min-height: 0;
				display: flex;
				flex-direction: column;
				padding: 14px 20px 60px;
				width: 100%;
				max-width: 1100px;
				margin: 0 auto;
				overflow-y: auto;
				box-sizing: border-box;
			}
			#memory-entities-pane[hidden] { display: none; }
			.entity-row {
				background: #14161b;
				border: 1px solid #1f2329;
				border-left-width: 3px;
				border-radius: 8px;
				padding: 10px 14px;
				margin-bottom: 6px;
				font-size: 13px;
				display: grid;
				grid-template-columns: auto 1fr auto;
				gap: 4px 12px;
				cursor: pointer;
